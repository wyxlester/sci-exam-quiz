{id:295,ch:11,cn:"Health Insurance Pricing",t:"Epidemic/pandemic impact on pricing considers:",o:["Only historical data","Changes in health demographics and potential claims impact","Government mandates only","Hospital capacity only"],a:1,e:"When pricing health insurance, insurers must consider the potential impact of epidemics and pandemics on claims. These events can cause sudden changes in health demographics and lead to a surge in claims from hospitalisation, treatment costs, and related medical expenses. Insurers factor in both historical epidemic data and forward-looking scenarios to ensure premiums remain adequate.",r:"HI 8th Ed, Ch 11, Section 2E — Impact of Epidemic/Pandemic, p.238"},
// Ch 12 — Underwriting (15 questions)
{id:296,ch:12,cn:"Health Insurance Underwriting",t:"Full Medical Underwriting involves:",o:["No medical questions","Simplified questionnaire only","Comprehensive medical evaluation","Guaranteed acceptance"],a:2,e:"Full Medical Underwriting requires the life insured to complete a lengthy health declaration about his health and medical history. The insurer reviews the declarations and may request an attending physician report or medical examination for further assessment. Pre-existing conditions are typically excluded from cover. The advantage is that the insured knows exactly what is covered from the start, rather than discovering it at the point of claim.",r:"HI 8th Ed, Ch 12, Section 3D1 — Full Medical Underwriting, p.249"},
{id:297,ch:12,cn:"Health Insurance Underwriting",t:"Moratorium UW excludes pre-existing conditions for:",o:["The entire policy lifetime","An initial period, then covers them","30 days only","One claim cycle"],a:1,e:"Under Moratorium Underwriting, the life insured does not need to fill in a health declaration or undergo a medical examination. Instead, the insurer declares a waiting period (usually two to five years) during which pre-existing conditions are excluded. If the insured does not have any symptom, treatment, medication, or advice for those conditions during the waiting period, coverage will apply once it ends. Long-term conditions like stroke or kidney failure are unlikely to ever meet the moratorium criteria.",r:"HI 8th Ed, Ch 12, Section 3D2 — Moratorium Underwriting, p.249"},
{id:298,ch:12,cn:"Health Insurance Underwriting",t:"SIO stands for:",o:["Standard Insurance Offer","Simplified Issuance Offer","Special Insurance Option","Supplementary Insurance Order"],a:1,e:"In a Simplified Issuance Offer (SIO), the life insured is asked only a few questions, and the answers determine whether the application is approved or not. No medical examination is required. SIO is more common in policies marketed via direct or online channels. While it allows applicants to get coverage quickly compared to days or weeks with Full Medical Underwriting, the premium is higher due to the greater risk the insurer assumes.",r:"HI 8th Ed, Ch 12, Section 3D3 — Simplified Issuance Offer, p.251"},
{id:299,ch:12,cn:"Health Insurance Underwriting",t:"MEI-specific UW factors focus on:",o:["Earnings and financial situation","Medical background and current physical condition","Cognitive impairment","Smoking habit only"],a:1,e:"When assessing Medical Expense Insurance, the medical history and current physical condition of the life insured are the basic indicators of the probability of future health problems that may result in medical expenses for hospitalisation and treatment. Those with pre-existing conditions will usually have the condition excluded from coverage by the insurer, along with any related conditions.",r:"HI 8th Ed, Ch 12, Section 3C1 — MEI Underwriting Factors, p.248"},
{id:300,ch:12,cn:"Health Insurance Underwriting",t:"Sub-standard risk may be accepted with all EXCEPT:",o:["Exclusions on specific conditions","Premium loading","Automatic benefit upgrade","Postponement"],a:2,e:"Sub-standard risks are people with medical or non-medical impairments that make them higher risks to the insurer. The insurer deals with sub-standard risks by modifying the cover through specific exclusions, extra premiums (premium loading), modification of benefits offered, postponement, or as a last resort, declining the proposal. An automatic benefit upgrade is never part of these modifications — it would increase the insurer's exposure rather than manage the elevated risk.",r:"HI 8th Ed, Ch 12, Section 6B — Sub-standard Risks, p.258"},
{id:301,ch:12,cn:"Health Insurance Underwriting",t:"Attending Physician's Statement (APS) is:",o:["A self-declaration by insured","A report from the insured's doctor","An insurer's internal document","A government health record"],a:1,e:"An Attending Physician's Statement (APS) is a standard pre-printed form for the attending physician to complete based on his personal knowledge of the proposer and the proposer's medical records. The APS is usually required when the underwriter needs better insight into the proposer's medical history that is not available from the standard medical examination. It is one of the five key sources of underwriting information, alongside the proposal form, agent's statement, medical examinations/tests, and supplementary questionnaires.",r:"HI 8th Ed, Ch 12, Section 4D — Attending Physician's Statement, p.257"},
{id:302,ch:12,cn:"Health Insurance Underwriting",t:"Group UW considers all EXCEPT:",o:["Group size and stability","Nature of business","Individual members' hobbies","Past claims experience"],a:2,e:"Group underwriting differs from individual underwriting in that the group is underwritten as a whole. The factors considered include reason for existence, group stability, group size, company's nature of business, employee classes, level of participation, age and gender composition, expected persistency, past claims experience, medical inflation, and medical utilisation rate and trend. Individual members' personal hobbies are not assessed — group UW focuses on collective risk characteristics rather than individual lifestyle details.",r:"HI 8th Ed, Ch 12, Section 3E — Group Underwriting, p.251"},
{id:303,ch:12,cn:"Health Insurance Underwriting",t:"Decline in underwriting means:",o:["Accept at higher premium","Accept with exclusions","Refuse to offer coverage","Defer decision pending info"],a:2,e:"Decline is the most drastic underwriting action, where the insurer refuses to offer any coverage to the proposer. This choice is used only for serious medical reasons, or when the proposed insured is clearly outside the insurer's parameters of acceptable risks for occupational or financial reasons. Most insurers have declination rates below 10%. This is why insurance representatives should advise prospective clients to apply for Health Insurance while they are healthy.",r:"HI 8th Ed, Ch 12, Section 6B3 — Decline, p.259"},
{id:304,ch:12,cn:"Health Insurance Underwriting",t:"Non-medical UW factors include:",o:["Blood test results","X-ray findings","Occupation, lifestyle, financial, residency","Cholesterol levels"],a:2,e:"Non-medical factors that affect underwriting risk include the financial factor (income, assets, debts, and whether the insured has over-insured), the occupational factor (hazards from accidents or health risks), the age factor (medical problems increase with age), the residency factor (travel to war zones or health-risk areas), and additional considerations like avocation/lifestyle risks (drug abuse, hazardous sports) and habits (smoking, alcohol use). These factors complement the medical assessment to give the underwriter a complete risk picture.",r:"HI 8th Ed, Ch 12, Section 3B — Non-medical Factors, p.246"},
{id:305,ch:12,cn:"Health Insurance Underwriting",t:"Risk commences when proposer:",o:["Submits the proposal form","Completes medical examination","Agrees to terms AND pays premium","Receives the policy document"],a:2,e:"For sub-standard risk, the insurer communicates the terms of acceptance to the proposer before issuing the policy. The cover is effected only when the proposer agrees to the terms as stated in the letter of acceptance AND pays the premium. For standard risk, the policy is issued upon premium payment. Both agreement and payment are required — submitting a proposal form or completing a medical exam alone does not start the cover.",r:"HI 8th Ed, Ch 12, Section 7 — Commencement of Risk, p.260"},
{id:306,ch:12,cn:"Health Insurance Underwriting",t:"MHC underwriting additionally considers:",o:["Individual family history","Age and gender composition of the group","Investment returns","Reinsurance rates"],a:1,e:"The key underwriting considerations for Managed Healthcare (MHC) are similar to those for Medical Expense Insurance — primarily medical history and current physical condition. However, when MHC covers are issued to groups, the age and gender composition of the group become strong additional factors. Older groups are associated with higher morbidity, while groups with a large proportion of females of child-bearing age tend to have higher costs due to pregnancy-related healthcare expenses.",r:"HI 8th Ed, Ch 12, Section 3C5 — Managed Healthcare UW, p.249"},
{id:307,ch:12,cn:"Health Insurance Underwriting",t:"Which is NOT a source of UW information?",o:["Proposal form","Agent's statement","Insured's social media posts","Medical examination results"],a:2,e:"The five sources of underwriting information are: (1) the proposal form, which is the primary source; (2) the agent's statement, which provides confidential remarks on the proposer; (3) medical examinations/tests such as ECG, blood tests, and urinalysis; (4) the Attending Physician's Statement (APS); and (5) supplementary questionnaires for conditions like diabetes or hazardous activities. Social media posts are not a recognised source of underwriting information under these guidelines.",r:"HI 8th Ed, Ch 12, Section 4 — Sources of Underwriting Information, p.254"},
{id:308,ch:12,cn:"Health Insurance Underwriting",t:"Premium loading means:",o:["Reducing the premium","Charging higher premium for higher risk","Adding more benefits","Extending coverage period"],a:1,e:"Premium loading (extra premiums) is one method of modifying cover for sub-standard risks. Insurers charge higher premiums to compensate for the elevated risk that the life insured represents. Extra premiums are commonly used in the underwriting of Disability Income Insurance and Critical Illness Insurance. However, premium loading is rarely used in Medical Expense Insurance, where specific exclusions are the preferred approach for managing sub-standard risks.",r:"HI 8th Ed, Ch 12, Section 6B1 — Modifications of Cover (Extra Premiums), p.258"},
{id:309,ch:12,cn:"Health Insurance Underwriting",t:"GIO is most suitable for:",o:["High-risk applicants wanting lowest premiums","Situations where guaranteed acceptance is offered without medical questions","Applicants with complex medical histories","Individual policies only"],a:1,e:"Guaranteed Issuance Offer (GIO) requires no medical questions and no medical examination. The insurer guarantees to issue the policy so long as the applicant meets eligibility criteria, usually an age requirement (e.g. below age 60). To minimise anti-selection risk, GIO policies have smaller coverage with pre-existing conditions permanently excluded. GIO is typically used in Hospital Income Plans or Single Critical Illness Plans sold via direct or online channels. The trade-off is a higher premium for the convenience of guaranteed acceptance.",r:"HI 8th Ed, Ch 12, Section 3D4 — Guaranteed Issuance Offer, p.251"},
{id:310,ch:12,cn:"Health Insurance Underwriting",t:"Medical utilisation rate in group UW refers to:",o:["Number of doctors per employee","Frequency of medical service usage by group members","Hospital bed occupancy rate","Insurance penetration rate"],a:1,e:"Medical utilisation rate refers to how frequently group members use medical services. When a group policy has been in force for some time, the average age may rise, increasing the frequency and amount of claims. Medical advancement, such as the use of new drugs, can also affect plan costs. Hence, medical utilisation rate and trend are important factors that underwriters consider when assessing risks posed by the group, as they directly influence expected claims and premium levels.",r:"HI 8th Ed, Ch 12, Section 3E11 — Medical Utilisation Rate & Trend, p.254"},
// Ch 13 — MAS Notice 120 (15 questions)
{id:311,ch:13,cn:"MAS Notice 120",t:"Health policy under Notice 120 is defined as:",o:["Any life insurance policy","A&H policy that is NOT a personal accident policy","Personal accident policy only","MediSave-approved policies only"],a:1,e:"Under Notice 120, a 'health policy' is specifically defined as an accident and health (A&H) policy that is NOT a personal accident policy. This distinction is important because different disclosure and advisory requirements apply to health policies versus personal accident policies. The definition excludes policies where A&H benefits are paid only if the insured becomes totally and permanently disabled.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Definitions) — Health Policy Definition, p.275"},
{id:312,ch:13,cn:"MAS Notice 120",t:"Personal accident policy covers:",o:["Any illness or disease","Injury, disability, or death from accident only","Critical illness diagnosis","Long-term care needs"],a:1,e:"Under Notice 120, a 'personal accident policy' is defined as an A&H policy where benefits are paid out only in the event of injury to or disability of the insured as a result of accident, on the death by accident of the insured, or on a combination of both. Unlike a health policy, it does not cover illness or disease — only accident-related events trigger benefit payments.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Definitions) — Personal Accident Policy, p.276"},
{id:313,ch:13,cn:"MAS Notice 120",t:"MediSave-approved policies include all EXCEPT:",o:["CareShield Life Supplements","ElderShield policies","Integrated Shield Plans","Stand-alone Critical Illness policies"],a:3,e:"Under Notice 120, a 'MediSave-approved policy' means any Integrated Shield Plan, non-Integrated Shield Plan, or supplementary disability insurance policy (CareShield Life Supplements/ElderShield Supplements). Stand-alone Critical Illness policies do not fall into any of these categories and are therefore not MediSave-approved. Only MediSave-approved policies can use the word 'Shield' in their name and qualify for MediSave premium payments.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Definitions) — MediSave-Approved Policy, p.275"},
{id:314,ch:13,cn:"MAS Notice 120",t:"Required disclosure font is:",o:["Arial 8pt+","Times New Roman 10pt+","Calibri 11pt+","Any font 12pt+"],a:1,e:"Division 3 of Notice 120 requires that the product summary, statement, conditional offer letter, or termination letter with standardised disclosures for any individual Medical Expense Insurance policy (as well as any A&H policy that is not MediSave-approved) must use a font size of Times New Roman 10-point or larger. This ensures that important disclosure information is legible and accessible to policy owners.",r:"HI 8th Ed, Ch 13, Section 3 — Division 3: Additional Disclosure Requirements, p.281"},
{id:315,ch:13,cn:"MAS Notice 120",t:"KYC for individual assesses all EXCEPT:",o:["Financial situation","Existing health policies","Religious beliefs","Employment status and income"],a:2,e:"Under Division 4 of Notice 120, the Know-Your-Client (KYC) requirements for individuals require the A&H insurance intermediary to collect: the policy owner's objectives (event to be protected against, nature of benefits sought, class of hospital ward), employment status, financial situation (assets, liabilities, cash flow, income), source and amount of regular income, financial commitments, existing health policies, and any medical conditions. Religious beliefs are not part of the KYC information required.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Para 35) — Division 4: Know-Your-Client, p.285"},
{id:316,ch:13,cn:"MAS Notice 120",t:"Switching is detrimental if it results in all EXCEPT:",o:["Penalty for terminating the original policy","Transaction cost without real benefit","Higher benefits at lower or same premium","Lower benefit at same or higher cost"],a:2,e:"Under Notice 120 (Paragraph 44), a switch is considered detrimental if: (a) the policy owner suffers a penalty for terminating the original policy, (b) the policy owner incurs transaction costs without gaining real benefit, (c) the replacement policy confers lower benefit at higher or same cost or same benefit at higher cost, or (d) the replacement policy is less suitable. A switch that provides higher benefits at lower or the same premium is not detrimental — it is actually beneficial to the insured.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Para 44) — Division 4: Switching, p.288"},
{id:317,ch:13,cn:"MAS Notice 120",t:"If client won't provide KYC info, adviser must:",o:["Refuse to sell any policy","Proceed, but document the decision and inform client","Report client to MAS","Cancel existing policies"],a:1,e:"Under Notice 120 (Paragraph 41), where a policy owner does not want to provide KYC information or does not accept the adviser's recommendation and chooses another policy, the A&H insurance intermediary may still proceed with the policy owner's request. However, it must document the policy owner's decision and inform the policy owner that it is the policy owner's responsibility to ensure the suitability of the type of policy selected.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Para 41) — Division 4: Client Refusal, p.287"},
{id:318,ch:13,cn:"MAS Notice 120",t:"Amendments to policy terms must be disclosed at least:",o:["7 days before","14 days before","30 days before","60 days before"],a:2,e:"Under Division 3 of Notice 120 (Paragraph 29), where an A&H policy allows the insurer to vary, amend, or add to the contract terms, the direct insurer must: disclose the existing terms, disclose and explain the new terms, explain how the policy owner may accept or be deemed to accept the new terms, and furnish all this information in writing at least 30 days before the change takes effect. This ensures policy owners have adequate notice to understand and respond to changes.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Para 29) — Division 3: Amendment Notice, p.284"},
{id:319,ch:13,cn:"MAS Notice 120",t:"Best practice standards include all EXCEPT:",o:["Plain language disclosure","Objective and unbiased information","Using technical jargon without explanation","Prominently presenting risk warnings"],a:2,e:"Part II of Notice 120 sets out non-mandatory best practice standards for information disclosure. These include: presenting information in plain language that is easy to understand, clearly explaining jargon or technical terms, providing objective and unbiased information, prominently presenting warnings and important information (risks, fees, obligations), and keeping documents up-to-date. Using technical jargon without explanation violates these best practice standards.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Para 52) — Part II: Best Practice Standards, p.289"},
{id:320,ch:13,cn:"MAS Notice 120",t:"Group KYC assesses:",o:["Individual medical histories of all members","Size, composition, and claims history of group","Personal finances of each employee","Religious demographics"],a:1,e:"Under Division 4 of Notice 120 (Paragraph 36), the KYC requirements for group insurance require the A&H insurance intermediary to collect: the policy owner's objectives (financial impact to be protected against, mode of benefit payment, class of hospital ward), the size and composition of the group (including a breakdown by gender, age, income, and occupation), the claims history of the group, and any medical conditions that group members may have. Individual personal finances and religious demographics are not assessed.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Para 36) — Division 4: Group KYC, p.286"},
{id:321,ch:13,cn:"MAS Notice 120",t:"Switching disclosure must be provided:",o:["Verbally only","In writing — fees/charges and benefit changes","Only if client requests","Through MAS portal"],a:1,e:"Under Notice 120 (Paragraph 46), when a policy owner is considering switching from one A&H policy to another, the A&H insurance intermediary must disclose in writing: (a) any fee or charge the policy owner would have to bear, and (b) the changes in level of benefits. This written disclosure ensures the policy owner can make an informed decision on whether to proceed with the switch, understanding the full financial impact.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Para 46) — Division 4: Switching Disclosure, p.288"},
{id:322,ch:13,cn:"MAS Notice 120",t:"Monitoring of switching for long-term A&H policies includes:",o:["Ignoring all switches","Tracking switching volume and flagging high-volume reps","Only monitoring annual switches","No monitoring required"],a:1,e:"Under Part II of Notice 120 (Paragraphs 54-59), A&H insurance intermediaries should institute controls to monitor switching of long-term A&H policies. This includes: tracking the volume of switches to identify representatives with unusually high switching transactions, ensuring each switch recommended by a representative is reviewed by a supervisor for appropriateness, and implementing procedures to identify unusual trends. The policy owner should also declare in writing whether the representative advised the switch.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Para 57) — Part II: Monitoring of Switching, p.290"},
{id:323,ch:13,cn:"MAS Notice 120",t:"The word 'Shield' can only be used for policies that are:",o:["Sold by government agencies","MediSave-approved","Covering Class A wards","Guaranteed renewable for life"],a:1,e:"Division 1 of Notice 120 (Paragraph 10A) states that no direct insurer shall use the word 'Shield' in the name, description, or title of any accident and health policy unless that policy is a MediSave-approved policy (i.e. an Integrated Shield Plan, non-Integrated Shield Plan, or supplementary disability insurance policy). This restriction protects consumers from being misled into thinking a non-MediSave product has government-linked benefits.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Para 10A) — Division 1: Shield Naming, p.278"},
{id:324,ch:13,cn:"MAS Notice 120",t:"When no suitable policy is identified, adviser should:",o:["Recommend the cheapest available policy","Inform the client so they can seek alternatives","Sell the most popular policy","Refer to another adviser immediately"],a:1,e:"Under Division 4 of Notice 120 (Paragraph 39), where the A&H insurance intermediary is unable to identify a suitable policy for the client based on the needs analysis, it must inform the policy owner accordingly. This allows the client to seek alternatives from other insurers or intermediaries. The adviser should not recommend an unsuitable product just to make a sale, as this would violate the requirement to have a reasonable basis for providing advice.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Para 39) — Division 4: No Suitable Policy, p.287"},
{id:325,ch:13,cn:"MAS Notice 120",t:"Disclosure requirements for A&H sales include all EXCEPT:",o:["Nature and objective of policy","Intermediary's personal investment portfolio","Benefits and risks","Free-look period details"],a:1,e:"Division 1A of Notice 120 requires disclosure of: the nature and objective of the policy, benefits and risks, premium payment terms, free-look period, exclusions and limitations, claim procedures, and warnings. The intermediary's personal investment portfolio is not a disclosure requirement — disclosures relate to the policy being sold, not the adviser's personal finances.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Para 17) — Division 1A: Disclosure Requirements, p.279"},
// Ch 14 — FNA (5 questions)
{id:326,ch:14,cn:"Financial Needs Analysis",t:"Fact-finding is the process of obtaining answers about a client's:",o:["Investment preferences only","Personal circumstances, finance, and ambitions","Medical history only","Employment history only"],a:1,e:"Fact-finding is the process of obtaining answers about a client's personal circumstances, financial situation, and ambitions. It goes beyond just medical or employment history — the adviser needs a holistic view including family situation, income, assets, liabilities, existing insurance coverage, and future goals. This information forms the basis for identifying and quantifying the client's health insurance needs.",r:"HI 8th Ed, Ch 14, Section 3 — What Is Fact Finding?, p.305"},

// Cross-exam study notes
const otherExams=Object.values(EXAMS).filter(e=>e.id!=='hi');
h+=`<h3 style="font-size:.95rem;font-weight:700;color:var(--tx);margin-top:28px;margin-bottom:12px">Other Exam Study Notes</h3>`;
otherExams.forEach(oex=>{
oex.studyNotes.forEach(sn=>{
const url=getStudyURL(oex.id,sn.file);
h+=`<a class="sn-card" href="${url}" target="_blank" rel="noopener">
<span class="sn-icon">${oex.icon}</span>
<div class="sn-info"><div class="sn-name">${oex.code}: ${sn.name}</div><div class="sn-detail">${sn.detail}</div></div>
<span class="sn-arrow">↗</span></a>`})});

h+=`<div class="sn-note">📌 <strong>Setup required:</strong> These PDFs are hosted on Firebase Storage. If links don\'t work yet, you need to upload the PDFs to Firebase Storage and update the STORAGE_BASE URL in the app code. See the Firebase Storage setup guide for instructions.</div>`;
h+=`</div>`;return h}

// ==================== RENDER ====================
function render(){
if(!curUser||!uData)return void(document.getElementById('root').innerHTML='<div class="loading"><div class="spinner"></div>Loading...</div>');
if(appMode==='dashboard')return renderDashboard();
const a=getAns(),P=getPaper(),s=stats(a),ch=chs(),prog=P.length?(s.t/P.length)*100:0,pct=s.t?Math.round(s.c/s.t*100):0;
const ini=(uData.name||'U').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
let h=`<div class="app">
<div class="topbar"><div class="user-info"><div class="avatar">${ini}</div><div><div class="uname">${uData.name||'User'}</div><div class="uemail">${curUser.email}</div></div></div>
<div class="tb-btns"><span class="wn-badge" onclick="showChangelog()">${wnUnseen()?'<span class="wn-dot"></span>':''}<span class="wn-text">What\'s New</span></span><button class="thb tb-btn" onclick="togTheme()">🌙</button>${isAdm?'<button class="tb-btn admin" onclick="togAdm()">⚙ Admin</button>':''}<button class="tb-btn logout" onclick="auth.signOut()">Sign Out</button></div></div>`;

// Back to dashboard button
h+=`<button class="dash-back" onclick="goDash()">← Back to Dashboard</button>`;

// Sticky nav: paper selector + nav tabs + chapter tabs
h+=`<div class="sticky-nav" id="stickyNav">`;
const pks=Object.keys(PAPERS);
if(pks.length>1||true){h+=`<div class="paper-sel">${pks.map(k=>`<button class="paper-btn ${curPaper===k?'on':''}" onclick="setPaper('${k}')"><div>${PAPERS[k].name}</div><div class="paper-sub">${PAPERS[k].desc}</div></button>`).join('')}</div>`}

h+=`<div class="nav-tabs">
<button class="nav-tab ${navMode==='quiz'?'on':''}" onclick="sn('quiz')">📝 Quiz</button>
<button class="nav-tab ${navMode==='leaderboard'?'on':''}" onclick="sn('leaderboard')">🏆 Leaderboard</button>
<button class="nav-tab ${navMode==='results'?'on':''}" onclick="sn('results')">📊 My Results</button>
<button class="nav-tab ${navMode==='studynotes'?'on':''}" onclick="sn('studynotes')">📚 Study Notes</button>
<button class="nav-tab ${navMode==='releases'?'on':''}" onclick="sn('releases')">📋 Releases</button>
</div>`;

// Admin panel
if(showAdm&&isAdm){h+=renderAdmin()}

if(navMode==='leaderboard'){h+=`</div>`;h+=renderLB();h+=`<div class="ver-footer"><span class="ver-num">v${APP_VER}</span> · SCI Exam Prep</div></div>`;document.getElementById('root').innerHTML=h;updTh();initSticky();return}
if(navMode==='releases'){h+=`</div>`;h+=renderReleases();h+=`<div class="ver-footer"><span class="ver-num">v${APP_VER}</span> · SCI Exam Prep</div></div>`;document.getElementById('root').innerHTML=h;updTh();initSticky();return}
if(navMode==='studynotes'){h+=`</div>`;h+=renderStudyNotes();h+=`<div class="ver-footer"><span class="ver-num">v${APP_VER}</span> · SCI Exam Prep</div></div>`;document.getElementById('root').innerHTML=h;updTh();initSticky();return}

// Stats
h+=`<div class="dashboard">
<div class="stat"><div class="sl">Done</div><div class="sv" style="color:var(--pri)">${s.t}/${P.length}</div></div>
<div class="stat"><div class="sl">Correct</div><div class="sv" style="color:var(--ok)">${s.c}</div></div>
<div class="stat"><div class="sl">Wrong</div><div class="sv" style="color:var(--err)">${s.w}</div></div>
<div class="stat"><div class="sl">Score</div><div class="sv">${s.t?pct+'%':'—'}</div></div>
</div><div class="pbar"><div class="pfill" style="width:${prog}%"></div></div>`;

// Chapter tabs
h+=`<div class="ch-tabs"><button class="ch-tab ${view==='all'?'on':''}" onclick="sv('all')">All</button>${ch.map(c=>{const cs=cstat(c.n,a);const hi=HP.includes(c.n)?' hi':'';return`<button class="ch-tab${hi} ${view===c.n?'on':''}" onclick="sv(${c.n})">Ch ${c.n} <span class="sc">${cs.c}/${cs.tot}</span></button>`}).join('')}</div>`;
h+=`</div>`; // close sticky-nav

if(navMode==='results'){h+=renderResults(a,ch);h+=`<div class="ver-footer"><span class="ver-num">v${APP_VER}</span> · SCI Exam Prep</div></div>`;document.getElementById('root').innerHTML=h;updTh();initSticky();return}

// Filters
const bmCt=Object.keys(getBM()).length;
h+=`<div class="ctrls"><button class="pill ${filt==='all'?'on':''}" onclick="sf('all')">All</button><button class="pill ${filt==='un'?'on':''}" onclick="sf('un')">Unanswered</button><button class="pill ${filt==='wrong'?'on':''}" onclick="sf('wrong')">Wrong Only</button><button class="pill bm ${filt==='bm'?'on':''}" onclick="sf('bm')">🔖 Bookmarked${bmCt?'<span class=\"bm-count\">'+bmCt+'</span>':''}</button><button class="pill ml" onclick="doShuf()">${shuf?'↕ Order':'🔀 Shuffle'}</button></div>`;

// Questions grouped by chapter
let qs=view==='all'?[...P]:P.filter(q=>q.ch===view);
if(shuf&&order){const ids=new Set(qs.map(q=>q.id));qs=order.filter(id=>ids.has(id)).map(id=>P.find(q=>q.id===id))}

if(shuf){h+=`<div class="ch-section"><div class="ch-body">`;qs.forEach((q,i)=>{h+=renderQ(q,a,i)});h+=`</div></div>`;
}else{const groups={};qs.forEach(q=>{if(!groups[q.ch])groups[q.ch]=[];groups[q.ch].push(q)});
Object.keys(groups).forEach(chNum=>{const c=+chNum,grp=groups[c],cs=cstat(c,a),col=CH_COLORS[c]||'#64748b';
const bm=getBM();let vis=grp;if(filt==='un')vis=grp.filter(q=>a[q.id]===undefined);if(filt==='wrong')vis=grp.filter(q=>a[q.id]!==undefined&&q.a!==a[q.id]);if(filt==='bm')vis=grp.filter(q=>bm[q.id]);
if(vis.length===0&&filt!=='all')return;
h+=`<div class="ch-section"><div class="ch-banner" style="background:${col}"><h2>Ch ${c}: ${grp[0].cn} ${HP.includes(c)?'<span class="badge">Priority</span>':''}</h2><div class="ch-stats"><span class="ch-sc">${cs.c}/${cs.tot}</span><button class="ch-reset-btn" onclick="resetCh(${c})">Reset</button></div></div><div class="ch-body">`;
vis.forEach((q,i)=>{h+=renderQ(q,a,i)});
h+=`</div></div>`})}

h+=`<button style="display:block;margin:24px auto;padding:12px 32px;background:var(--err);color:#fff;border:none;border-radius:var(--rs);font-size:.85rem;font-weight:600;cursor:pointer" onclick="resetAll()">Reset All Answers</button>`;
h+=`<div class="ver-footer"><span class="ver-num">v${APP_VER}</span> · SCI Exam Prep</div></div>`;
document.getElementById('root').innerHTML=h;updTh();initSticky()}

function renderQ(q,a,idx){
const ans=a[q.id]!==undefined,ua=a[q.id],ok=ans&&q.a===ua;
if(filt==='un'&&ans)return'';if(filt==='wrong'&&(!ans||ok))return'';
const bm=getBM();if(filt==='bm'&&!bm[q.id])return'';
const cc=ans?(ok?'qok':'qer'):'';const bmOn=bm[q.id];
let h=`<div class="qc ${cc}${bmOn?' bookmarked':''}"><div class="qh"><div class="qn">Q${q.id} · Ch ${q.ch}${bmOn?'<span class="bm-label">Bookmarked</span>':''}</div><button class="bm-btn${bmOn?' on':''}" onclick="event.stopPropagation();togBM(${q.id})" title="${bmOn?'Remove bookmark':'Bookmark this question'}">${bmOn?'★ Saved':'☆ Save'}</button></div><div class="qt">${q.t}</div><div class="opts">`;
q.o.forEach((op,i)=>{let oc=ans?'dis':'';if(ans){if(i===ua&&ok)oc+=' sok';else if(i===ua&&!ok)oc+=' ser';if(i===q.a&&!ok)oc+=' rok'}
h+=`<button class="opt ${oc}" onclick="saveAns(${q.id},${i})" ${ans?'disabled':''}><span class="lt">${LL[i]}</span><span>${op}</span></button>`});
h+=`</div>`;
if(ans){h+=`<div class="fb ${ok?'fok':'fer'}"><span>${ok?'✓':'✗'}</span> <strong>${ok?'Correct!':'Wrong — '+LL[q.a]}</strong><div class="fe">${q.e}</div><div class="fr">📖 ${q.r}</div></div>`}
return h+`</div>`}

function renderResults(a,ch){
const P=getPaper(),s=stats(a);
const oa=s.t?Math.round(s.c/s.t*100):0,op=P.length?Math.round(s.c/P.length*100):0;
let h=`<div class="rp"><h3>📊 My Results by Chapter</h3>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">
<div style="background:var(--bg3);border-radius:var(--rs);padding:12px;text-align:center"><div style="font-size:.62rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;font-weight:600">Attempted</div><div style="font-size:1.2rem;font-weight:800;color:var(--pri);margin-top:2px">${s.t}/${P.length}</div></div>
<div style="background:var(--bg3);border-radius:var(--rs);padding:12px;text-align:center"><div style="font-size:.62rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;font-weight:600">Accuracy</div><div style="font-size:1.2rem;font-weight:800;color:${oa>=80?'var(--ok)':oa>=50?'var(--amb)':'var(--err)'};margin-top:2px">${s.t?oa+'%':'—'}</div></div>
<div style="background:var(--bg3);border-radius:var(--rs);padding:12px;text-align:center"><div style="font-size:.62rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;font-weight:600">Progress</div><div style="font-size:1.2rem;font-weight:800;margin-top:2px">${s.t?op+'%':'—'}</div></div>
</div>
<div style="display:grid;grid-template-columns:2fr 3fr 1fr 1fr;gap:4px;margin-bottom:8px;font-size:.68rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;padding:0 4px"><span>Chapter</span><span>Progress</span><span style="text-align:right">Score</span><span style="text-align:right">Accuracy</span></div>
<div class="rg">`;
ch.forEach(c=>{const cs=cstat(c.n,a),p=cs.tot?Math.round(cs.c/cs.tot*100):0,acc=cs.a?Math.round(cs.c/cs.a*100):0,col=CH_COLORS[c.n];
h+=`<div class="rr"><span class="rn" style="color:${col}">Ch ${c.n}</span><div class="rb"><div class="rbf" style="width:${p}%;background:${col}"></div></div><span class="rs ${cs.c===cs.tot&&cs.a===cs.tot?'pf':''}">${cs.c}/${cs.tot}</span><span class="rs" style="color:${acc>=80?'var(--ok)':acc>=50?'var(--amb)':'var(--err)'}">${cs.a?acc+'%':'—'}</span></div>`});
h+=`</div><div class="rt">Overall: ${s.c} correct out of ${P.length} questions (${s.t?oa+'% accuracy':'—'})</div></div>`;return h}

// ==================== RELEASES ====================
function renderReleases(){
let h='<div class="rel-page"><h2>Releases</h2><p class="rel-sub">Feature history and what\'s changed in each version</p>';
CHANGELOG.forEach((c,i)=>{
h+=`<div class="rel-card"><div class="rel-head"><span class="rel-ver${i===0?' latest':''}">${i===0?'LATEST · ':''}v${c.ver}</span><span class="rel-date">${c.date}</span></div><div class="rel-title">${c.title}</div><div class="rel-features">`;
c.sections.forEach(s=>{h+=`<div class="rel-feat"><span class="rel-icon">${s.icon||'✦'}</span><div><span class="rel-ft">${s.heading}</span> <span class="rel-fd">— ${s.body}</span></div></div>`});
h+=`</div></div>`});
h+=`</div>`;return h}

// ==================== LEADERBOARD ====================
function renderLB(){
if(!allU.length)return'<div class="lb"><div class="spinner"></div> Loading leaderboard...</div>';
const P=getPaper();
const board=allU.map(u=>{
// Use bestScores for leaderboard if available, otherwise compute from current answers
const best=(u.bestScores&&u.bestScores[curPaper])||null;
const pa=(u.papers&&u.papers[curPaper])||{};const s=stats(pa);
const livScore=P.length?Math.round(s.c/P.length*100):0;const livAcc=s.t?Math.round(s.c/s.t*100):0;
const score=best?Math.max(best.score,livScore):livScore;
const correct=best?Math.max(best.correct,s.c):s.c;
const attempted=best?(correct===best.correct?best.attempted:s.t):s.t;
const acc=attempted?Math.round(correct/attempted*100):0;
return{...u,s:{t:attempted,c:correct,w:attempted-correct},score,acc}
}).filter(u=>u.s.t>0).sort((a,b)=>b.score-a.score||b.acc-a.acc);
const medals=['🥇','🥈','🥉'];
let h=`<div class="lb"><h3>🏆 Leaderboard</h3><p class="lb-sub">${PAPERS[curPaper].name} · ${board.length} participants</p>
<div style="background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);padding:12px 16px;margin-bottom:16px;font-size:.82rem;color:var(--tx2);line-height:1.5">
<strong style="color:var(--tx)">How are rankings decided?</strong><br>
Your <strong>Score</strong> = correct answers out of all ${P.length} questions. Questions you haven't attempted count as incorrect, so answering more questions and getting them right will boost your rank. Your best score is saved — resetting a paper won't affect your ranking.</div>`;
if(!board.length){h+=`<p style="text-align:center;color:var(--tx3);padding:20px">No one has answered yet. Be the first!</p></div>`;return h}
board.forEach((u,i)=>{
const rank=i+1;const prog=Math.round(u.s.t/P.length*100);
const me=curUser&&u.id===curUser.uid;
const rc=i<3?['gold','silver','bronze'][i]:'';
const avCol=AVATARS[u.name?u.name.charCodeAt(0)%AVATARS.length:0];
const ini=(u.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
h+=`<div class="lb-row ${me?'me':''}">
<div class="lb-rank ${rc}">${i<3?medals[i]:rank}</div>
<div class="lb-av" style="background:${avCol}">${ini}</div>
<div class="lb-info">
<div class="lb-name">${u.name||'Anonymous'}${me?' (You)':''}</div>
<div class="lb-stats">
<div class="lb-stat"><span class="lb-stat-val">${u.s.t}/${P.length}</span><span class="lb-stat-lbl">Attempted</span></div>
<div class="lb-stat"><span class="lb-stat-val">${u.acc}%</span><span class="lb-stat-lbl">Accuracy</span></div>
<div class="lb-stat"><span class="lb-stat-val" style="color:${u.score>=60?'var(--ok)':u.score>=30?'var(--amb)':'var(--err)'}">${u.score}%</span><span class="lb-stat-lbl">Score</span></div>
<div class="lb-bar-wrap"><div class="lb-bar" style="width:${prog}%;background:${avCol}"></div></div>
</div>
</div>
</div>`});
h+=`</div>`;return h}

// ==================== ADMIN ====================
function renderAdmin(){
if(!allU.length)return'<div class="admin-panel"><div class="spinner"></div></div>';
let h=`<div class="admin-panel"><h3>⚙ Admin Dashboard</h3><p class="as">${allU.length} users · ${PAPERS[curPaper].name}</p>
<div style="overflow-x:auto"><table class="at"><tr><th>User</th><th>Email</th><th>Done</th><th>Correct</th><th>Score</th><th>Last Active</th></tr>`;
const P=getPaper();
allU.forEach(u=>{const pa=(u.papers&&u.papers[curPaper])||{};const s=stats(pa);const pct=s.t?Math.round(s.c/s.t*100):0;
const la=u.lastActive?new Date(u.lastActive.seconds*1000).toLocaleDateString():'—';
h+=`<tr><td><strong>${u.name||'—'}</strong></td><td style="color:var(--tx3)">${u.email||'—'}</td><td>${s.t}/${P.length}</td><td>${s.c}</td><td>${s.t?pct+'%':'—'}</td><td style="color:var(--tx3)">${la}</td></tr>`});
h+=`</table></div></div>`;return h}

async function togAdm(){showAdm=!showAdm;if(showAdm)await loadAll();render()}

// ==================== INIT ====================
auth.onAuthStateChanged(async u=>{
if(u){curUser=u;appMode='dashboard';document.getElementById('root').innerHTML='<div class="loading"><div class="spinner"></div>Loading...</div>';
await loadU();loadAll().then(()=>{if(navMode==='leaderboard')render()});render();if(wnUnseen())setTimeout(showChangelog,600)}
else{curUser=null;uData=null;isAdm=false;showAdm=false;appMode='dashboard';renderLanding()}});

// Leaderboard auto-refresh
setInterval(async()=>{if(curUser&&navMode==='leaderboard'){await loadAll();render()}},15000);


try{const t=localStorage.getItem('hiqt');if(t)document.documentElement.setAttribute('data-theme',t)}catch(e){}
</script>
