{id:295,ch:11,cn:"Health Insurance Pricing",t:"Epidemic/pandemic impact on pricing considers:",o:["Only historical data","Changes in health demographics and potential claims impact","Government mandates only","Hospital capacity only"],a:1,e:"When pricing health insurance, insurers must consider the potential impact of epidemics and pandemics on claims. These events can cause sudden changes in health demographics and lead to a surge in claims from hospitalisation, treatment costs, and related medical expenses. Insurers factor in both historical epidemic data and forward-looking scenarios to ensure premiums remain adequate.",r:"HI 8th Ed, Ch 11, Section 2E — Impact of Epidemic/Pandemic, p.238"},
// Ch 12 — Underwriting (15 questions)
{id:296,ch:12,cn:"Health Insurance Underwriting",t:"Full Medical Underwriting involves:",o:["No medical questions","Simplified questionnaire only","Comprehensive medical evaluation","Guaranteed acceptance"],a:2,e:"Full Medical Underwriting requires the life insured to complete a lengthy health declaration about his health and medical history. The insurer reviews the declarations and may request an attending physician report or medical examination for further assessment. Pre-existing conditions are typically excluded from cover. The advantage is that the insured knows exactly what is covered from the start, rather than discovering it at the point of claim.",r:"HI 8th Ed, Ch 12, Section 3D1 — Full Medical Underwriting, p.249"},
{id:297,ch:12,cn:"Health Insurance Underwriting",t:"Moratorium UW excludes pre-existing conditions for:",o:["The entire policy lifetime","An initial period, then covers them","30 days only","One claim cycle"],a:1,e:"Under Moratorium Underwriting, the life insured does not need to fill in a health declaration or undergo a medical examination. Instead, the insurer declares a waiting period (usually two to five years) during which pre-existing conditions are excluded. If the insured does not have any symptom, treatment, medication, or advice for those conditions during the waiting period, coverage will apply once it ends. Long-term conditions like stroke or kidney failure are unlikely to ever meet the moratorium criteria.",r:"HI 8th Ed, Ch 12, Section 3D2 — Moratorium Underwriting, p.249"},
{id:298,ch:12,cn:"Health Insurance Underwriting",t:"SIO stands for:",o:["Standard Insurance Offer","Simplified Issuance Offer","Special Insurance Option","Supplementary Insurance Order"],a:1,e:"In a Simplified Issuance Offer (SIO), the life insured is asked only a few questions, and the answers determine whether the application is approved or not. No medical examination is required. SIO is more common in policies marketed via direct or online channels. While it allows applicants to get coverage quickly compared to days or weeks with Full Medical Underwriting, the premium is higher due to the greater risk the insurer assumes.",r:"HI 8th Ed, Ch 12, Section 3D3 — Simplified Issuance Offer, p.251"},
{id:299,ch:12,cn:"Health Insurance Underwriting",t:"MEI-specific UW factors focus on:",o:["Earnings and financial situation","Medical background and current physical condition","Cognitive impairment","Smoking habit only"],a:1,e:"When assessing Medical Expense Insurance, the medical history and current physical condition of the life insured are the basic indicators of the probability of future health problems that may result in medical expenses for hospitalisation and treatment. Those with pre-existing conditions will usually have the condition excluded from coverage by the insurer, along with any related conditions.",r:"HI 8th Ed, Ch 12, Section 3C1 — MEI Underwriting Factors, p.248"},
{id:300,ch:12,cn:"Health Insurance Underwriting",t:"Sub-standard risk may be accepted with all EXCEPT:",o:["Exclusions on specific conditions","Premium loading","Automatic benefit upgrade","Postponement"],a:2,e:"Sub-standard risks are people with medical or non-medical impairments that make them higher risks to the insurer. The insurer deals with sub-standard risks by modifying the cover through specific exclusions, extra premiums (premium loading), modification of benefits offered, postponement, or as a last resort, declining the proposal. An automatic benefit upgrade is never part of these modifications — it would increase the insurer's exposure rather than manage the elevated risk.",r:"HI 8th Ed, Ch 12, Section 6B — Sub-standard Risks, p.258"},
{id:301,ch:12,cn:"Health Insurance Underwriting",t:"Attending Physician's Statement (APS) is:",o:["A self-declaration by insured","A report from the insured's doctor","An insurer's internal document","A government health record"],a:1,e:"An Attending Physician's Statement (APS) is a standard pre-printed form for the attending physician to complete based on his personal knowledge of the proposer and the proposer's medical records. The APS is usually required when the underwriter needs better insight into the proposer's medical history that is not available from the standard medical examination. It is one of the five key sources of underwriting information, alongside the proposal form, agent's statement, medical examinations/tests, and supplementary questionnaires.",r:"HI 8th Ed, Ch 12, Section 4D — Attending Physician's Statement, p.257"},
{id:302,ch:12,cn:"Health Insurance Underwriting",t:"Group UW considers all EXCEPT:",o:["Group size and stability","Nature of business","Individual members' hobbies","Past claims experience"],a:2,e:"Group underwriting differs from individual underwriting in that the group is underwritten as a whole. The factors considered include reason for existence, group stability, group size, company's nature of business, employee classes, level of participation, age and gender composition, expected persistency, past claims experience, medical inflation, and medical utilisation rate and trend. Individual members' personal hobbies are not assessed — group UW focuses on collective risk characteristics rather than individual lifestyle details.",r:"HI 8th Ed, Ch 12, Section 3E — Group Underwriting, p.251"},
{id:303,ch:12,cn:"Health Insurance Underwriting",t:"Decline in underwriting means:",o:["Accept at higher premium","Accept with exclusions","Refuse to offer coverage","Defer decision pending info"],a:2,e:"Decline is the most drastic underwriting action, where the insurer refuses to offer any coverage to the proposer. This choice is used only for serious medical reasons, or when the proposed insured is clearly outside the insurer's parameters of acceptable risks for occupational or financial reasons. Most insurers have declination rates below 10%. This is why insurance representatives should advise prospective clients to apply for Health Insurance while they are healthy.",r:"HI 8th Ed, Ch 12, Section 6B3 — Decline, p.259"},
{id:304,ch:12,cn:"Health Insurance Underwriting",t:"Non-medical UW factors include:",o:["Blood test results","X-ray findings","Occupation, lifestyle, financial, residency","Cholesterol levels"],a:2,e:"Non-medical factors that affect underwriting risk include the financial factor (income, assets, debts, and whether the insured has over-insured), the occupational factor (hazards from accidents or health risks), the age factor (medical problems increase with age), the residency factor (travel to war zones or health-risk areas), and additional considerations like avocation/lifestyle risks (drug abuse, hazardous sports) and habits (smoking, alcohol use). These factors complement the medical assessment to give the underwriter a complete risk picture.",r:"HI 8th Ed, Ch 12, Section 3B — Non-medical Factors, p.246"},
{id:305,ch:12,cn:"Health Insurance Underwriting",t:"Risk commences when proposer:",o:["Submits the proposal form","Completes medical examination","Agrees to terms AND pays premium","Receives the policy document"],a:2,e:"For sub-standard risk, the insurer communicates the terms of acceptance to the proposer before issuing the policy. The cover is effected only when the proposer agrees to the terms as stated in the letter of acceptance AND pays the premium. For standard risk, the policy is issued upon premium payment. Both agreement and payment are required — submitting a proposal form or completing a medical exam alone does not start the cover.",r:"HI 8th Ed, Ch 12, Section 7 — Commencement of Risk, p.260"},
{id:306,ch:12,cn:"Health Insurance Underwriting",t:"MHC underwriting additionally considers:",o:["Individual family history","Age and gender composition of the group","Investment returns","Reinsurance rates"],a:1,e:"The key underwriting considerations for Managed Healthcare (MHC) are similar to those for Medical Expense Insurance — primarily medical history and current physical condition. However, when MHC covers are issued to groups, the age and gender composition of the group become strong additional factors. Older groups are associated with higher morbidity, while groups with a large proportion of females of child-bearing age tend to have higher costs due to pregnancy-related healthcare expenses.",r:"HI 8th Ed, Ch 12, Section 3C5 — Managed Healthcare UW, p.249"},
{id:307,ch:12,cn:"Health Insurance Underwriting",t:"Which is NOT a source of UW information?",o:["Proposal form","Agent's statement","Insured's social media posts","Medical examination results"],a:2,e:"The five sources of underwriting information are: (1) the proposal form, which is the primary source; (2) the agent's statement, which provides confidential remarks on the proposer; (3) medical examinations/tests such as ECG, blood tests, and urinalysis; (4) the Attending Physician's Statement (APS); and (5) supplementary questionnaires for conditions like diabetes or hazardous activities. Social media posts are not a recognised source of underwriting information under these guidelines.",r:"HI 8th Ed, Ch 12, Section 4 — Sources of Underwriting Information, p.254"},
{id:308,ch:12,cn:"Health Insurance Underwriting",t:"Premium loading means:",o:["Reducing the premium","Charging higher premium for higher risk","Adding more benefits","Extending coverage period"],a:1,e:"Premium loading (extra premiums) is one method of modifying cover for sub-standard risks. Insurers charge higher premiums to compensate for the elevated risk that the life insured represents. Extra premiums are commonly used in the underwriting of Disability Income Insurance and Critical Illness Insurance. However, premium loading is rarely used in Medical Expense Insurance, where specific exclusions are the preferred approach for managing sub-standard risks.",r:"HI 8th Ed, Ch 12, Section 6B1 — Modifications of Cover (Extra Premiums), p.258"},
{id:309,ch:12,cn:"Health Insurance Underwriting",t:"GIO is most suitable for:",o:["High-risk applicants wanting lowest premiums","Situations where guaranteed acceptance is offered without medical questions","Applicants with complex medical histories","Individual policies only"],a:1,e:"Guaranteed Issuance Offer (GIO) requires no medical questions and no medical examination. The insurer guarantees to issue the policy so long as the applicant meets eligibility criteria, usually an age requirement (e.g. below age 60). To minimise anti-selection risk, GIO policies have smaller coverage with pre-existing conditions permanently excluded. GIO is typically used in Hospital Income Plans or Single Critical Illness Plans sold via direct or online channels. The trade-off is a higher premium for the convenience of guaranteed acceptance.",r:"HI 8th Ed, Ch 12, Section 3D4 — Guaranteed Issuance Offer, p.251"},
{id:310,ch:12,cn:"Health Insurance Underwriting",t:"Medical utilisation rate in group UW refers to:",o:["Number of doctors per employee","Frequency of medical service usage by group members","Hospital bed occupancy rate","Insurance penetration rate"],a:1,e:"Medical utilisation rate refers to how frequently group members use medical services. When a group policy has been in force for some time, the average age may rise, increasing the frequency and amount of claims. Medical advancement, such as the use of new drugs, can also affect plan costs. Hence, medical utilisation rate and trend are important factors that underwriters consider when assessing risks posed by the group, as they directly influence expected claims and premium levels.",r:"HI 8th Ed, Ch 12, Section 3E11 — Medical Utilisation Rate & Trend, p.254"},
// Ch 13 — MAS Notice 120 (15 questions)
{id:311,ch:13,cn:"MAS Notice 120",t:"Health policy under Notice 120 is defined as:",o:["Any life insurance policy","A&H policy that is NOT a personal accident policy","Personal accident policy only","MediSave-approved policies only"],a:1,e:"Under Notice 120, a 'health policy' is specifically defined as an accident and health (A&H) policy that is NOT a personal accident policy. This distinction is important because different disclosure and advisory requirements apply to health policies versus personal accident policies. The definition excludes policies where A&H benefits are paid only if the insured becomes totally and permanently disabled.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Definitions) — Health Policy Definition, p.275"},
{id:312,ch:13,cn:"MAS Notice 120",t:"Personal accident policy covers:",o:["Any illness or disease","Injury, disability, or death from accident only","Critical illness diagnosis","Long-term care needs"],a:1,e:"Under Notice 120, a 'personal accident policy' is defined as an A&H policy where benefits are paid out only in the event of injury to or disability of the insured as a result of accident, on the death by accident of the insured, or on a combination of both. Unlike a health policy, it does not cover illness or disease — only accident-related events trigger benefit payments.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Definitions) — Personal Accident Policy, p.276"},
{id:313,ch:13,cn:"MAS Notice 120",t:"MediSave-approved policies include all EXCEPT:",o:["CareShield Life Supplements","ElderShield policies","Integrated Shield Plans","Stand-alone Critical Illness policies"],a:3,e:"Under Notice 120, a 'MediSave-approved policy' means any Integrated Shield Plan, non-Integrated Shield Plan, or supplementary disability insurance policy (CareShield Life Supplements/ElderShield Supplements). Stand-alone Critical Illness policies do not fall into any of these categories and are therefore not MediSave-approved. Only MediSave-approved policies can use the word 'Shield' in their name and qualify for MediSave premium payments.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Definitions) — MediSave-Approved Policy, p.275"},
{id:314,ch:13,cn:"MAS Notice 120",t:"Required disclosure font is:",o:["Arial 8pt+","Times New Roman 10pt+","Calibri 11pt+","Any font 12pt+"],a:1,e:"Division 3 of Notice 120 requires that the product summary, statement, conditional offer letter, or termination letter with standardised disclosures for any individual Medical Expense Insurance policy (as well as any A&H policy that is not MediSave-approved) must use a font size of Times New Roman 10-point or larger. This ensures that important disclosure information is legible and accessible to policy owners.",r:"HI 8th Ed, Ch 13, Section 3 — Division 3: Additional Disclosure Requirements, p.281"},
{id:315,ch:13,cn:"MAS Notice 120",t:"KYC for individual assesses all EXCEPT:",o:["Financial situation","Existing health policies","Religious beliefs","Employment status and income"],a:2,e:"Under Division 4 of Notice 120, the Know-Your-Client (KYC) requirements for individuals require the A&H insurance intermediary to collect: the policy owner's objectives (event to be protected against, nature of benefits sought, class of hospital ward), employment status, financial situation (assets, liabilities, cash flow, income), source and amount of regular income, financial commitments, existing health policies, and any medical conditions. Religious beliefs are not part of the KYC information required.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Para 35) — Division 4: Know-Your-Client, p.285"},
{id:316,ch:13,cn:"MAS Notice 120",t:"Switching is detrimental if it results in all EXCEPT:",o:["Penalty for terminating the original policy","Transaction cost without real benefit","Higher benefits at lower or same premium","Lower benefit at same or higher cost"],a:2,e:"Under Notice 120 (Paragraph 44), a switch is considered detrimental if: (a) the policy owner suffers a penalty for terminating the original policy, (b) the policy owner incurs transaction costs without gaining real benefit, (c) the replacement policy confers lower benefit at higher or same cost or same benefit at higher cost, or (d) the replacement policy is less suitable. A switch that provides higher benefits at lower or the same premium is not detrimental — it is actually beneficial to the insured.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Para 44) — Division 4: Switching, p.288"},
{id:317,ch:13,cn:"MAS Notice 120",t:"If client won't provide KYC info, adviser must:",o:["Refuse to sell any policy","Proceed, but document the decision and inform client","Report client to MAS","Cancel existing policies"],a:1,e:"Under Notice 120 (Paragraph 41), where a policy owner does not want to provide KYC information or does not accept the adviser's recommendation and chooses another policy, the A&H insurance intermediary may still proceed with the policy owner's request. However, it must document the policy owner's decision and inform the policy owner that it is the policy owner's responsibility to ensure the suitability of the type of policy selected.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Para 41) — Division 4: Client Refusal, p.287"},
{id:318,ch:13,cn:"MAS Notice 120",t:"Amendments to policy terms must be disclosed at least:",o:["7 days before","14 days before","30 days before","60 days before"],a:2,e:"Under Division 3 of Notice 120 (Paragraph 29), where an A&H policy allows the insurer to vary, amend, or add to the contract terms, the direct insurer must: disclose the existing terms, disclose and explain the new terms, explain how the policy owner may accept or be deemed to accept the new terms, and furnish all this information in writing at least 30 days before the change takes effect. This ensures policy owners have adequate notice to understand and respond to changes.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Para 29) — Division 3: Amendment Notice, p.284"},
{id:319,ch:13,cn:"MAS Notice 120",t:"Best practice standards include all EXCEPT:",o:["Plain language disclosure","Objective and unbiased information","Using technical jargon without explanation","Prominently presenting risk warnings"],a:2,e:"Part II of Notice 120 sets out non-mandatory best practice standards for information disclosure. These include: presenting information in plain language that is easy to understand, clearly explaining jargon or technical terms, providing objective and unbiased information, prominently presenting warnings and important information (risks, fees, obligations), and keeping documents up-to-date. Using technical jargon without explanation violates these best practice standards.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Para 52) — Part II: Best Practice Standards, p.289"},
{id:320,ch:13,cn:"MAS Notice 120",t:"Group KYC assesses:",o:["Individual medical histories of all members","Size, composition, and claims history of group","Personal finances of each employee","Religious demographics"],a:1,e:"Under Division 4 of Notice 120 (Paragraph 36), the KYC requirements for group insurance require the A&H insurance intermediary to collect: the policy owner's objectives (financial impact to be protected against, mode of benefit payment, class of hospital ward), the size and composition of the group (including a breakdown by gender, age, income, and occupation), the claims history of the group, and any medical conditions that group members may have. Individual personal finances and religious demographics are not assessed.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Para 36) — Division 4: Group KYC, p.286"},
{id:321,ch:13,cn:"MAS Notice 120",t:"Switching disclosure must be provided:",o:["Verbally only","In writing — fees/charges and benefit changes","Only if client requests","Through MAS portal"],a:1,e:"Under Notice 120 (Paragraph 46), when a policy owner is considering switching from one A&H policy to another, the A&H insurance intermediary must disclose in writing: (a) any fee or charge the policy owner would have to bear, and (b) the changes in level of benefits. This written disclosure ensures the policy owner can make an informed decision on whether to proceed with the switch, understanding the full financial impact.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Para 46) — Division 4: Switching Disclosure, p.288"},
{id:322,ch:13,cn:"MAS Notice 120",t:"Monitoring of switching for long-term A&H policies includes:",o:["Ignoring all switches","Tracking switching volume and flagging high-volume reps","Only monitoring annual switches","No monitoring required"],a:1,e:"Under Part II of Notice 120 (Paragraphs 54-59), A&H insurance intermediaries should institute controls to monitor switching of long-term A&H policies. This includes: tracking the volume of switches to identify representatives with unusually high switching transactions, ensuring each switch recommended by a representative is reviewed by a supervisor for appropriateness, and implementing procedures to identify unusual trends. The policy owner should also declare in writing whether the representative advised the switch.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Para 57) — Part II: Monitoring of Switching, p.290"},
{id:323,ch:13,cn:"MAS Notice 120",t:"The word 'Shield' can only be used for policies that are:",o:["Sold by government agencies","MediSave-approved","Covering Class A wards","Guaranteed renewable for life"],a:1,e:"Division 1 of Notice 120 (Paragraph 10A) states that no direct insurer shall use the word 'Shield' in the name, description, or title of any accident and health policy unless that policy is a MediSave-approved policy (i.e. an Integrated Shield Plan, non-Integrated Shield Plan, or supplementary disability insurance policy). This restriction protects consumers from being misled into thinking a non-MediSave product has government-linked benefits.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Para 10A) — Division 1: Shield Naming, p.278"},
{id:324,ch:13,cn:"MAS Notice 120",t:"When no suitable policy is identified, adviser should:",o:["Recommend the cheapest available policy","Inform the client so they can seek alternatives","Sell the most popular policy","Refer to another adviser immediately"],a:1,e:"Under Division 4 of Notice 120 (Paragraph 39), where the A&H insurance intermediary is unable to identify a suitable policy for the client based on the needs analysis, it must inform the policy owner accordingly. This allows the client to seek alternatives from other insurers or intermediaries. The adviser should not recommend an unsuitable product just to make a sale, as this would violate the requirement to have a reasonable basis for providing advice.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Para 39) — Division 4: No Suitable Policy, p.287"},
{id:325,ch:13,cn:"MAS Notice 120",t:"Disclosure requirements for A&H sales include all EXCEPT:",o:["Nature and objective of policy","Intermediary's personal investment portfolio","Benefits and risks","Free-look period details"],a:1,e:"Division 1A of Notice 120 requires disclosure of: the nature and objective of the policy, benefits and risks, premium payment terms, free-look period, exclusions and limitations, claim procedures, and warnings. The intermediary's personal investment portfolio is not a disclosure requirement — disclosures relate to the policy being sold, not the adviser's personal finances.",r:"HI 8th Ed, Ch 13, Section 3 (Appendix 13A, Para 17) — Division 1A: Disclosure Requirements, p.279"},
// Ch 14 — FNA (5 questions)
{id:326,ch:14,cn:"Financial Needs Analysis",t:"Fact-finding is the process of obtaining answers about a client's:",o:["Investment preferences only","Personal circumstances, finance, and ambitions","Medical history only","Employment history only"],a:1,e:"Fact-finding is the process of obtaining answers about a client's personal circumstances, financial situation, and ambitions. It goes beyond just medical or employment history — the adviser needs a holistic view including family situation, income, assets, liabilities, existing insurance coverage, and future goals. This information forms the basis for identifying and quantifying the client's health insurance needs.",r:"HI 8th Ed, Ch 14, Section 3 — What Is Fact Finding?, p.305"},
{id:327,ch:14,cn:"Financial Needs Analysis",t:"Method 2 for quantifying DI protection is based on:",o:["75% of monthly salary","Monthly expenses instead of income","Lump sum benefit","Annual bonus"],a:1,e:"There are three methods for quantifying Disability Income (DI) protection needs: Method 1 uses 75% of gross monthly salary, Method 2 uses monthly expenses instead of income (useful when expenses differ significantly from income), and Method 3 calculates a lump sum TPD benefit. Method 2 is appropriate when the client's lifestyle costs are the better measure of financial need during disability.",r:"HI 8th Ed, Ch 14, Section 4B — Quantifying DI Protection Needs, pp.308–310"},
{id:328,ch:14,cn:"Financial Needs Analysis",t:"Hospital Cash Income need is estimated as:",o:["Total monthly expense + existing hospital cash","Total monthly expense − existing hospital cash benefit","75% of monthly salary","Annual income ÷ 12"],a:1,e:"The estimated Hospital Cash Income protection need is calculated as: Total monthly expense minus existing hospital cash benefit per month. This gap analysis identifies how much additional hospital cash coverage the client needs to maintain their standard of living during hospitalisation, after accounting for any existing coverage they already hold.",r:"HI 8th Ed, Ch 14, Section 4C — Hospital Cash Income, p.311"},
{id:329,ch:14,cn:"Financial Needs Analysis",t:"Young working adults primarily need protection against:",o:["Retirement planning only","Disability and long-term sickness affecting earnings","Estate planning","Children's education only"],a:1,e:"At the active employment stage, young working adults' primary risk is disability and long-term sickness that could affect their earning capacity. Health insurance needs vary by life stage: young adults need DI and MEI protection, those with families add CI and LTC considerations, and older adults prioritise MEI, LTC, and CI coverage as health risks increase with age.",r:"HI 8th Ed, Ch 14, Section 4A — Life Stage Considerations, pp.306–307"},
{id:330,ch:14,cn:"Financial Needs Analysis",t:"If your company has no suitable product for the client, you should:",o:["Sell the closest available product anyway","Let the client know so they can find alternatives","Refuse to provide any advice","Recommend a competitor's product directly"],a:1,e:"One of the three basic principles of product recommendation is: if the company does not have a suitable product to recommend, the adviser must let the client know so they can seek alternatives elsewhere. The other two principles are: recommend only products that meet identified needs, and explain why the recommended product meets those needs. Selling an unsuitable product violates the adviser's duty of care.",r:"HI 8th Ed, Ch 14, Section 5 — Product Recommendations, p.315"}
]}
};

const M9_PAPERS={paper1:{name:"Paper 1",desc:"85 Questions · All Chapters",questions:[
{id:1,ch:1,cn:"Risk And Life Insurance",t:"A factory owner installs fire sprinklers and conducts regular safety drills to minimise the impact of potential fires. Which method of dealing with risk does this best illustrate?",o:["Risk avoidance","Risk control","Risk retention","Risk transfer"],a:1,e:"Risk control involves taking steps to reduce the frequency or severity of losses. Installing sprinklers and conducting drills are loss-reduction measures. Avoidance means not engaging in the activity at all, retention means bearing the loss yourself, and transfer means shifting the risk to another party such as an insurer.",r:"Ch.1, p.7"},
{id:2,ch:1,cn:"Risk And Life Insurance",t:"Why is speculative risk generally considered uninsurable, unlike pure risk?",o:["Speculative risk involves only the possibility of loss","Speculative risk can result in a gain, loss, or no change, making it difficult to calculate premiums","Speculative risk affects too few people to apply the law of large numbers","Speculative risk is always catastrophic in nature"],a:1,e:"Speculative risk has three possible outcomes — gain, loss, or no change — which makes it unsuitable for insurance. Insurance is designed for pure risks where there are only two outcomes: loss or no loss. The unpredictable gain element in speculative risk makes premium calculation impractical.",r:"Ch.1, p.2"},
{id:3,ch:1,cn:"Risk And Life Insurance",t:"Mr Tan purchases a life insurance policy on his own life and names his wife as the beneficiary. At what point must insurable interest exist for this policy to be valid?",o:["Only at the time the claim is made","Both at inception and at the time of claim","Only at inception of the policy","At any point during the policy term"],a:2,e:"For life insurance in Singapore, insurable interest must exist at the inception (commencement) of the policy. Unlike general insurance, it does not need to exist at the time of the claim (death). A person always has unlimited insurable interest in their own life.",r:"Ch.1, p.18"},
{id:4,ch:1,cn:"Risk And Life Insurance",t:"A policyholder files a complaint against an insurer with FIDReC for a dispute arising on 15 August 2024. What is the maximum claim amount that FIDReC can adjudicate?",o:["S$50,000","S$100,000","S$150,000","S$200,000"],a:2,e:"For disputes arising on or after 1 July 2024, FIDReC can adjudicate claims up to S$150,000. For disputes before that date, the limit was S$100,000. The three stages of FIDReC's process are case management, mediation, and adjudication.",r:"Ch.1, p.27"},
{id:5,ch:1,cn:"Risk And Life Insurance",t:"Which of the following best describes the concept of anti-selection in life insurance?",o:["Insurers selecting only low-risk applicants to insure","Individuals with higher risk being more likely to seek insurance coverage","Policyholders deliberately concealing material facts from the insurer","Agents recommending unsuitable products to earn higher commissions"],a:1,e:"Anti-selection (also called adverse selection) occurs when individuals who know they have a greater exposure to risk are more inclined to purchase insurance. This creates a disproportionate number of high-risk individuals in the insured pool, which can lead to higher-than-expected claims for the insurer.",r:"Ch.1, p.11"},
{id:6,ch:2,cn:"Setting Life Insurance Premium",t:"When an insurer calculates the gross premium for a life insurance policy, which of the following components is NOT typically included?",o:["Expected mortality costs","Investment income earned on premiums","The policyholder's personal savings target","Administrative and distribution expenses"],a:2,e:"Gross premium calculation considers mortality/morbidity costs, expected investment income (which reduces the premium), and the insurer's operating expenses. A policyholder's personal savings target is not a factor in how the insurer prices the policy.",r:"Ch.2, p.34"},
{id:7,ch:2,cn:"Setting Life Insurance Premium",t:"Why does an annual premium payment mode typically cost less in total than paying the same premium on a monthly basis?",o:["Monthly premiums attract a higher commission rate for the adviser","The insurer incurs lower administrative costs with fewer payment transactions","Monthly payments are subject to additional government taxes","Annual premiums are exempt from GST while monthly premiums are not"],a:1,e:"When premiums are paid annually, the insurer processes only one transaction per year rather than twelve, significantly reducing administrative costs. Insurers pass these savings on to the policyholder, making annual payments cheaper overall than the sum of monthly payments.",r:"Ch.2, p.38"},
{id:8,ch:2,cn:"Setting Life Insurance Premium",t:"How does a higher sum assured generally affect the premium charged for a life insurance policy?",o:["It has no effect since premiums depend only on age","It reduces the premium per unit of coverage due to economies of scale","It increases the total premium payable","It only affects the premium if the policy is participating"],a:2,e:"A higher sum assured means the insurer takes on a larger potential liability, which directly increases the total premium. While the rate per thousand may sometimes decrease slightly due to economies of scale, the overall premium payable rises with the sum assured.",r:"Ch.2, p.37"},
{id:9,ch:2,cn:"Setting Life Insurance Premium",t:"An insurer uses mortality tables as a key input when setting life insurance premiums. What do these tables primarily measure?",o:["The average investment return expected on policy reserves","The probability of death at each age for a defined population","The likelihood of policyholders surrendering their policies early","The expected expenses incurred per policy issued"],a:1,e:"Mortality tables show the probability of death at each age based on statistical data from a large population. Insurers use these rates to estimate expected death claims, which form a fundamental component of premium calculation.",r:"Ch.2, p.34"},
{id:10,ch:2,cn:"Setting Life Insurance Premium",t:"Between two applicants of the same age applying for identical whole life policies, why would a smoker typically be charged a higher premium than a non-smoker?",o:["Smokers are required by law to pay a surcharge on insurance premiums","Smokers statistically have higher mortality rates, increasing the insurer's expected claims","Non-smokers receive government subsidies that reduce their premiums","Smoking status only affects premiums for health insurance, not life insurance"],a:1,e:"Smoking is a well-established risk factor that increases mortality rates. Insurers charge smokers higher premiums because statistical evidence shows they are more likely to die earlier, resulting in higher expected claims for the insurer. This is a standard underwriting consideration for life insurance.",r:"Ch.2, p.36"},
{id:11,ch:3,cn:"Classification Of Life Insurance Products",t:"Under the statutory insurance fund classification, which three main categories do life insurance products fall into?",o:["Term, whole life, and endowment","Participating, non-participating, and investment-linked","Individual, joint, and group","Single premium, regular premium, and limited premium"],a:1,e:"Life insurance products are classified by statutory insurance fund into three categories: participating (par), non-participating (non-par), and investment-linked policies (ILPs). Each type is maintained in a separate fund as required by the Insurance Act.",r:"Ch.3, p.43"},
{id:12,ch:3,cn:"Classification Of Life Insurance Products",t:"What is the key difference between a contributory and a non-contributory group life insurance scheme?",o:["Contributory schemes cover only full-time employees while non-contributory schemes cover all staff","In a contributory scheme, employees pay part of the premium; in a non-contributory scheme, the employer pays the entire premium","Contributory schemes provide higher benefits than non-contributory schemes","Non-contributory schemes require medical underwriting while contributory schemes do not"],a:1,e:"In a contributory group scheme, both the employer and employees share the cost of premiums. In a non-contributory scheme, the employer bears the full premium cost. Non-contributory schemes typically require a higher percentage of eligible employees to participate.",r:"Ch.3, p.48"},
{id:13,ch:3,cn:"Classification Of Life Insurance Products",t:"A policy covers both a husband and wife under a single contract, with the death benefit payable upon the first death. What type of policy ownership is this?",o:["Single life policy","Third-party policy","Joint life policy","Group life policy"],a:2,e:"A joint life policy covers two or more lives under a single contract. When the benefit is payable on the first death, it provides financial protection for the surviving spouse. This differs from single life (one person) and group life (employer-sponsored scheme).",r:"Ch.3, p.47"},
{id:14,ch:3,cn:"Classification Of Life Insurance Products",t:"Which classification method groups life insurance products based on whether premiums are paid as a lump sum or over a period of time?",o:["By statutory insurance fund","By product type","By premium type","By ownership"],a:2,e:"Classification by premium type distinguishes between single premium policies (one lump sum payment) and regular premium policies (periodic payments over time). This is different from classification by fund type (par/non-par/ILP) or by ownership (single/joint/group).",r:"Ch.3, p.46"},
{id:15,ch:3,cn:"Classification Of Life Insurance Products",t:"In a group life insurance arrangement, who is the policy owner and who are the insured persons?",o:["Each employee owns their individual portion of the policy","The employer is the policy owner, and the employees are the lives insured","The insurer acts as the policy owner on behalf of the group","A trustee appointed by the employees owns the policy"],a:1,e:"In a group life insurance contract, the employer (or organisation) is the policy owner who enters into the contract with the insurer. The individual employees or members are the lives insured under the master policy. The employer is responsible for premium payments and policy administration.",r:"Ch.3, p.47"},
{id:16,ch:4,cn:"Traditional Life Insurance Products",t:"Mr Lee holds a 20-year decreasing term insurance policy linked to his housing loan. Why does the sum assured reduce over the policy term?",o:["Because the insurer gradually reduces coverage to save costs","Because the outstanding loan balance decreases over time as repayments are made","Because term insurance policies always have decreasing benefits","Because the policyholder's age increases, reducing the amount of coverage needed"],a:1,e:"Decreasing term insurance is commonly used to cover a reducing liability such as a housing loan. As the borrower makes regular repayments, the outstanding loan balance decreases, so the sum assured is designed to mirror this declining debt. If the borrower dies, the payout covers the remaining loan.",r:"Ch.4, p.53"},
{id:17,ch:4,cn:"Traditional Life Insurance Products",t:"What is the primary advantage of a convertible term insurance policy compared to a standard term policy?",o:["It provides a cash surrender value at the end of the term","It allows the policyholder to convert to a whole life or endowment policy without further medical evidence","It automatically extends coverage beyond the original term","It pays double the sum assured if death occurs due to an accident"],a:1,e:"A convertible term policy gives the policyholder the right to convert the policy to a permanent plan (such as whole life or endowment) without needing to provide evidence of insurability. This is valuable because the policyholder's health may have deteriorated since the original policy was taken out.",r:"Ch.4, p.55"},
{id:18,ch:4,cn:"Traditional Life Insurance Products",t:"Mrs Wong wants to surrender her whole life policy but still needs some insurance protection. Which non-forfeiture option allows her to maintain the original sum assured for a limited period without paying further premiums?",o:["Cash surrender value","Reduced paid-up insurance","Extended term insurance","Automatic premium loan"],a:2,e:"Extended term insurance uses the policy's cash value to purchase term insurance for the same sum assured but for a limited period. Reduced paid-up insurance, by contrast, provides a lower sum assured but maintains coverage for life. Cash surrender simply pays out the cash value and terminates the policy.",r:"Ch.4, p.62"},
{id:19,ch:4,cn:"Traditional Life Insurance Products",t:"An endowment policy matures after 20 years and the policyholder is still alive. What benefit does the policyholder receive?",o:["The policy automatically converts to a whole life plan","The maturity benefit, which is the sum assured plus any accumulated bonuses","Only the total premiums paid are refunded","The policy lapses with no payment since no death occurred"],a:1,e:"An endowment policy pays the maturity benefit if the life insured survives to the end of the policy term. This benefit typically includes the sum assured plus any accumulated bonuses (for participating policies). The dual-benefit nature — paying on death or survival — is a key feature of endowment insurance.",r:"Ch.4, p.65"},
{id:20,ch:4,cn:"Traditional Life Insurance Products",t:"Under MAS disclosure requirements, what document must an insurer provide to a prospective policyholder before the policy is purchased to illustrate potential returns?",o:["The policy contract","A product summary and benefit illustration","The annual bonus update statement","The participating fund report"],a:1,e:"MAS requires insurers to provide a product summary and benefit illustration before purchase. The product summary outlines key features and risks, while the benefit illustration shows projected returns under different scenarios. This ensures the consumer makes an informed decision.",r:"Ch.4, p.71"},
{id:21,ch:5,cn:"Riders",t:"A policyholder becomes totally and permanently disabled and can no longer work. Which rider would waive all future premium payments on their life insurance policy?",o:["Total and permanent disability rider","Waiver of premium rider","Critical illness rider","Payor benefit rider"],a:1,e:"The waiver of premium rider waives future premiums if the policyholder becomes totally and permanently disabled (or in some policies, suffers a critical illness). The TPD rider pays a lump sum benefit for total and permanent disability but does not specifically waive premiums. The waiver of premium rider keeps the base policy in force.",r:"Ch.5, p.83"},
{id:22,ch:5,cn:"Riders",t:"How does a payor benefit rider differ from a standard waiver of premium rider?",o:["The payor benefit rider covers the policy owner who pays premiums on a child's policy if the payor dies or becomes disabled","The payor benefit rider provides an additional death benefit to the policy owner","The payor benefit rider is only available on investment-linked policies","There is no difference; they are the same rider with different names"],a:0,e:"A payor benefit rider is designed for juvenile policies where a parent or guardian pays the premiums. If the payor (parent) dies or becomes disabled, the rider waives future premiums so the child's policy remains in force. A standard waiver of premium rider applies when the life insured (not a third-party payor) becomes disabled.",r:"Ch.5, p.101"},
{id:23,ch:5,cn:"Riders",t:"Mr Lim attaches a guaranteed insurability option rider to his whole life policy. What does this rider allow him to do?",o:["Increase his sum assured at specified future dates without providing medical evidence","Guarantee that his premiums will never increase","Convert his whole life policy to an investment-linked policy at any time","Receive a guaranteed minimum cash surrender value"],a:0,e:"The guaranteed insurability option (GIO) rider allows the policyholder to purchase additional insurance coverage at predetermined future dates or upon specified life events (such as marriage or birth of a child) without needing to provide evidence of insurability. This is valuable if the policyholder's health deteriorates.",r:"Ch.5, p.104"},
{id:24,ch:5,cn:"Riders",t:"What is the key characteristic that distinguishes an accidental death and dismemberment rider from a basic accidental death benefit rider?",o:["The AD&D rider covers death from illness as well as accidents","The AD&D rider pays benefits for loss of limbs or sight in addition to accidental death","The AD&D rider has no age limit for coverage","The AD&D rider provides coverage worldwide while the ADB rider does not"],a:1,e:"An accidental death and dismemberment (AD&D) rider provides benefits not only for accidental death but also for the loss of limbs, sight, hearing, or speech due to an accident. A basic accidental death benefit (ADB) rider only pays an additional sum upon death caused by an accident.",r:"Ch.5, p.111"},
{id:25,ch:5,cn:"Riders",t:"Under a critical illness rider, when is the benefit typically payable to the policyholder?",o:["Immediately upon diagnosis of any illness","Upon diagnosis of a covered critical illness and survival for a specified waiting period","Only upon the death of the life insured due to the critical illness","When the policyholder is hospitalised for more than 30 days"],a:1,e:"Critical illness riders pay a lump sum benefit upon the diagnosis of a specified critical illness, provided the life insured survives for a stipulated waiting period (typically 30 days) after diagnosis. The benefit is payable while the insured is alive and is not conditional on death.",r:"Ch.5, p.90"},
{id:26,ch:6,cn:"Participating Life Insurance Policies",t:"What is the fundamental difference between guaranteed and non-guaranteed benefits in a participating life insurance policy?",o:["Guaranteed benefits are paid only on death, while non-guaranteed benefits are paid only on maturity","Guaranteed benefits are contractually promised by the insurer, while non-guaranteed benefits depend on the performance of the participating fund","Guaranteed benefits are higher than non-guaranteed benefits in all circumstances","There is no difference; both are equally certain to be paid"],a:1,e:"Guaranteed benefits (such as the basic sum assured) are contractually promised and must be paid by the insurer. Non-guaranteed benefits (bonuses/dividends) depend on the performance of the participating fund and may vary or not be paid at all. This distinction is critical for policyholders to understand.",r:"Ch.6, p.157"},
{id:27,ch:6,cn:"Participating Life Insurance Policies",t:"How does a reversionary bonus differ from a cash dividend in a participating policy?",o:["Reversionary bonuses are declared annually and added to the sum assured, while cash dividends are paid out in cash","Reversionary bonuses are only paid at maturity, while cash dividends are paid monthly","Reversionary bonuses are guaranteed, while cash dividends are not","There is no difference; they are alternative names for the same benefit"],a:0,e:"A reversionary bonus is declared periodically and added to the policy's sum assured, becoming payable on death or maturity. Once declared, it typically cannot be removed. Cash dividends, on the other hand, are distributed as cash payments to the policyholder and are not added to the sum assured.",r:"Ch.6, p.138"},
{id:28,ch:6,cn:"Participating Life Insurance Policies",t:"What is the purpose of a terminal bonus (also known as a special or final bonus) in a participating policy?",o:["To penalise policyholders who surrender their policies early","To distribute the remaining surplus of the participating fund at the policy's termination","To guarantee a minimum return for policyholders","To cover the insurer's administrative costs at policy expiry"],a:1,e:"A terminal bonus is a one-time bonus paid when the policy matures, is surrendered, or a death claim is made. It represents the policyholder's share of any remaining surplus in the participating fund that has not been distributed through regular reversionary bonuses.",r:"Ch.6, p.140"},
{id:29,ch:6,cn:"Participating Life Insurance Policies",t:"Which document must an insurer provide annually to keep participating policyholders informed about their policy's bonus performance?",o:["A new product summary","An annual bonus update statement","A revised policy contract","A participating fund audit report"],a:1,e:"Insurers are required to provide participating policyholders with an annual bonus update statement. This document shows the bonuses declared for the year, the total accumulated bonuses, and the current projected values, helping policyholders track how their policy is performing.",r:"Ch.6, p.152"},
{id:30,ch:6,cn:"Participating Life Insurance Policies",t:"Why is the governance of participating funds important for policyholders?",o:["It ensures that the fund's investment strategy maximises short-term returns","It protects policyholders' interests by ensuring fair allocation of profits between shareholders and policyholders","It guarantees that bonuses will always increase each year","It prevents policyholders from surrendering their policies early"],a:1,e:"Participating fund governance ensures that the interests of participating policyholders are protected. Key concerns include the fair distribution of surplus between policyholders and shareholders, appropriate investment strategies, and transparent bonus allocation processes. MAS provides guidelines on the governance of these funds.",r:"Ch.6, p.157"},
{id:31,ch:7,cn:"ILPs: Types, Features, Benefits And Risks",t:"What makes an investment-linked policy fundamentally different from a traditional whole life policy?",o:["ILPs do not provide any life insurance coverage","ILP premiums are invested in sub-funds chosen by the policyholder, and the policy value depends on unit prices","ILPs guarantee a minimum cash surrender value at all times","ILPs can only be purchased with CPF savings"],a:1,e:"An ILP combines life insurance protection with an investment component. Unlike traditional policies where the insurer manages investments and provides guarantees, ILP premiums (after charges) are used to purchase units in sub-funds selected by the policyholder. The policy value fluctuates with the unit prices of those sub-funds.",r:"Ch.7, p.166"},
{id:32,ch:7,cn:"ILPs: Types, Features, Benefits And Risks",t:"Before purchasing an ILP, a financial adviser should assess several key factors about the client. Which of the following is NOT one of these factors?",o:["The client's insurance needs and existing coverage","The client's risk profile and investment experience","The client's preferred brand of insurance company","The client's investment time horizon and objectives"],a:2,e:"Before recommending an ILP, a financial adviser must assess the client's insurance needs, risk profile, investment objectives, and time horizon. The brand preference of the client is not a suitability factor. The adviser has a duty to recommend products that match the client's financial situation and risk appetite.",r:"Ch.7, p.172"},
{id:33,ch:7,cn:"ILPs: Types, Features, Benefits And Risks",t:"How does dollar cost averaging benefit a regular premium ILP policyholder?",o:["It guarantees a profit on the investment over time","It results in purchasing more units when prices are low and fewer units when prices are high, potentially lowering the average cost per unit","It eliminates all investment risk from the policy","It ensures the unit price only moves upward"],a:1,e:"Dollar cost averaging occurs when a fixed premium amount is invested regularly regardless of market conditions. When unit prices fall, more units are purchased; when prices rise, fewer units are bought. Over time, this can result in a lower average cost per unit compared to investing a lump sum, though it does not guarantee profits.",r:"Ch.7, p.181"},
{id:34,ch:7,cn:"ILPs: Types, Features, Benefits And Risks",t:"Which of the following is a key risk that ILP policyholders must be aware of?",o:["The insurer may refuse to pay the death benefit if markets perform poorly","Insurance charges may increase with age and are not guaranteed, potentially eroding the policy's unit value","ILP sub-funds are guaranteed by the Singapore government","Policyholders cannot switch between sub-funds once selected"],a:1,e:"A significant risk of ILPs is that insurance (mortality) charges increase with age and are deducted by cancelling units. If investment returns are poor and charges rise, units may be depleted faster than expected, potentially leaving insufficient units to sustain the policy. Investment returns and insurance charges are not guaranteed.",r:"Ch.7, p.183"},
{id:35,ch:7,cn:"ILPs: Types, Features, Benefits And Risks",t:"What is the difference between front-end loading and back-end loading in an ILP?",o:["Front-end loading charges fees when premiums are invested; back-end loading charges fees when units are withdrawn or surrendered","Front-end loading applies only to single premium ILPs; back-end loading applies only to regular premium ILPs","Front-end loading is a government tax; back-end loading is an insurer's charge","There is no difference; both terms refer to the initial sales charge"],a:0,e:"Front-end loading deducts charges from premiums before they are invested in sub-funds, meaning fewer units are allocated upfront. Back-end loading allows the full premium to be invested but imposes charges when units are withdrawn or the policy is surrendered, typically on a declining scale over time.",r:"Ch.7, p.176"},
{id:36,ch:8,cn:"Investment-linked Sub-Funds",t:"What is the primary difference between an accumulation sub-fund and a distribution sub-fund in an ILP?",o:["Accumulation funds invest only in equities, while distribution funds invest only in bonds","Accumulation funds reinvest all income to grow unit value, while distribution funds pay out regular income to unitholders","Accumulation funds are lower risk than distribution funds","Accumulation funds are only available for single premium ILPs"],a:1,e:"An accumulation sub-fund reinvests all investment income (dividends, interest) back into the fund, increasing the unit price over time. A distribution sub-fund pays out regular income (distributions) to unitholders, which may result in a lower unit price growth rate.",r:"Ch.8, p.187"},
{id:37,ch:8,cn:"Investment-linked Sub-Funds",t:"A feeder fund invests all or substantially all of its assets into another fund. What is the fund that receives these assets commonly called?",o:["A mirror fund","A mother fund","A managed portfolio","A capital guaranteed fund"],a:1,e:"A feeder fund channels its investments into a mother fund (also called the underlying fund). The mother fund manages the actual investment portfolio. This structure allows multiple feeder funds to pool resources into a single mother fund, achieving economies of scale in investment management.",r:"Ch.8, p.187"},
{id:38,ch:8,cn:"Investment-linked Sub-Funds",t:"Which type of ILP sub-fund primarily invests in government and corporate debt securities to provide regular income with relatively lower risk?",o:["Equity fund","Property fund","Fixed income or bond fund","Specialised fund"],a:2,e:"Fixed income or bond funds invest primarily in government bonds, corporate bonds, and other debt instruments. They aim to provide regular income through interest payments and are generally considered lower risk than equity funds, though they are still subject to interest rate risk and credit risk.",r:"Ch.8, p.188"},
{id:39,ch:8,cn:"Investment-linked Sub-Funds",t:"What does the switching facility in an ILP allow a policyholder to do?",o:["Switch the policy between different insurers","Transfer units from one sub-fund to another within the same ILP","Change the life insured on the policy","Convert the ILP into a traditional participating policy"],a:1,e:"The switching facility allows ILP policyholders to transfer their units between different sub-funds offered within the same ILP. This enables policyholders to adjust their investment portfolio in response to changing market conditions, risk appetite, or investment objectives. Some insurers allow a number of free switches per year.",r:"Ch.8, p.191"},
{id:40,ch:8,cn:"Investment-linked Sub-Funds",t:"A managed fund within an ILP invests across multiple asset classes including equities, bonds, and cash. What is the main benefit of this approach?",o:["It guarantees a minimum return for the policyholder","It provides diversification across asset classes, reducing overall portfolio risk","It eliminates the need for the policyholder to monitor their investment","It ensures the fund always outperforms the stock market"],a:1,e:"A managed fund (also called a balanced fund) invests across different asset classes such as equities, bonds, and cash. This diversification helps reduce overall portfolio risk because different asset classes tend to perform differently under various market conditions. However, it does not guarantee returns or eliminate risk entirely.",r:"Ch.8, p.189"},
{id:41,ch:9,cn:"ILPs: Computational Aspects",t:"Under a DB3 (Death Benefit Type 3) ILP, how is the death benefit calculated?",o:["The death benefit is the sum assured only","The death benefit is the higher of the sum assured or the fund value","The death benefit is the sum assured plus the fund value","The death benefit equals the total premiums paid"],a:1,e:"Under DB3, the death benefit is the higher of the sum assured or the fund value (total value of units held). This means the policyholder's beneficiary receives at least the sum assured, but if the fund value exceeds the sum assured, they receive the higher fund value instead.",r:"Ch.9, p.199"},
{id:42,ch:9,cn:"ILPs: Computational Aspects",t:"How does the mortality charge calculation differ between a DB3 and a DB4 investment-linked policy?",o:["DB3 has no mortality charge while DB4 does","Under DB3, mortality charges are based on the net amount at risk (sum assured minus fund value), while under DB4, they are based on the full sum assured","Under DB4, mortality charges decrease as the policyholder ages","Both DB3 and DB4 calculate mortality charges identically"],a:1,e:"For DB3, since the death benefit is the higher of sum assured or fund value, the insurer's net amount at risk decreases as the fund value grows. Mortality charges are based on this net amount at risk. For DB4, where the death benefit is the sum assured PLUS the fund value, the mortality charge is based on the full sum assured.",r:"Ch.9, p.203"},
{id:43,ch:9,cn:"ILPs: Computational Aspects",t:"A policyholder invests $1,000 in an ILP with an allocation rate of 105%. How many units will be allocated if the unit price is $1.00?",o:["1,000 units","1,050 units","950 units","1,100 units"],a:1,e:"An allocation rate of 105% means that for every $1,000 invested, $1,050 worth of units are allocated. At a unit price of $1.00, this results in 1,050 units. Allocation rates above 100% (bonus allocation) are sometimes offered by insurers as an incentive, particularly for higher premium amounts.",r:"Ch.9, p.201"},
{id:44,ch:9,cn:"ILPs: Computational Aspects",t:"When calculating the surrender benefit of an ILP, what is typically deducted from the fund value?",o:["Future premiums that would have been payable","Any applicable surrender charges","The total mortality charges already deducted","The original sum assured of the policy"],a:1,e:"The surrender benefit of an ILP is the fund value (total units multiplied by the current bid/sell price) minus any applicable surrender charges. Surrender charges are usually highest in the early policy years and decrease over time, eventually reaching zero after a specified period.",r:"Ch.9, p.211"},
{id:45,ch:9,cn:"ILPs: Computational Aspects",t:"A policyholder makes a partial withdrawal from their ILP. How does this affect the policy?",o:["The sum assured is automatically reduced by the withdrawal amount","Units are cancelled from the fund to pay the withdrawal, reducing the fund value","The policy immediately lapses upon any partial withdrawal","Partial withdrawals are not permitted under any ILP"],a:1,e:"A partial withdrawal from an ILP is effected by cancelling the corresponding number of units at the prevailing bid price. This reduces the total fund value but the policy remains in force as long as sufficient units remain to cover ongoing charges. Some policies may also reduce the sum assured upon partial withdrawal.",r:"Ch.9, p.209"},
{id:46,ch:10,cn:"Annuities And Other Life Insurance Products",t:"What is the primary purpose of an annuity product in the context of retirement planning?",o:["To provide a lump sum death benefit to the policyholder's beneficiaries","To provide a regular stream of income during retirement to address longevity risk","To accumulate savings for a child's education","To provide critical illness coverage during retirement"],a:1,e:"Annuities are designed to address longevity risk — the risk of outliving one's financial resources. They convert a lump sum or accumulated savings into a regular income stream, typically during retirement. This provides financial security for as long as the annuitant lives.",r:"Ch.10, p.220"},
{id:47,ch:10,cn:"Annuities And Other Life Insurance Products",t:"How does a deferred annuity differ from an immediate annuity?",o:["A deferred annuity pays higher monthly benefits than an immediate annuity","A deferred annuity has an accumulation phase before payouts begin, while an immediate annuity starts payments shortly after purchase","A deferred annuity can only be purchased with CPF savings","An immediate annuity does not provide any life insurance coverage"],a:1,e:"An immediate annuity begins paying income shortly after a lump sum premium is paid. A deferred annuity has two phases: an accumulation phase where premiums are paid and the fund grows, followed by a payout phase when regular income begins at a future date. Deferred annuities suit younger individuals planning for future retirement.",r:"Ch.10, p.222"},
{id:48,ch:10,cn:"Annuities And Other Life Insurance Products",t:"Under the CPF LIFE scheme, what happens to a member's annuity payments if the member passes away before the total payouts exceed the premiums paid?",o:["All remaining funds are forfeited to the CPF Board","A bequest is paid to the member's beneficiaries or estate","The payments continue to the member's spouse for life","The premiums paid are donated to a government charity"],a:1,e:"Under CPF LIFE, if a member dies and the total payouts received are less than the premiums paid into the scheme, a bequest (the difference between premiums paid and payouts received, adjusted for interest) is paid to the member's beneficiaries or estate.",r:"Ch.10, p.220"},
{id:49,ch:10,cn:"Annuities And Other Life Insurance Products",t:"What is a key feature of a universal life insurance policy that distinguishes it from traditional whole life insurance?",o:["Universal life does not provide any death benefit","Universal life offers flexible premiums and an adjustable death benefit","Universal life policies cannot accumulate any cash value","Universal life is only available as a group policy"],a:1,e:"Universal life insurance provides flexibility that traditional whole life does not. Policyholders can adjust their premium payments (within limits) and may be able to increase or decrease the death benefit. The policy has a cash value component that earns interest, and the policyholder can see the breakdown of charges and credits.",r:"Ch.10, p.233"},
{id:50,ch:10,cn:"Annuities And Other Life Insurance Products",t:"A retiree is considering an annuity that provides payouts for life with a guaranteed payment period of 10 years. What does the guaranteed period mean?",o:["The insurer guarantees the unit price will not fall for 10 years","If the annuitant dies within the first 10 years, payments continue to the beneficiary for the remainder of that period","The annuitant can cancel the policy within the first 10 years for a full refund","The payout amount is guaranteed to increase every year for 10 years"],a:1,e:"A guaranteed payment period means that even if the annuitant dies within that period, annuity payments continue to the nominated beneficiary for the remaining guaranteed years. For example, if the annuitant dies after 3 years with a 10-year guarantee, the beneficiary receives payments for the remaining 7 years.",r:"Ch.10, p.224"},
{id:51,ch:11,cn:"Application And Underwriting",t:"What is the primary purpose of the proposal form in the life insurance application process?",o:["To serve as the insurance contract between the insurer and the applicant","To collect information about the applicant so the insurer can assess and classify the risk","To calculate the exact premium payable by the applicant","To notify the applicant of all policy exclusions"],a:1,e:"The proposal form is the key document used to collect information about the applicant, including personal details, health history, lifestyle habits, occupation, and financial situation. This information enables the insurer's underwriters to assess the level of risk and decide whether to accept, modify, or decline the application.",r:"Ch.11, p.239"},
{id:52,ch:11,cn:"Application And Underwriting",t:"When does an underwriter typically require an attending physician's report (APR) in addition to the standard proposal form?",o:["For all applications regardless of the sum assured","When the applicant discloses a medical condition or the sum assured exceeds certain limits","Only when the applicant is under 18 years old","Only for investment-linked policy applications"],a:1,e:"An attending physician's report is requested when the applicant has disclosed a medical condition that requires further investigation, or when the sum assured exceeds thresholds set by the insurer. The APR provides detailed medical information from the applicant's own doctor to help the underwriter assess the risk more accurately.",r:"Ch.11, p.246"},
{id:53,ch:11,cn:"Application And Underwriting",t:"After completing the underwriting assessment, an insurer may accept the application with modified terms. Which of the following is an example of a modified acceptance?",o:["Offering the policy at standard premium rates","Charging a higher premium (loading) due to the applicant's health condition","Declining the application entirely","Asking the applicant to resubmit the form"],a:1,e:"A modified acceptance means the insurer agrees to provide coverage but with altered terms. This could include charging an extra premium (loading) for higher-risk applicants, excluding specific conditions, reducing the sum assured, or imposing a waiting period. This allows coverage for applicants who do not qualify for standard terms.",r:"Ch.11, p.249"},
{id:54,ch:11,cn:"Application And Underwriting",t:"At what point does the insurance risk typically commence for a new life insurance policy?",o:["When the applicant signs the proposal form","When the insurer accepts the risk and the first premium is paid","When the policy document is delivered to the policyholder","30 days after the application is submitted"],a:1,e:"Insurance risk generally commences when two conditions are met: the insurer has accepted the application (underwriting is complete) and the first premium has been paid. Some insurers may provide interim cover through a conditional premium deposit receipt while the application is being processed.",r:"Ch.11, p.250"},
{id:55,ch:11,cn:"Application And Underwriting",t:"How does group life underwriting differ from individual life underwriting?",o:["Group life underwriting always requires medical examinations for every member","Group life underwriting relies on the characteristics of the group as a whole rather than individual risk assessment","Group life underwriting uses higher premium rates than individual underwriting","Group life underwriting does not consider the occupation of the group members"],a:1,e:"Group life underwriting assesses the risk based on the group's overall characteristics — such as the industry, average age, group size, and type of work — rather than underwriting each individual member. This makes it more efficient and generally results in lower administrative costs, though individual assessment may apply for very high coverage amounts.",r:"Ch.11, p.252"},
{id:56,ch:12,cn:"Policy Services",t:"What is the purpose of a conditional premium deposit receipt issued by an insurer?",o:["It confirms that the policy has been fully underwritten and accepted","It provides temporary insurance coverage while the application is being processed, subject to certain conditions","It guarantees that the applicant will be accepted at standard rates","It serves as the final policy document"],a:1,e:"A conditional premium deposit receipt provides interim coverage to the applicant while the insurer processes and underwrites the application. Coverage under this receipt is subject to conditions — typically that the applicant meets the insurer's standard underwriting criteria. If the applicant is later found to be uninsurable, the cover may be void.",r:"Ch.12, p.259"},
{id:57,ch:12,cn:"Policy Services",t:"Mrs Tan wants to transfer ownership of her life insurance policy to her daughter. What legal mechanism is used to effect this transfer?",o:["Policy endorsement","Assignment of the policy","Nomination of the daughter as beneficiary","Surrender and repurchase of a new policy"],a:1,e:"Assignment is the legal transfer of ownership rights in a life insurance policy from one person (the assignor) to another (the assignee). This can be done by way of an absolute assignment (full transfer of all rights) or a conditional assignment (transfer subject to conditions, commonly used for loan security).",r:"Ch.12, p.265"},
{id:58,ch:12,cn:"Policy Services",t:"A policyholder stops paying premiums and the policy lapses after the grace period expires. What options are available to restore the policy?",o:["The policy can never be restored once it has lapsed","The policyholder may apply for reinstatement within a specified period, usually subject to evidence of insurability and payment of overdue premiums","The insurer must automatically reinstate the policy upon receipt of one premium","Reinstatement requires the policyholder to surrender the lapsed policy and purchase a new one"],a:1,e:"Most insurers allow reinstatement of a lapsed policy within a specified period (commonly 2 years). The policyholder must typically provide evidence of good health (insurability), pay all overdue premiums with interest, and satisfy any other conditions set by the insurer. Reinstatement restores the original policy terms.",r:"Ch.12, p.273"},
{id:59,ch:12,cn:"Policy Services",t:"How does a policy loan work in the context of a whole life or endowment policy?",o:["The insurer lends money to the policyholder using the policy's cash value as collateral, and interest is charged on the loan","The policyholder borrows money from a bank using the policy as a guarantee","The insurer gives the policyholder an interest-free advance against future bonuses","Policy loans are only available after the policy has been in force for at least 20 years"],a:0,e:"A policy loan allows the policyholder to borrow money from the insurer using the policy's accumulated cash value as collateral. The insurer charges interest on the outstanding loan. If the loan plus interest exceeds the cash value, the policy may lapse. The policy remains in force as long as the loan does not exceed the available cash value.",r:"Ch.12, p.269"},
{id:60,ch:12,cn:"Policy Services",t:"What happens to a life insurance policy when the policy owner is declared bankrupt in Singapore?",o:["The policy is automatically terminated and all proceeds are forfeited","The policy may vest in the Official Assignee, but policies with trust nominations are protected from creditors","Bankruptcy has no effect on any life insurance policy","The insurer must immediately pay the cash value to the bankrupt's creditors"],a:1,e:"When a policyholder is declared bankrupt, the policy may vest in the Official Assignee as part of the bankrupt's estate. However, policies that have a valid trust nomination (under Section 73 of the Conveyancing and Law of Property Act) are protected and do not form part of the bankrupt's estate.",r:"Ch.12, p.276"},
{id:61,ch:13,cn:"Life Insurance Claims",t:"When a death claim is filed, who is entitled to receive the policy proceeds if no nomination has been made and the policyholder did not leave a will?",o:["The insurer retains the proceeds","The proceeds are paid to the estate of the deceased and distributed according to the Intestate Succession Act (or relevant succession law)","The proceeds are automatically paid to the deceased's employer","The proceeds are donated to a government fund"],a:1,e:"If no nomination exists and there is no will, the policy proceeds form part of the deceased's estate. The legal personal representative (administrator) appointed by the court will distribute the proceeds according to the Intestate Succession Act for non-Muslims, or the Administration of Muslim Law Act for Muslims.",r:"Ch.13, p.281"},
{id:62,ch:13,cn:"Life Insurance Claims",t:"Under what circumstances can an insurer make a payment on a life insurance death claim without requiring a grant of probate or letters of administration?",o:["When the claim amount is below a specified threshold set by the insurer","When the policyholder has made a valid nomination under the Insurance Act","When the beneficiary provides a statutory declaration","Both A and B are correct"],a:3,e:"An insurer can pay death claim proceeds without probate or letters of administration in certain situations: when the policy has a valid nomination under the Insurance Act, and also when the claim amount is below a specified threshold (the insurer may pay to a proper claimant based on a statutory declaration or indemnity). Both A and B are valid scenarios.",r:"Ch.13, p.281"},
{id:63,ch:13,cn:"Life Insurance Claims",t:"What role does a financial adviser play in the claims settlement process for their client?",o:["The adviser has no role once the policy is sold","The adviser assists the claimant with documentation, liaises with the insurer, and helps ensure a smooth claims process","The adviser personally approves or rejects the claim","The adviser is responsible for paying the claim from their own commission"],a:1,e:"The financial adviser plays an important facilitative role in claims. They help the claimant understand the claims process, assist with gathering and submitting the necessary documentation, follow up with the insurer on the progress of the claim, and provide guidance throughout. However, the adviser does not have authority to approve or reject claims.",r:"Ch.13, p.287"},
{id:64,ch:13,cn:"Life Insurance Claims",t:"For a total and permanent disability (TPD) claim, what must the claimant typically demonstrate?",o:["That the disability resulted from an accident only","That the life insured is totally and permanently unable to engage in any occupation for which they are suited by training, education, or experience","That the life insured has been hospitalised for at least 90 consecutive days","That the disability was caused by a pre-existing condition"],a:1,e:"A TPD claim requires evidence that the life insured is totally and permanently unable to perform any occupation for which they are reasonably suited by training, education, or experience. The definition may vary between policies — some use an 'any occupation' definition while others use an 'own occupation' definition. Medical evidence is required.",r:"Ch.13, p.284"},
{id:65,ch:13,cn:"Life Insurance Claims",t:"When is a maturity claim payable under an endowment policy?",o:["When the policyholder decides to surrender the policy early","When the life insured survives to the end of the policy term","Only when the life insured reaches age 65","When the policyholder has paid premiums for at least 10 years"],a:1,e:"A maturity claim is payable when the life insured survives to the end of the specified policy term. The maturity benefit includes the sum assured and any accumulated bonuses (for participating policies). Unlike a death claim, the maturity claim is a scheduled payment triggered by the policyholder surviving the term.",r:"Ch.13, p.285"},
{id:66,ch:14,cn:"The Insurance Contract",t:"For a life insurance contract to be legally valid, which of the following elements must be present?",o:["The policy must be witnessed by a lawyer","There must be offer, acceptance, consideration, legal capacity, and insurable interest","The policyholder must be at least 21 years old","The policy must be registered with MAS"],a:1,e:"A valid insurance contract requires: offer and acceptance (agreement between parties), consideration (premium payment by the policyholder and promise of coverage by the insurer), legal capacity (parties must be competent to contract), insurable interest (policyholder must stand to suffer a financial loss), and consensus ad idem (meeting of minds).",r:"Ch.14, p.292"},
{id:67,ch:14,cn:"The Insurance Contract",t:"A policyholder fails to disclose a material fact on the proposal form that would have influenced the insurer's decision. What is the insurer's likely recourse?",o:["The insurer must continue the policy as normal since the contract is already in force","The insurer may void the contract from inception on the grounds of breach of the duty of utmost good faith","The insurer can only reduce the sum assured proportionally","The insurer must wait until a claim is made before taking any action"],a:1,e:"The duty of utmost good faith requires the applicant to disclose all material facts. A material fact is one that would influence a prudent insurer in deciding whether to accept the risk and on what terms. If the insured fails to disclose such a fact, the insurer may treat the contract as voidable from inception.",r:"Ch.14, p.300"},
{id:68,ch:14,cn:"The Insurance Contract",t:"What is the doctrine of 'non est factum' and how does it relate to insurance contracts?",o:["It means the contract is void because one party was not of sound mind","It is a defence that the person who signed the document did not understand its nature and effect, making the contract void","It refers to the insurer's right to cancel the policy at any time","It means the policy was issued without the payment of premiums"],a:1,e:"Non est factum (literally 'it is not my deed') is a defence that may be raised when a person signs a document without understanding its fundamental nature. If successfully established, the contract is treated as void. However, this defence is narrowly applied and is not available to those who were merely careless in reading the document.",r:"Ch.14, p.305"},
{id:69,ch:14,cn:"The Insurance Contract",t:"How does the doctrine of waiver apply in the context of an insurance contract?",o:["It allows the policyholder to waive their right to receive the policy document","It prevents the insurer from relying on a policy breach if the insurer had knowledge of the breach and chose not to act on it","It permits the insurer to waive the payment of the first premium","It allows the beneficiary to waive their right to the death benefit"],a:1,e:"The doctrine of waiver means that if the insurer knew of a breach by the policyholder (such as non-disclosure of a material fact) but continued to treat the contract as valid (e.g., by accepting premiums), the insurer may be deemed to have waived its right to void the contract on that ground.",r:"Ch.14, p.299"},
