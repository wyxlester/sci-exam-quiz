{id:1,ch:1,cn:"FAA & FAR – Financial Advisers And Representatives",t:"When did the Financial Advisers Act (FAA) officially come into operation in Singapore?",o:["1 January 2001","1 October 2002","1 July 2003","1 April 2004"],a:1,e:"The FAA came into operation on 1 October 2002, establishing the regulatory framework for financial advisory services in Singapore.",r:"Ch.1, p.1-3"},
{id:2,ch:1,cn:"FAA & FAR – Financial Advisers And Representatives",t:"Under the FAA, a financial adviser is defined as which type of entity rather than an individual person?",o:["A partnership","A sole proprietorship","A corporation","A limited liability partnership"],a:2,e:"Under the FAA, a financial adviser is defined as a corporation, not an individual. Individual representatives act on behalf of the financial adviser corporation.",r:"Ch.1, p.1-5"},
{id:3,ch:1,cn:"FAA & FAR – Financial Advisers And Representatives",t:"Which of the following entities is classified as an excluded financial adviser under the FAA rather than an exempt financial adviser?",o:["A licensed bank","A merchant bank","A law firm providing incidental financial advice","A life insurance company"],a:2,e:"Lawyers, accountants, trust companies, newspaper proprietors, rating agencies, and public statutory corporations are classified as excluded FAs. Banks, merchant banks, and insurers are exempt FAs.",r:"Ch.1, p.1-10"},
{id:4,ch:1,cn:"FAA & FAR – Financial Advisers And Representatives",t:"Since November 2010, what change was made to the FA licence renewal process under the FAA?",o:["Licences must be renewed every 5 years","Licences must be renewed annually","Licences no longer require renewal","Licences are renewed automatically every 3 years"],a:2,e:"Since November 2010, FA licences no longer require renewal. Once granted, the licence remains valid unless revoked or suspended by MAS.",r:"Ch.1, p.1-20"},
{id:5,ch:1,cn:"FAA & FAR – Financial Advisers And Representatives",t:"What is the key distinction between an appointed representative and a provisional representative under the Register of Representatives (RNF)?",o:["Appointed reps work part-time while provisional reps work full-time","Appointed reps have passed relevant exams and meet CPD requirements while provisional reps operate under supervision","Provisional reps hold a higher qualification than appointed reps","Appointed reps can only sell insurance while provisional reps can sell all products"],a:1,e:"An appointed representative has passed the relevant examinations and meets CPD requirements, while a provisional representative operates under supervision pending completion of examination requirements.",r:"Ch.1, p.1-30"},
{id:6,ch:2,cn:"FAA & FAR – Conduct Of Business",t:"When a financial adviser makes a product recommendation to a client, what fundamental requirement must the recommendation be based on under the FAA conduct of business rules?",o:["The product must be from the adviser's preferred provider list","The recommendation must have a reasonable basis after considering the client's circumstances","The product must offer the highest commission to the adviser","The recommendation must match what the client specifically requests"],a:1,e:"The FAA requires that any product recommendation must have a reasonable basis, taking into account the client's investment objectives, financial situation, and particular needs.",r:"Ch.2, p.2-5"},
{id:7,ch:2,cn:"FAA & FAR – Conduct Of Business",t:"How must a financial adviser handle client money and property received in connection with the provision of financial advisory services?",o:["Deposit it in the adviser's personal account","Keep it separate from the adviser's own funds in designated accounts","Invest it to generate returns for the client","Transfer it immediately to the product provider"],a:1,e:"Client money and property must be kept separate from the adviser's own funds and held in designated accounts to protect client assets.",r:"Ch.2, p.2-10"},
{id:8,ch:2,cn:"FAA & FAR – Conduct Of Business",t:"What obligation does a financial adviser have regarding any material interest or conflict of interest in a product being recommended to a client?",o:["The adviser may choose whether to disclose such interests","The adviser must disclose the interest only if the client asks","The adviser must disclose the interest to the client before making the recommendation","The adviser has no obligation as long as the product is suitable"],a:2,e:"Financial advisers must disclose any material interest or conflict of interest in the products they recommend to clients, ensuring transparency in the advisory process.",r:"Ch.2, p.2-15"},
{id:9,ch:2,cn:"FAA & FAR – Conduct Of Business",t:"Under the FAA provisions on corporate liability, when a body corporate commits an offence, who else may also be held liable for the offence?",o:["Only the company secretary","Every officer of the corporation who consented to or connived at the offence","Only the compliance officer","Only the external auditor"],a:1,e:"When a body corporate commits an offence under the FAA, every officer who was in any way involved by consent, connivance, or neglect may also be guilty of the offence.",r:"Ch.2, p.2-20"},
{id:10,ch:2,cn:"FAA & FAR – Conduct Of Business",t:"What action can the MAS take against a representative who is found to be not fit and proper to continue providing financial advisory services?",o:["Issue an informal verbal warning only","Issue a prohibition order preventing the person from providing financial advisory services","Impose a fine but allow them to continue working","Transfer the representative to another financial adviser"],a:1,e:"MAS can issue a prohibition order against a representative found not fit and proper, preventing them from providing any financial advisory services.",r:"Ch.2, p.2-18"},
{id:11,ch:3,cn:"MAS Notices – Part I",t:"Under FAA-N16, what must a financial adviser do before recommending any designated investment product to a client?",o:["Obtain written consent from MAS","Gather sufficient information about the client's financial situation, investment experience, and objectives","Ensure the client has at least $50,000 in investable assets","Obtain a credit report on the client"],a:1,e:"FAA-N16 requires financial advisers to gather sufficient information about the client through a needs analysis before making any recommendation, ensuring suitability.",r:"Ch.3, p.3-5"},
{id:12,ch:3,cn:"MAS Notices – Part I",t:"What type of disclosure does FAA-N03 require financial advisers to provide to clients regarding the products they recommend?",o:["Only the product name and price","Material information about the product including features, risks, fees, and charges","Only the projected returns of the product","Only the commission earned by the adviser"],a:1,e:"FAA-N03 requires comprehensive product disclosure including features, risks, fees, charges, and other material information so clients can make informed decisions.",r:"Ch.3, p.3-10"},
{id:13,ch:3,cn:"MAS Notices – Part I",t:"Which MAS Notice specifically addresses the regulatory requirements for dual currency investment products offered to retail clients?",o:["FAA-N16","FAA-N03","FAA-N11","FAA-N02"],a:2,e:"FAA-N11 specifically governs dual currency investments, setting out the requirements for how these products should be offered and disclosed to retail clients.",r:"Ch.3, p.3-15"},
{id:14,ch:3,cn:"MAS Notices – Part I",t:"If a financial adviser determines that a particular investment product is not suitable for a client but the client insists on proceeding, what should the adviser do according to FAA-N16?",o:["Proceed with the transaction without documentation","Refuse the transaction entirely","Document the client's decision and inform the client that the product is not suitable","Seek approval from MAS before proceeding"],a:2,e:"Under FAA-N16, if the client insists on proceeding despite the product being assessed as unsuitable, the adviser must inform the client of the unsuitability and document the client's decision.",r:"Ch.3, p.3-8"},
{id:15,ch:3,cn:"MAS Notices – Part I",t:"Under the suitability requirements in FAA-N16, which of the following is NOT typically part of the reasonable basis assessment for a product recommendation?",o:["The client's investment objectives","The client's financial situation","The client's social media activity","The client's investment experience and knowledge"],a:2,e:"The reasonable basis assessment under FAA-N16 considers the client's investment objectives, financial situation, and investment experience — not their social media activity.",r:"Ch.3, p.3-5"},
{id:16,ch:4,cn:"MAS Notices – Part II",t:"Under FAA-N02, what conditions must be met when a financial adviser appoints an introducer to refer potential clients?",o:["The introducer must hold an FA licence","The introducer must be properly appointed and may only perform introductory activities without giving advice","The introducer must pass all relevant examinations","The introducer must be a qualified accountant"],a:1,e:"FAA-N02 governs the appointment and use of introducers, specifying that introducers may only perform introductory functions and must not provide financial advice.",r:"Ch.4, p.4-3"},
{id:17,ch:4,cn:"MAS Notices – Part II",t:"What is the purpose of FAA-N14 regarding the conduct of representatives in the financial advisory industry?",o:["It sets out commission structures","It requires financial advisers to report misconduct by their representatives to MAS","It establishes marketing guidelines","It regulates product pricing"],a:1,e:"FAA-N14 requires financial advisers to report misconduct by their representatives to MAS, ensuring accountability and maintaining industry standards.",r:"Ch.4, p.4-10"},
{id:18,ch:4,cn:"MAS Notices – Part II",t:"What framework does FAA-N20 require financial advisory firms to implement for the remuneration of their representatives?",o:["A commission-only payment structure","A Balanced Scorecard Framework that considers non-sales factors","A fixed salary with no performance component","A profit-sharing arrangement"],a:1,e:"FAA-N20 requires firms to implement a Balanced Scorecard Framework that takes into account non-sales key performance indicators alongside sales metrics, promoting fair dealing.",r:"Ch.4, p.4-15"},
{id:19,ch:4,cn:"MAS Notices – Part II",t:"Under FAA-N12, what are the entry requirements that must be satisfied before a person can be registered as a provisional representative?",o:["They must have 10 years of industry experience","They must meet minimum educational qualifications and pass fit and proper criteria","They must hold a university degree in finance","They must be recommended by three existing representatives"],a:1,e:"FAA-N12 sets out the entry requirements for provisional representatives, including minimum educational qualifications and fit and proper criteria.",r:"Ch.4, p.4-8"},
{id:20,ch:4,cn:"MAS Notices – Part II",t:"In addition to the Balanced Scorecard Framework, what other key requirement does FAA-N20 impose on financial advisory firms to ensure quality of advice?",o:["Monthly client satisfaction surveys","An independent sales audit process","Mandatory annual leave for all representatives","Weekly product training sessions"],a:1,e:"FAA-N20 requires firms to conduct independent sales audits in addition to implementing the Balanced Scorecard Framework, to ensure the quality and suitability of advice given.",r:"Ch.4, p.4-16"},
{id:21,ch:5,cn:"AML/CFT – Financial Advisers",t:"Under FAA-N06, what approach must financial advisers adopt when assessing the money laundering and terrorism financing risks posed by their clients?",o:["A one-size-fits-all approach","A risk-based approach that varies the level of due diligence according to risk","A random sampling approach","An approach based solely on transaction size"],a:1,e:"FAA-N06 requires a risk-based approach where financial advisers assess the ML/TF risks of each client and apply appropriate levels of due diligence accordingly.",r:"Ch.5, p.5-5"},
{id:22,ch:5,cn:"AML/CFT – Financial Advisers",t:"When would a financial adviser be required to conduct enhanced customer due diligence (ECDD) rather than standard CDD under AML/CFT requirements?",o:["For all new clients regardless of risk","Only for clients who are Singapore citizens","For higher-risk clients such as politically exposed persons or clients from high-risk jurisdictions","Only for clients investing more than $1 million"],a:2,e:"Enhanced CDD is required for higher-risk situations, including dealing with politically exposed persons (PEPs), clients from high-risk jurisdictions, or complex transaction patterns.",r:"Ch.5, p.5-10"},
{id:23,ch:5,cn:"AML/CFT – Financial Advisers",t:"What obligation does a financial adviser have when it identifies a transaction that it suspects may be related to money laundering or terrorism financing?",o:["Report it to the police only","File a Suspicious Transaction Report (STR) with the Suspicious Transaction Reporting Office","Inform the client about the suspicion","Close the client's account immediately without reporting"],a:1,e:"Financial advisers must file a Suspicious Transaction Report (STR) with the Suspicious Transaction Reporting Office when they suspect transactions may be linked to ML/TF. They must not tip off the client.",r:"Ch.5, p.5-15"},
{id:24,ch:5,cn:"AML/CFT – Financial Advisers",t:"Under FAA-N06, for how long must a financial adviser retain records related to customer due diligence and transactions after the business relationship has ended?",o:["1 year","3 years","5 years","10 years"],a:2,e:"Financial advisers are required to retain CDD and transaction records for at least 5 years after the business relationship has ended or after the date of the transaction.",r:"Ch.5, p.5-18"},
{id:25,ch:5,cn:"AML/CFT – Financial Advisers",t:"In which scenario would simplified customer due diligence (SCDD) be appropriate under FAA-N06?",o:["For all corporate clients","For clients assessed as posing lower ML/TF risk, such as government entities or regulated financial institutions","For clients who refuse to provide identification","For clients who make only one transaction"],a:1,e:"Simplified CDD may be applied to clients assessed as posing lower ML/TF risk, such as government entities, listed companies, or financial institutions regulated by a reputable authority.",r:"Ch.5, p.5-8"},
{id:26,ch:6,cn:"MAS Notices – Part III",t:"What does FAA-N17 require financial advisory firms to do when they discover instances of fraud or misconduct within their organisation?",o:["Handle it internally without notifying MAS","Report the suspicious activities or fraud to MAS within the prescribed timeframe","Wait until the annual audit to report it","Report it only if the amount exceeds $100,000"],a:1,e:"FAA-N17 requires financial advisory firms to report suspicious activities, fraud, or misconduct to MAS within prescribed timeframes to ensure regulatory oversight.",r:"Ch.6, p.6-3"},
{id:27,ch:6,cn:"MAS Notices – Part III",t:"What area of risk management does FSM-N23 specifically address for financial institutions including financial advisers?",o:["Credit risk management","Technology risk management","Operational risk from natural disasters","Foreign exchange risk management"],a:1,e:"FSM-N23 addresses technology risk management, requiring financial institutions to establish robust frameworks for managing risks associated with their IT systems and operations.",r:"Ch.6, p.6-8"},
{id:28,ch:6,cn:"MAS Notices – Part III",t:"What is the purpose of the Direct Purchase Insurance (DPI) scheme established under FAA-N19?",o:["To allow insurers to sell complex investment products directly","To enable consumers to purchase basic life insurance products directly without advice and with lower distribution costs","To create a government-run insurance programme","To mandate that all insurance be purchased through financial advisers"],a:1,e:"The DPI scheme under FAA-N19 allows consumers to purchase basic, no-frills life insurance products directly from insurers without financial advice, resulting in lower distribution costs.",r:"Ch.6, p.6-12"},
{id:29,ch:6,cn:"MAS Notices – Part III",t:"What specific area of information security does FSM-N24 on cyber hygiene require financial institutions to address?",o:["Physical office security only","Cybersecurity measures including securing IT systems, patching vulnerabilities, and protecting against cyber threats","Employee dress code policies","Client entertainment guidelines"],a:1,e:"FSM-N24 focuses on cyber hygiene practices, requiring financial institutions to implement measures such as securing IT systems, timely patching of vulnerabilities, and protecting against cyber threats.",r:"Ch.6, p.6-15"},
{id:30,ch:6,cn:"MAS Notices – Part III",t:"Under FAA-N17, which types of incidents would trigger the reporting obligation for a financial advisory firm?",o:["Only criminal offences involving more than $1 million","Fraud, dishonesty, and other misconduct by representatives or employees","Only incidents reported in the media","Only incidents involving foreign clients"],a:1,e:"FAA-N17 requires reporting of fraud, dishonesty, and other forms of misconduct by representatives or employees of the financial advisory firm, regardless of the amount involved.",r:"Ch.6, p.6-5"},
{id:31,ch:7,cn:"MAS Notice: MAS 307",t:"What type of insurance product does MAS Notice 307 specifically regulate in terms of disclosure and operational requirements?",o:["Term life insurance policies","Investment-linked insurance policies (ILPs)","Whole life insurance policies","General insurance policies"],a:1,e:"MAS Notice 307 specifically regulates investment-linked insurance policies (ILPs), which combine insurance coverage with investment components linked to underlying funds.",r:"Ch.7, p.7-3"},
{id:32,ch:7,cn:"MAS Notice: MAS 307",t:"Why are investment-linked policies (ILPs) subject to additional regulatory requirements beyond those applicable to traditional life insurance policies?",o:["Because ILPs are cheaper than traditional policies","Because ILPs combine insurance with investment elements, exposing policyholders to investment risks","Because ILPs are only sold to institutional investors","Because ILPs do not provide any insurance coverage"],a:1,e:"ILPs are subject to additional requirements because they combine insurance protection with investment components, meaning policyholders bear investment risks that require enhanced disclosure and protection.",r:"Ch.7, p.7-3"},
{id:33,ch:7,cn:"MAS Notice: MAS 307",t:"What must an insurer disclose to a prospective policyholder before the purchase of an investment-linked policy under MAS 307?",o:["Only the premium amount","Key product features, fees, charges, risks, and the investment objectives of the underlying sub-funds","Only the name of the fund manager","Only the past performance of the funds"],a:1,e:"MAS 307 requires comprehensive disclosure including product features, all fees and charges, investment risks, and details of underlying sub-funds to help policyholders make informed decisions.",r:"Ch.7, p.7-5"},
{id:34,ch:7,cn:"MAS Notice: MAS 307",t:"How does the investment risk in an ILP differ from that in a traditional participating whole life insurance policy?",o:["There is no investment risk in an ILP","In an ILP, the policyholder bears the full investment risk as returns depend on the performance of chosen sub-funds","The insurer guarantees returns in both types of policies","ILPs have lower investment risk than participating policies"],a:1,e:"In an ILP, the policyholder bears the full investment risk because the policy value depends entirely on the performance of the chosen sub-funds, unlike participating policies where the insurer manages the participating fund.",r:"Ch.7, p.7-4"},
{id:35,ch:7,cn:"MAS Notice: MAS 307",t:"What ongoing disclosure obligations does an insurer have to existing ILP policyholders under MAS 307?",o:["No ongoing disclosure is required after the policy is purchased","Regular statements showing fund performance, policy value, fees deducted, and units held","Only an annual premium reminder","Disclosure only when the policyholder requests it"],a:1,e:"Insurers must provide ongoing disclosure to ILP policyholders including regular statements showing fund performance, current policy values, fees and charges deducted, and the number of units held.",r:"Ch.7, p.7-8"},
{id:36,ch:8,cn:"MAS Guidelines – Part I",t:"Under guideline FSG-G01, what are the three key criteria that MAS uses to assess whether a person is fit and proper to be involved in financial advisory services?",o:["Age, education, and nationality","Honesty and integrity, competence and capability, and financial soundness","Sales performance, client count, and revenue generated","Years of experience, number of qualifications, and industry connections"],a:1,e:"FSG-G01 sets out three key fit and proper criteria: honesty and integrity, competence and capability, and financial soundness, which MAS uses to assess individuals in the financial advisory industry.",r:"Ch.8, p.8-8"},
{id:37,ch:8,cn:"MAS Guidelines – Part I",t:"What does guideline FAA-G04 establish for the financial advisory industry regarding professional behaviour?",o:["Minimum commission rates","Standards of conduct that financial advisers and their representatives must observe","Office design requirements","Marketing budget guidelines"],a:1,e:"FAA-G04 sets out standards of conduct that financial advisers and their representatives are expected to observe, covering professional behaviour and ethical standards in dealing with clients.",r:"Ch.8, p.8-15"},
{id:38,ch:8,cn:"MAS Guidelines – Part I",t:"Under FAA-G01, what key factors does MAS consider when evaluating an application for a financial adviser licence?",o:["Only the applicant's paid-up capital","Track record, financial soundness, compliance arrangements, and fitness and propriety of key persons","Only the number of products the applicant intends to distribute","Only the location of the applicant's office"],a:1,e:"FAA-G01 outlines that MAS considers multiple factors including the applicant's track record, financial soundness, adequacy of compliance arrangements, and the fitness and propriety of key personnel.",r:"Ch.8, p.8-3"},
{id:39,ch:8,cn:"MAS Guidelines – Part I",t:"What due diligence does CMI 01/2011 require a financial adviser to conduct before appointing a new representative?",o:["Only verifying the person's educational qualifications","Comprehensive checks including past employment history, disciplinary records, and character references","Only checking if the person has passed the relevant exam","Only verifying the person's identity"],a:1,e:"CMI 01/2011 requires comprehensive due diligence before appointing a representative, including verifying past employment, checking for disciplinary records, and obtaining character references.",r:"Ch.8, p.8-12"},
{id:40,ch:8,cn:"MAS Guidelines – Part I",t:"Under FAA-G05, what conditions must a financial advisory firm satisfy before it can use the term 'independent' in its name or marketing materials?",o:["It must have been in business for at least 10 years","It must demonstrate that it is free from product provider influence and offers advice on a sufficiently broad range of products","It must have more than 100 representatives","It must be listed on the Singapore Exchange"],a:1,e:"FAA-G05 sets out conditions for using the term 'independent,' requiring firms to demonstrate freedom from product provider influence and the ability to advise on a sufficiently broad range of products.",r:"Ch.8, p.8-18"},
{id:41,ch:9,cn:"MAS Guidelines – Part II",t:"Under FAA-G09, what additional safeguards are required when financial advisers recommend structured deposits to retail clients?",o:["No additional safeguards are needed","Enhanced disclosure of the product's features, risks, and scenarios showing potential outcomes","A mandatory cooling-off period of 30 days","Approval from the client's employer"],a:1,e:"FAA-G09 requires enhanced disclosure for structured deposits, including clear explanation of product features, risks, and scenarios illustrating potential outcomes under different market conditions.",r:"Ch.9, p.9-3"},
{id:42,ch:9,cn:"MAS Guidelines – Part II",t:"What does FAA-G10 specifically address regarding transactions involving designated investment products?",o:["Initial purchases of investment products","The switching of designated investment products and the obligations when advising clients to switch","Redemption of investment products","Transfer of investment products between family members"],a:1,e:"FAA-G10 addresses the switching of designated investment products, setting out the obligations financial advisers must fulfil when recommending that clients switch from one product to another.",r:"Ch.9, p.9-8"},
{id:43,ch:9,cn:"MAS Guidelines – Part II",t:"How many fair dealing outcomes does FSG-G04 set out that financial institutions should strive to achieve in their dealings with customers?",o:["3 outcomes","4 outcomes","5 outcomes","7 outcomes"],a:2,e:"FSG-G04 establishes 5 fair dealing outcomes that financial institutions should achieve, covering areas from product design through to after-sales service and complaint handling.",r:"Ch.9, p.9-12"},
{id:44,ch:9,cn:"MAS Guidelines – Part II",t:"What is the purpose of the reference check requirements outlined in FAA-G14 for financial advisory firms?",o:["To verify the academic credentials of new clients","To conduct reference checks on prospective representatives and pre-transaction checks on advisory recommendations","To check references of product providers","To verify the identity of introducers"],a:1,e:"FAA-G14 outlines requirements for reference checks on prospective representatives before appointment and pre-transaction checks to ensure advisory recommendations are suitable.",r:"Ch.9, p.9-15"},
{id:45,ch:9,cn:"MAS Guidelines – Part II",t:"When a financial adviser recommends that a client switch from one designated investment product to another, what key consideration must be assessed under FAA-G10?",o:["Whether the switch generates higher commission for the adviser","Whether the switch is in the client's best interest and the benefits outweigh the costs of switching","Whether the new product is from the same product provider","Whether the client has held the existing product for at least 5 years"],a:1,e:"FAA-G10 requires that when recommending a switch, the adviser must assess whether the switch is in the client's best interest and that the benefits of the new product outweigh the costs associated with switching.",r:"Ch.9, p.9-9"},
{id:46,ch:10,cn:"MAS Guidelines – Part III",t:"What potential issue does FAA-G13 specifically aim to address regarding research reports produced by financial advisory firms?",o:["The length of research reports","Conflicts of interest that may arise in the production and distribution of research","The formatting of research reports","The frequency of research publications"],a:1,e:"FAA-G13 addresses conflicts of interest in research, providing guidance on managing situations where the firm's commercial interests might compromise the objectivity of research reports.",r:"Ch.10, p.10-3"},
{id:47,ch:10,cn:"MAS Guidelines – Part III",t:"Under FAA-G15, what type of life insurance distribution does MAS provide guidance on to facilitate wider consumer access?",o:["Distribution through bank branches only","Online distribution of no-advice life insurance policies through digital platforms","Distribution through telemarketers","Distribution through road shows"],a:1,e:"FAA-G15 provides guidance on the online distribution of no-advice life insurance policies, enabling consumers to purchase basic policies through digital platforms without receiving advice.",r:"Ch.10, p.10-8"},
{id:48,ch:10,cn:"MAS Guidelines – Part III",t:"What does CMG-G02 provide regulatory guidance on regarding the use of technology in financial advisory services?",o:["The use of social media for marketing","Digital advisory services, commonly known as robo-advisors, that use algorithms to provide investment advice","The use of email for client communication","Online payment processing"],a:1,e:"CMG-G02 provides guidance on digital advisory services (robo-advisors) that use algorithms and technology platforms to provide automated investment advice and portfolio management.",r:"Ch.10, p.10-12"},
{id:49,ch:10,cn:"MAS Guidelines – Part III",t:"What aspects of financial product promotion does FSG-G02 provide guidance on to protect consumers?",o:["Only television advertising","Marketing and distribution standards covering fair and balanced representations of products","Only print media advertising","Only social media marketing"],a:1,e:"FSG-G02 provides comprehensive guidance on marketing and distribution standards, requiring fair, balanced, and not misleading representations of financial products across all channels.",r:"Ch.10, p.10-15"},
{id:50,ch:10,cn:"MAS Guidelines – Part III",t:"Under CMG-G02, what key obligation must a robo-advisory platform fulfil even though it provides automated advice without human interaction?",o:["It must have a physical office that clients can visit","It must still ensure the suitability of recommendations and comply with the same regulatory standards as human advisers","It must limit investments to government bonds only","It must provide advice only to accredited investors"],a:1,e:"Even though robo-advisors provide automated advice, CMG-G02 requires them to ensure the suitability of their recommendations and comply with the same regulatory standards applicable to human advisers.",r:"Ch.10, p.10-13"},
{id:51,ch:11,cn:"Collective Investment Schemes",t:"Under the Code on Collective Investment Schemes, what are the two key parties responsible for the governance and management of an authorised CIS?",o:["The auditor and the compliance officer","The trustee and the manager","The regulator and the distributor","The custodian and the broker"],a:1,e:"The Code on CIS establishes the trustee and the manager as the two key parties responsible for the governance and management of an authorised collective investment scheme.",r:"Ch.11, p.11-3"},
{id:52,ch:11,cn:"Collective Investment Schemes",t:"What primary duty does the trustee of a collective investment scheme owe to the unitholders of the scheme?",o:["To maximise profits for the manager","To act in the best interests of the unitholders and safeguard the scheme's assets","To minimise the operating costs of the scheme","To market the scheme to new investors"],a:1,e:"The trustee's primary duty is to act in the best interests of unitholders and safeguard the assets of the scheme, serving as an independent check on the manager.",r:"Ch.11, p.11-5"},
{id:53,ch:11,cn:"Collective Investment Schemes",t:"What requirements does the Code on CIS set out regarding how units in a collective investment scheme are to be valued and priced?",o:["Units can be valued at any price the manager chooses","Units must be valued based on the net asset value of the scheme's assets, following prescribed valuation and dealing procedures","Units are valued only at the end of each financial year","Units are priced based on the original investment amount"],a:1,e:"The Code requires units to be valued based on the net asset value (NAV) of the scheme's assets, with prescribed dealing and valuation procedures to ensure fair pricing for all unitholders.",r:"Ch.11, p.11-10"},
{id:54,ch:11,cn:"Collective Investment Schemes",t:"What are the core investment requirements that a manager of an authorised CIS must comply with under the Code?",o:["There are no investment restrictions","Requirements including investment limits, concentration limits, and restrictions on the types of investments the scheme can hold","The manager must invest only in Singapore-listed securities","The manager must hold all assets in cash"],a:1,e:"The Code sets out core investment requirements including investment limits, concentration limits, and restrictions on eligible investments to ensure proper diversification and risk management.",r:"Ch.11, p.11-15"},
{id:55,ch:11,cn:"Collective Investment Schemes",t:"What happens when the manager of a collective investment scheme fails to comply with the requirements set out in the Code on CIS?",o:["Nothing, as the Code is merely advisory","MAS may take regulatory action including directing the manager to rectify the breach or revoking the scheme's authorisation","Only the trustee is penalised","The scheme automatically converts to a closed-end fund"],a:1,e:"MAS may take regulatory action against non-compliant managers, including directing them to rectify breaches or, in serious cases, revoking the scheme's authorisation.",r:"Ch.11, p.11-8"},
{id:56,ch:12,cn:"Securities Dealing – Market Conduct",t:"Under the Securities and Futures Act, what constitutes the offence of false trading in relation to securities listed on an exchange?",o:["Trading securities at a loss","Creating a false or misleading appearance of active trading or with respect to the market price of securities","Trading securities outside of market hours","Trading securities in small quantities"],a:1,e:"False trading involves creating a false or misleading appearance of active trading in securities or a false appearance regarding the market price, which is prohibited under the SFA.",r:"Ch.12, p.12-3"},
{id:57,ch:12,cn:"Securities Dealing – Market Conduct",t:"What type of information would constitute material non-public information (MNPI) that could give rise to insider trading liability if traded upon?",o:["Information that is already widely reported in the media","Information not generally available that a reasonable person would expect to have a material effect on the price of the securities","Publicly available financial statements","General industry news available to all market participants"],a:1,e:"MNPI is information not generally available that a reasonable person would expect to materially affect the price or value of securities if it were generally available.",r:"Ch.12, p.12-10"},
{id:58,ch:12,cn:"Securities Dealing – Market Conduct",t:"Who is considered a 'connected person' for the purposes of insider trading provisions under the Securities and Futures Act?",o:["Any person who owns shares in a listed company","Officers, substantial shareholders, and persons who obtained information by virtue of their position or relationship with the company","Only the CEO of the company","Only external auditors of the company"],a:1,e:"Connected persons include officers, substantial shareholders, and anyone who obtained inside information by virtue of their position, professional relationship, or connection with the company.",r:"Ch.12, p.12-12"},
{id:59,ch:12,cn:"Securities Dealing – Market Conduct",t:"What is securities hawking, and why is it prohibited under the Securities and Futures Act?",o:["Selling securities at a premium, prohibited because it is unfair","Making unsolicited offers to sell securities through cold-calling or door-to-door visits, prohibited to protect investors from high-pressure sales tactics","Advertising securities on social media, prohibited because of reach","Trading securities on multiple exchanges simultaneously, prohibited due to complexity"],a:1,e:"Securities hawking involves making unsolicited offers to sell securities through cold-calling or door-to-door approaches. It is prohibited to protect investors from high-pressure sales tactics.",r:"Ch.12, p.12-15"},
{id:60,ch:12,cn:"Securities Dealing – Market Conduct",t:"What duties does a person dealing in securities owe to both their clients and their employers under the market conduct rules?",o:["Only to generate maximum revenue","Duties of good faith, priority of client orders, avoidance of conflicts of interest, and proper handling of confidential information","Only to follow instructions without question","Only to report transactions to MAS"],a:1,e:"Persons dealing in securities owe duties of good faith, must give priority to client orders, avoid conflicts of interest, and properly handle confidential information to protect both clients and employers.",r:"Ch.12, p.12-18"},
{id:61,ch:13,cn:"Central Provident Fund",t:"What are the three primary aims that the Central Provident Fund (CPF) system in Singapore is designed to address for its members?",o:["Education, entertainment, and travel","Retirement adequacy, healthcare needs, and home ownership","Business funding, investment, and insurance","Taxation, savings, and lending"],a:1,e:"The CPF system is designed to address three primary aims: providing for retirement adequacy, meeting healthcare needs, and facilitating home ownership for Singaporeans.",r:"Ch.13, p.13-3"},
{id:62,ch:13,cn:"Central Provident Fund",t:"What is CPF LIFE, and what benefit does it provide to eligible CPF members upon reaching retirement age?",o:["A one-time lump sum cash payout","A national longevity insurance annuity scheme that provides monthly payouts for life","A health insurance policy","A housing loan programme"],a:1,e:"CPF LIFE (Lifelong Income For the Elderly) is a national longevity insurance annuity scheme that provides eligible members with monthly payouts for life, starting from the payout eligibility age.",r:"Ch.13, p.13-8"},
{id:63,ch:13,cn:"Central Provident Fund",t:"Under the CPF Investment Scheme (CPFIS), what types of investments can CPF members use their CPF savings to invest in?",o:["Only fixed deposits","A range of approved investment products including unit trusts, exchange-traded funds, endowment policies, and selected shares","Only government bonds","Only property"],a:1,e:"The CPFIS allows members to invest their CPF savings in a range of approved products including unit trusts, ETFs, endowment policies, and selected shares listed on the SGX.",r:"Ch.13, p.13-5"},
{id:64,ch:13,cn:"Central Provident Fund",t:"What is the purpose of MediShield Life in relation to the CPF healthcare framework for Singapore residents?",o:["It covers cosmetic surgery expenses","It is a basic universal health insurance scheme that provides lifetime protection against large hospital bills for all Singapore citizens and PRs","It provides daily cash allowances during hospitalisation","It covers overseas medical treatment only"],a:1,e:"MediShield Life is a basic universal health insurance scheme providing lifetime protection against large hospital bills and selected costly outpatient treatments for all Singapore citizens and permanent residents.",r:"Ch.13, p.13-12"},
{id:65,ch:13,cn:"Central Provident Fund",t:"How does the Medisave account within the CPF system help members manage their healthcare expenses?",o:["It provides free medical consultations","It allows members to save for and pay approved medical expenses, hospitalisation costs, and selected insurance premiums","It covers all medical expenses without any limit","It can only be used after retirement"],a:1,e:"The Medisave account allows CPF members to save for and pay approved medical expenses including hospitalisation costs, day surgery, and premiums for approved medical insurance plans.",r:"Ch.13, p.13-10"},
{id:66,ch:14,cn:"Why Professional Ethics Matter",t:"How does the concept of professional ethics differ from mere compliance with laws and regulations in the context of financial advisory services?",o:["Ethics and compliance are exactly the same thing","Ethics goes beyond legal compliance by encompassing moral principles and standards of conduct that guide behaviour even where the law is silent","Compliance is more important than ethics","Ethics only applies to senior management"],a:1,e:"Professional ethics goes beyond mere legal compliance by encompassing broader moral principles and standards of conduct. While compliance sets the minimum legal requirements, ethics guides behaviour in situations where the law may be silent or ambiguous.",r:"Ch.14, p.14-3"},
{id:67,ch:14,cn:"Why Professional Ethics Matter",t:"Why is it particularly important for professionals in the financial services industry to uphold high ethical standards compared to other industries?",o:["Because financial professionals earn higher salaries","Because financial professionals hold positions of trust, manage client assets, and information asymmetry means clients rely heavily on their integrity","Because financial regulations are simpler than other industries","Because financial professionals work longer hours"],a:1,e:"Financial services professionals hold positions of trust, manage client assets and confidential information, and benefit from significant information asymmetry, making high ethical standards essential to maintain client confidence and market integrity.",r:"Ch.14, p.14-5"},
{id:68,ch:14,cn:"Why Professional Ethics Matter",t:"What are the multiple motivations that can drive ethical behaviour in financial advisory professionals beyond the fear of regulatory penalties?",o:["Only the desire for higher commissions","Intrinsic moral values, professional pride, reputation protection, client trust, and contributing to market integrity","Only peer pressure from colleagues","Only the threat of imprisonment"],a:1,e:"Ethical behaviour can be motivated by multiple factors including intrinsic moral values, professional pride, desire to protect one's reputation, building client trust, and contributing to overall market integrity.",r:"Ch.14, p.14-8"},
{id:69,ch:14,cn:"Why Professional Ethics Matter",t:"When a financial adviser faces a situation where following the letter of the law would still result in an unfair outcome for the client, what should guide the adviser's decision-making?",o:["The adviser should always follow the law exactly and ignore the unfair outcome","Professional ethical principles should guide the adviser to act in the client's best interest even beyond minimum legal requirements","The adviser should ask the client to waive their rights","The adviser should refer the matter to a lawyer"],a:1,e:"When legal compliance alone would lead to an unfair outcome, professional ethical principles should guide the adviser to act in the client's best interest, as ethics goes beyond the minimum requirements of the law.",r:"Ch.14, p.14-10"},
{id:70,ch:14,cn:"Why Professional Ethics Matter",t:"What broader impact does unethical behaviour by financial advisory professionals have beyond the individual client who is directly affected?",o:["No broader impact as it only affects the individual client","It erodes public trust in the financial system, damages the reputation of the profession, and can undermine market integrity","It only affects the adviser's employer","It only results in a fine for the adviser"],a:1,e:"Unethical behaviour has far-reaching consequences beyond the individual client, including eroding public trust in the financial system, damaging the reputation of the entire profession, and potentially undermining overall market integrity.",r:"Ch.14, p.14-12"},
{id:71,ch:15,cn:"Professionalism",t:"A financial advisory representative who consistently updates her product knowledge and obtains relevant certifications is demonstrating which key characteristic of professionalism?",o:["Service orientation","Specialised knowledge and competence","Ethical conduct","Client empathy"],a:1,e:"Specialised knowledge and competence requires ongoing learning and maintaining up-to-date expertise through certifications and continuous professional development.",r:"Ch.15, p.15-3"},
{id:72,ch:15,cn:"Professionalism",t:"When a client expects their financial adviser to act in the client's best interest rather than pursue sales commissions, this expectation most directly relates to which professional characteristic?",o:["Technical competence","Regulatory compliance","Service orientation","Specialised knowledge"],a:2,e:"Service orientation means placing the client's interests at the centre of professional practice, prioritising their needs over the adviser's own financial gain.",r:"Ch.15, p.15-4"},
{id:73,ch:15,cn:"Professionalism",t:"Which of the following best describes why financial advisory is considered a profession rather than merely a job?",o:["It requires long working hours and dedication","It involves specialised knowledge, ethical standards, and a duty of care to clients","It is regulated by the government","It offers high remuneration to practitioners"],a:1,e:"A profession is distinguished by the combination of specialised knowledge, adherence to ethical standards, competence requirements, and a service orientation with a duty of care to clients.",r:"Ch.15, p.15-3"},
{id:74,ch:15,cn:"Professionalism",t:"An FA representative who fails to keep up with changes in insurance regulations and continues advising clients based on outdated information is falling short in which area of professionalism?",o:["Integrity","Fairness","Competence","Confidentiality"],a:2,e:"Competence requires FA representatives to maintain current knowledge of regulations, products, and industry developments to provide accurate and relevant advice to clients.",r:"Ch.15, p.15-5"},
{id:75,ch:15,cn:"Professionalism",t:"A client approaches an FA representative for retirement planning advice and expects a thorough analysis of their financial situation before any product is recommended, which reflects the client's expectation of which professional responsibility?",o:["The representative should sell the most popular product","The representative should conduct a proper needs analysis before making recommendations","The representative should offer the cheapest available product","The representative should delegate the analysis to a junior colleague"],a:1,e:"Clients expect FA representatives to fulfil their professional responsibility by conducting a proper needs analysis and understanding the client's full financial situation before recommending any product.",r:"Ch.15, p.15-6"},
{id:76,ch:16,cn:"Ethical Behavior",t:"An FA representative who refuses to let personal friendships with product providers influence her recommendations to clients is demonstrating which ethical principle?",o:["Integrity","Objectivity","Confidentiality","Diligence"],a:1,e:"Objectivity requires the adviser to make recommendations based on merit and suitability rather than personal relationships, biases, or external influences from product providers.",r:"Ch.16, p.16-3"},
{id:77,ch:16,cn:"Ethical Behavior",t:"When an FA representative takes the time to thoroughly research all available options before advising a client on a complex insurance product, she is exemplifying the ethical principle of which of the following?",o:["Professionalism","Fairness","Diligence","Confidentiality"],a:2,e:"Diligence involves taking the necessary care and thoroughness in researching and evaluating options before providing advice, ensuring the client receives well-considered recommendations.",r:"Ch.16, p.16-5"},
{id:78,ch:16,cn:"Ethical Behavior",t:"Which of the following is a direct benefit of ethical behaviour for the financial advisory industry as a whole?",o:["Higher product prices due to increased compliance costs","Reduced number of practitioners in the market","Enhanced public trust and confidence in financial advisers","Fewer product options available to consumers"],a:2,e:"Ethical behaviour across the industry enhances public trust and confidence, which benefits all practitioners by creating a more favourable environment for advisory services.",r:"Ch.16, p.16-7"},
{id:79,ch:16,cn:"Ethical Behavior",t:"An FA representative who ensures all marketing materials accurately represent product features without exaggeration is upholding the ethical principle of which of the following?",o:["Competence","Integrity","Fairness","Confidentiality"],a:1,e:"Integrity involves being honest and truthful in all professional dealings, including ensuring marketing materials are accurate and do not misrepresent product features or benefits.",r:"Ch.16, p.16-3"},
{id:80,ch:16,cn:"Ethical Behavior",t:"The ethical principle that requires an FA representative to treat all clients equitably regardless of the size of their investment portfolio is known as which of the following?",o:["Objectivity","Professionalism","Fairness","Diligence"],a:2,e:"Fairness requires treating all clients equitably, providing the same standard of care and service regardless of the client's wealth, portfolio size, or potential commission.",r:"Ch.16, p.16-4"},
{id:81,ch:17,cn:"Unethical Behavior",t:"An FA representative convinces a client to surrender an existing whole life policy and purchase a new one primarily to earn a fresh first-year commission, which is an example of which unethical practice?",o:["Churning","Twisting","Misrepresentation","Unauthorised trading"],a:1,e:"Twisting involves inducing a client to replace an existing insurance policy with a new one primarily for the representative's benefit, such as earning new commissions, rather than for the client's advantage.",r:"Ch.17, p.17-4"},
{id:82,ch:17,cn:"Unethical Behavior",t:"When an FA representative tells herself that everyone in the office inflates product returns when presenting to clients, she is succumbing to which obstacle to ethical behaviour?",o:["Self-interest","Pressure from management","Groupthink","Rationalisation"],a:2,e:"Groupthink occurs when individuals conform to unethical behaviours because they believe everyone else in the group is doing the same, leading them to accept misconduct as normal practice.",r:"Ch.17, p.17-6"},
{id:83,ch:17,cn:"Unethical Behavior",t:"An FA representative who executes trades in a client's investment account without obtaining the client's prior consent is committing which type of unethical behaviour?",o:["Misappropriation of funds","Forgery","Unauthorised trading","Churning"],a:2,e:"Unauthorised trading occurs when an FA representative executes transactions in a client's account without first obtaining the client's knowledge and consent for those specific trades.",r:"Ch.17, p.17-5"},
{id:84,ch:17,cn:"Unethical Behavior",t:"An FA representative who diverts client premium payments into his personal bank account is guilty of which unethical practice?",o:["Fraud","Misappropriation of funds","Forgery","Twisting"],a:1,e:"Misappropriation of funds involves illegally taking or diverting client money for personal use, which is a serious breach of trust and a criminal offence.",r:"Ch.17, p.17-7"},
{id:85,ch:17,cn:"Unethical Behavior",t:"When an FA representative justifies selling an unsuitable product by thinking the commission will help pay for his children's education, he is engaging in which obstacle to ethical behaviour?",o:["Groupthink","Pressure","Rationalisation","Self-interest"],a:2,e:"Rationalisation involves creating justifications for unethical behaviour, such as convincing oneself that the end (paying for education) justifies the means (selling unsuitable products).",r:"Ch.17, p.17-6"},
{id:86,ch:18,cn:"Conflict Of Interest",t:"An FA representative who recommends a particular investment fund because her firm receives higher trailer fees from that fund provider, rather than because it best suits the client, is exhibiting which type of conflict of interest?",o:["Perceived conflict","Potential conflict","Actual conflict","Hypothetical conflict"],a:2,e:"An actual conflict of interest exists when the representative's personal or financial interest directly conflicts with the client's interest, as in recommending products based on trailer fees rather than client suitability.",r:"Ch.18, p.18-3"},
{id:87,ch:18,cn:"Conflict Of Interest",t:"Under the fiduciary standard, an FA representative is required to do which of the following when advising a client?",o:["Recommend products that are generally suitable for the client's risk profile","Act in the client's best interest and place the client's interests above their own","Disclose all available products in the market","Provide the cheapest available product option"],a:1,e:"The fiduciary standard requires the adviser to act in the client's best interest and place the client's interests above their own, which is a higher standard than merely recommending suitable products.",r:"Ch.18, p.18-7"},
{id:88,ch:18,cn:"Conflict Of Interest",t:"When an FA representative aggressively cross-sells multiple insurance products to a client who only needs one type of coverage, this manifests as which type of conflict of interest behaviour?",o:["Failure to execute","Misleading disclosure","Cross-selling driven by self-interest","Privacy breach"],a:2,e:"Cross-selling driven by self-interest occurs when the representative pushes additional products not because the client needs them, but to increase commissions, creating a conflict between the representative's financial interest and the client's actual needs.",r:"Ch.18, p.18-5"},
{id:89,ch:18,cn:"Conflict Of Interest",t:"A situation where a reasonable third party might question whether an FA representative's judgement could be compromised, even if no actual bias exists, is classified as which type of conflict of interest?",o:["Actual conflict","Potential conflict","Perceived conflict","Regulatory conflict"],a:2,e:"A perceived conflict of interest exists when a reasonable third party could question the representative's impartiality, even if no actual bias or conflict exists in practice.",r:"Ch.18, p.18-3"},
{id:90,ch:18,cn:"Conflict Of Interest",t:"The suitability standard differs from the fiduciary standard primarily in that it requires the adviser to do which of the following?",o:["Always recommend the cheapest product","Recommend products that are reasonable and appropriate for the client, but not necessarily the best option","Act solely in the client's best interest at all times","Disclose all commissions earned"],a:1,e:"The suitability standard requires the adviser to recommend products that are reasonable and appropriate for the client's needs, but unlike the fiduciary standard, it does not mandate recommending the absolute best option for the client.",r:"Ch.18, p.18-7"},
{id:91,ch:19,cn:"Fair Dealing",t:"Under the fair dealing framework, the outcome that requires firms to ensure their staff are trained and incentivised to deliver fair outcomes to customers relates to which of the five outcomes?",o:["Outcome 2: Products targeted to appropriate customer groups","Outcome 1: Firms where fair dealing is central to corporate culture","Outcome 5: Proper complaint handling","Outcome 4: Advice considers customer needs"],a:1,e:"Outcome 1 focuses on embedding fair dealing into the firm's corporate culture, which includes staff training, appropriate incentive structures, and management commitment to fair customer treatment.",r:"Ch.19, p.19-3"},
{id:92,ch:19,cn:"Fair Dealing",t:"When a financial institution designs an investment product and identifies specific customer segments for whom the product is appropriate before launching it, this practice aligns with which fair dealing outcome?",o:["Outcome 1: Fair dealing culture","Outcome 3: Clear and accurate information","Outcome 2: Products targeted to appropriate customer groups","Outcome 5: Proper complaint handling"],a:2,e:"Outcome 2 requires that financial products are designed and targeted to meet the needs of identified customer segments, ensuring products reach appropriate groups rather than being sold indiscriminately.",r:"Ch.19, p.19-4"},
{id:93,ch:19,cn:"Fair Dealing",t:"A financial institution that provides product brochures written in plain language with clear explanations of risks and charges is fulfilling which fair dealing outcome?",o:["Outcome 1: Fair dealing culture","Outcome 4: Advice considers customer needs","Outcome 2: Appropriate product targeting","Outcome 3: Clear, relevant, and accurate information"],a:3,e:"Outcome 3 requires that customers receive information that is clear, relevant, and accurate, enabling them to make informed decisions. Plain language and transparent disclosure of risks and charges support this outcome.",r:"Ch.19, p.19-5"},
{id:94,ch:19,cn:"Fair Dealing",t:"When an FA representative takes the time to understand a client's risk tolerance and financial objectives before recommending any product, this practice supports which fair dealing outcome?",o:["Outcome 5: Proper complaint handling","Outcome 3: Clear information","Outcome 4: Advice that takes into account the customer's needs","Outcome 2: Appropriate product targeting"],a:2,e:"Outcome 4 requires that advice given to customers takes into account their individual circumstances, needs, risk tolerance, and financial objectives, not just the product features.",r:"Ch.19, p.19-6"},
{id:95,ch:19,cn:"Fair Dealing",t:"A financial institution that has established a dedicated complaints resolution unit with defined timelines for responding to customer grievances is addressing which fair dealing outcome?",o:["Outcome 1: Fair dealing culture","Outcome 3: Clear information","Outcome 4: Suitable advice","Outcome 5: Proper complaint handling by firms"],a:3,e:"Outcome 5 requires firms to handle customer complaints promptly and fairly, with proper procedures, defined timelines, and dedicated resources for resolution.",r:"Ch.19, p.19-7"},
{id:96,ch:20,cn:"Ethical Marketing & Sale",t:"During the sales process, an FA representative shows a client projected investment returns that are significantly higher than historical performance data supports, which constitutes which ethical pitfall?",o:["Conflict of interest","Unsuitable product recommendation","Misrepresentation","Unauthorised trading"],a:2,e:"Misrepresentation in marketing occurs when product features, benefits, or projected returns are overstated or not supported by evidence, misleading clients into making decisions based on inaccurate information.",r:"Ch.20, p.20-4"},
{id:97,ch:20,cn:"Ethical Marketing & Sale",t:"An ethically sound sales process requires the FA representative to ensure that which of the following occurs before any product is sold?",o:["The client signs a disclaimer waiving all liability","The client's needs are assessed and the recommended product is suitable for those needs","The client is offered the maximum number of products available","The client agrees to a minimum investment period"],a:1,e:"An ethically sound sales process requires proper needs assessment and product suitability analysis before any recommendation is made, ensuring the client's interests are the primary consideration.",r:"Ch.20, p.20-3"},
{id:98,ch:20,cn:"Ethical Marketing & Sale",t:"When an FA representative recommends a complex structured product to an elderly retiree who needs simple, low-risk savings, this is an example of which ethical marketing pitfall?",o:["Misrepresentation","Selling unsuitable products","Conflict of interest","Forgery"],a:1,e:"Selling unsuitable products occurs when the product recommended does not match the client's needs, risk profile, financial situation, or investment horizon, as in recommending complex products to someone who needs simplicity.",r:"Ch.20, p.20-5"},
{id:99,ch:20,cn:"Ethical Marketing & Sale",t:"Ethical marketing principles require that all promotional materials for financial products should contain which of the following?",o:["Guaranteed return projections to attract customers","Balanced information including both benefits and risks of the product","Testimonials from satisfied customers only","Comparisons showing the product is superior to all competitors"],a:1,e:"Ethical marketing requires balanced disclosure, presenting both benefits and risks fairly so that customers can make informed decisions without being misled by one-sided information.",r:"Ch.20, p.20-6"},
{id:100,ch:20,cn:"Ethical Marketing & Sale",t:"An FA representative who earns higher commissions on Product X than Product Y and consistently recommends Product X even when Product Y better suits the client is falling into which ethical pitfall?",o:["Misrepresentation","Selling unsuitable products","Conflict of interest","Churning"],a:2,e:"Conflict of interest in marketing arises when the representative's financial incentives (higher commissions) influence their recommendations, leading them to prioritise personal gain over client suitability.",r:"Ch.20, p.20-5"},
{id:101,ch:21,cn:"Customer – Representative Relationships",t:"A financial advisory firm that regularly sends personalised portfolio updates and birthday greetings to existing clients is primarily focused on which aspect of customer relationship management?",o:["Customer acquisition","Customer retention and post-sales loyalty","Complaint handling","Regulatory compliance"],a:1,e:"Post-sales loyalty efforts such as personalised communications, regular updates, and personal touches help retain existing clients and build long-term relationships beyond the initial sale.",r:"Ch.21, p.21-6"},
{id:102,ch:21,cn:"Customer – Representative Relationships",t:"When a client submits a complaint about receiving unsuitable advice, the firm's first priority should be which of the following?",o:["Defending the FA representative's recommendation","Acknowledging the complaint promptly and investigating it fairly","Offering a refund to avoid regulatory action","Transferring the client to a different representative"],a:1,e:"Proper complaint handling requires prompt acknowledgement, fair investigation, and a structured resolution process rather than defensive responses or hasty settlements.",r:"Ch.21, p.21-5"},
{id:103,ch:21,cn:"Customer – Representative Relationships",t:"A financial advisory firm conducting regular client satisfaction surveys to identify areas for improvement is utilising which customer relationship strategy?",o:["Complaint avoidance","Product diversification","Customer feedback mechanisms","Regulatory compliance"],a:2,e:"Customer feedback mechanisms such as satisfaction surveys help firms understand client needs, identify service gaps, and continuously improve their service standards.",r:"Ch.21, p.21-7"},
{id:104,ch:21,cn:"Customer – Representative Relationships",t:"Different clients have different service needs based on their financial sophistication and portfolio complexity, which means an FA representative should do which of the following?",o:["Provide the same standardised service to all clients","Tailor the level and type of service to each client's individual needs","Focus only on high-net-worth clients","Delegate less sophisticated clients to junior staff"],a:1,e:"Recognising different client needs means tailoring service levels, communication styles, and advisory depth to each client's individual circumstances, financial sophistication, and portfolio complexity.",r:"Ch.21, p.21-3"},
{id:105,ch:21,cn:"Customer – Representative Relationships",t:"Which of the following is considered a key factor in attracting new clients to a financial advisory practice?",o:["Offering the lowest fees in the market","Building a strong reputation through professional competence and positive client referrals","Advertising extensively on social media","Providing guaranteed investment returns"],a:1,e:"A strong reputation built through professional competence, ethical conduct, and positive client referrals is one of the most effective factors in attracting new clients to an advisory practice.",r:"Ch.21, p.21-6"},
{id:106,ch:22,cn:"Fact Finding And Needs Analysis",t:"During the fact-finding process, an FA representative asks a client about their monthly income, regular expenses, and existing debts, which falls under which area of the fact find?",o:["Personal information","Investment profile","Cash flow and financial obligations","Existing insurance coverage"],a:2,e:"Cash flow and financial obligations is one of the seven areas of fact finding that covers income sources, regular expenses, debt repayments, and overall financial commitments.",r:"Ch.22, p.22-4"},
{id:107,ch:22,cn:"Fact Finding And Needs Analysis",t:"The primary objective of conducting a thorough needs analysis is to achieve which of the following?",o:["Identify the maximum number of products to sell to the client","Determine the client's financial gaps and recommend appropriate solutions","Complete regulatory documentation requirements","Assess the client's willingness to pay premiums"],a:1,e:"The primary objective of needs analysis is to identify gaps between the client's current financial position and their goals, then recommend appropriate solutions to bridge those gaps.",r:"Ch.22, p.22-5"},
{id:108,ch:22,cn:"Fact Finding And Needs Analysis",t:"When conducting a fact find, asking a client about their dependants, age, health status, and employment details falls under which of the seven areas?",o:["Priorities and concerns","Cash flow analysis","Personal information","Assets and liabilities"],a:2,e:"Personal information gathering covers demographic details including age, health status, marital status, number of dependants, employment details, and other personal circumstances relevant to financial planning.",r:"Ch.22, p.22-4"},
{id:109,ch:22,cn:"Fact Finding And Needs Analysis",t:"An FA representative who uses open-ended questions and active listening during a client meeting is demonstrating which important fact-finding skill?",o:["Product knowledge","Structured interview technique","Sales closing ability","Regulatory awareness"],a:1,e:"Structured interview technique involves using open-ended questions, active listening, probing for details, and guiding the conversation to gather comprehensive information about the client's needs and circumstances.",r:"Ch.22, p.22-7"},
{id:110,ch:22,cn:"Fact Finding And Needs Analysis",t:"During the fact-finding process, asking a client what their top financial priorities are and what concerns them most about their financial future falls under which area?",o:["Investment profile","Personal information","Priorities and concerns","Existing insurance coverage"],a:2,e:"Priorities and concerns captures the client's stated goals, worries, and the relative importance they place on various financial objectives such as retirement, education funding, or protection.",r:"Ch.22, p.22-4"},
{id:111,ch:23,cn:"Analysing Financial Status",t:"A client has total assets of $800,000 and total liabilities of $350,000, so their net worth as shown on a net worth statement is which of the following?",o:["$1,150,000","$350,000","$450,000","$800,000"],a:2,e:"Net worth is calculated as total assets minus total liabilities. In this case, $800,000 - $350,000 = $450,000.",r:"Ch.23, p.23-3"},
{id:112,ch:23,cn:"Analysing Financial Status",t:"A client has liquid assets of $24,000 and monthly expenses of $6,000, which means their liquidity ratio is which of the following?",o:["2 months","4 months","6 months","12 months"],a:1,e:"The liquidity ratio is calculated as liquid assets divided by monthly expenses: $24,000 / $6,000 = 4 months. This indicates the client can cover 4 months of expenses from liquid assets.",r:"Ch.23, p.23-4"},
{id:113,ch:23,cn:"Analysing Financial Status",t:"A client's cash flow statement shows total monthly income of $10,000 and total monthly expenses of $8,500, which means their monthly surplus is which of the following?",o:["$10,000","$8,500","$1,500","$18,500"],a:2,e:"The cash flow surplus is calculated as total income minus total expenses: $10,000 - $8,500 = $1,500 per month available for savings or investment.",r:"Ch.23, p.23-3"},
{id:114,ch:23,cn:"Analysing Financial Status",t:"If a client saves $1,500 per month and has a gross monthly income of $10,000, their savings ratio is which of the following?",o:["10%","15%","20%","25%"],a:1,e:"The savings ratio is calculated as savings divided by gross income: $1,500 / $10,000 = 15%. This indicates the proportion of income being saved.",r:"Ch.23, p.23-5"},
{id:115,ch:23,cn:"Analysing Financial Status",t:"A client has total monthly debt repayments of $3,000 and a gross monthly income of $12,000, which gives a debt service ratio of which of the following?",o:["15%","20%","25%","36%"],a:2,e:"The debt service ratio is calculated as total monthly debt payments divided by gross monthly income: $3,000 / $12,000 = 25%. A high ratio indicates a significant portion of income is committed to debt repayment.",r:"Ch.23, p.23-5"},
{id:116,ch:24,cn:"Developing Strategies And Solutions",t:"When developing strategies and solutions for a client, the FA representative should ensure that product recommendations are based primarily on which of the following?",o:["The products with the highest commission rates","The client's identified needs and financial gaps from the needs analysis","The firm's preferred product list","The most popular products in the market"],a:1,e:"Product recommendations must be driven by the client's identified needs and financial gaps uncovered during the fact-finding and needs analysis process, not by commission rates or firm preferences.",r:"Ch.24, p.24-3"},
{id:117,ch:24,cn:"Developing Strategies And Solutions",t:"A client has identified needs for life insurance protection, retirement savings, and children's education funding, but has limited budget, so the FA representative should do which of the following?",o:["Recommend all three products simultaneously regardless of budget","Prioritise the recommendations based on urgency and importance relative to the client's budget","Only recommend the product with the highest premium","Defer all recommendations until the client's income increases"],a:1,e:"When a client has limited budget, the FA representative should prioritise recommendations based on urgency and importance, addressing the most critical needs first within the available budget.",r:"Ch.24, p.24-3"},
{id:118,ch:24,cn:"Developing Strategies And Solutions",t:"The process of matching specific financial products to a client's identified gaps is known as which of the following?",o:["Product pushing","Cross-selling","Product recommendation and solution matching","Portfolio diversification"],a:2,e:"Product recommendation and solution matching involves systematically pairing appropriate financial products with the specific gaps and needs identified during the client's needs analysis.",r:"Ch.24, p.24-3"},
{id:119,ch:24,cn:"Developing Strategies And Solutions",t:"When prioritising financial recommendations for a client, which need should typically be addressed first?",o:["Investment growth opportunities","Protection needs such as life and health insurance","Retirement savings","Children's education funding"],a:1,e:"Protection needs such as life and health insurance are typically prioritised first because they address fundamental risks that could derail all other financial plans if left unaddressed.",r:"Ch.24, p.24-4"},
{id:120,ch:24,cn:"Developing Strategies And Solutions",t:"An FA representative who recommends a product without explaining how it specifically addresses the client's identified needs is failing in which aspect of the advisory process?",o:["Fact finding","Needs analysis","Linking solutions to identified needs","Portfolio review"],a:2,e:"Linking solutions to identified needs requires the FA representative to clearly explain how each recommended product addresses a specific gap or need identified during the analysis, demonstrating the rationale behind the recommendation.",r:"Ch.24, p.24-3"},

{id:122,ch:25,cn:"Presentation Of Solutions",t:"When a client raises concerns about a recommended product during the presentation, the FA representative should respond by doing which of the following?",o:["Dismissing the concerns to maintain confidence in the recommendation","Pressuring the client to make a quick decision","Addressing the concerns honestly and providing factual information to help the client understand","Immediately switching to a different product recommendation"],a:2,e:"When clients raise concerns, the FA representative should address them honestly and transparently, providing factual information that helps the client understand and evaluate the recommendation.",r:"Ch.25, p.25-4"},
{id:123,ch:25,cn:"Presentation Of Solutions",t:"Proper documentation during the presentation stage serves which primary purpose?",o:["Creating a paper trail to protect the representative from complaints","Recording the client's understanding, the basis for recommendations, and the client's informed decision","Satisfying internal sales reporting requirements","Providing marketing material for future use"],a:1,e:"Documentation records the client's understanding of the recommendation, the basis and rationale for the advice given, and the client's informed decision, creating a transparent record of the advisory process.",r:"Ch.25, p.25-5"},
{id:124,ch:25,cn:"Presentation Of Solutions",t:"Using clear and simple language instead of technical financial jargon when explaining a product to a client is important because it achieves which of the following?",o:["It reduces the time needed for the presentation","It ensures the client genuinely understands the product and can make an informed decision","It makes the representative appear less knowledgeable","It is required by law for all financial presentations"],a:1,e:"Clear communication ensures clients genuinely understand what they are purchasing, including the features, risks, and costs, enabling them to make truly informed decisions.",r:"Ch.25, p.25-3"},
{id:125,ch:25,cn:"Presentation Of Solutions",t:"After presenting a recommendation and the client agrees to proceed, the FA representative should ensure which of the following before completing the transaction?",o:["The client signs immediately before they change their mind","The client confirms they understand the product, its risks, and the basis for the recommendation","The client agrees to purchase additional products","The client provides referrals to friends and family"],a:1,e:"Before completing the transaction, the FA representative must ensure the client confirms their understanding of the product, its risks, costs, and the rationale behind the recommendation.",r:"Ch.25, p.25-5"},

{id:127,ch:26,cn:"Reviewing Portfolios",t:"When new regulations change the tax treatment of certain investment products, this constitutes which type of trigger for a portfolio review?",o:["Personal circumstances trigger","Product performance trigger","Product development trigger","External trigger"],a:3,e:"Regulatory changes affecting tax treatment, compliance requirements, or product availability are external triggers that should prompt a review of how these changes impact the client's existing portfolio.",r:"Ch.26, p.26-4"},

{id:129,ch:26,cn:"Reviewing Portfolios",t:"When an insurance company launches a new critical illness product with broader coverage at competitive premiums, this represents which type of portfolio review trigger?",o:["Personal circumstances trigger","External trigger","Product performance trigger","Product development trigger"],a:3,e:"New product developments or launches that offer better features, coverage, or pricing represent product development triggers that may benefit existing clients whose current products could be upgraded.",r:"Ch.26, p.26-5"},

// Update best score if current exceeds previous best

// ==================== HELPERS ====================
function paperKey(){return curExam+'_'+curPaper}
function getPaper(){return ALL_PAPERS[curExam][curPaper].questions}
function chs(){const s=new Set();return getPaper().filter(q=>{if(s.has(q.ch))return false;s.add(q.ch);return true}).map(q=>({n:q.ch,nm:q.cn}))}
function stats(a){let t=0,c=0;for(const[id,v]of Object.entries(a||{})){t++;if(getPaper().find(q=>q.id===+id)?.a===v)c++}return{t,c,w:t-c}}
function cstat(ch,a){const qs=getPaper().filter(q=>q.ch===ch);let an=0,c=0;qs.forEach(q=>{if((a||{})[q.id]!==undefined){an++;if(q.a===a[q.id])c++}});return{tot:qs.length,a:an,c}}
function shuffle2(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function togTheme(){const d=document.documentElement,t=d.getAttribute('data-theme')==='dark'?'light':'dark';d.setAttribute('data-theme',t);try{localStorage.setItem('hiqt',t)}catch(e){}updTh()}
function updTh(){document.querySelectorAll('#thBtn,.thb').forEach(e=>{if(e)e.textContent=document.documentElement.getAttribute('data-theme')==='dark'?'☀️':'🌙'})}
function sv(v){view=v;render();window.scrollTo({top:0})}
function sn(m){navMode=m;render()}

function doShuf(){shuf=!shuf;order=shuf?shuffle2(getPaper().map(q=>q.id)):null;render()}
function setPaper(p){curPaper=p;view='all';filt='all';shuf=false;order=null;render()}

};

}

function renderResults(a,ch){
const P=getPaper(),s=stats(a);
const oa=s.t?Math.round(s.c/s.t*100):0,op=P.length?Math.round(s.c/P.length*100):0;
let h=`<div class="rp"><h3>📊 My Results by Chapter</h3>

<div style="background:var(--bg3);border-radius:var(--rs);padding:12px;text-align:center"><div style="font-size:.62rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;font-weight:600">Accuracy</div><div style="font-size:1.2rem;font-weight:800;color:${oa>=80?'var(--ok)':oa>=50?'var(--amb)':'var(--err)'};margin-top:2px">${s.t?oa+'%':'—'}</div></div>
<div style="background:var(--bg3);border-radius:var(--rs);padding:12px;text-align:center"><div style="font-size:.62rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;font-weight:600">Progress</div><div style="font-size:1.2rem;font-weight:800;margin-top:2px">${s.t?op+'%':'—'}</div></div>
</div>
<div style="display:grid;grid-template-columns:2fr 3fr 1fr 1fr;gap:4px;margin-bottom:8px;font-size:.68rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;font-weight:600;padding:0 4px"><span>Chapter</span><span>Progress</span><span style="text-align:right">Score</span><span style="text-align:right">Accuracy</span></div>
