function renderLB(){
if(!allU.length)return'<div class="lb"><div class="spinner"></div> Loading leaderboard...</div>';
const P=getPaper();
const k=paperKey();
const board=allU.map(u=>{
// Use bestScores for leaderboard if available, otherwise compute from current answers
const best=(u.bestScores&&u.bestScores[k])||null;
const pa=(u.papers&&u.papers[k])||{};const s=stats(pa);
const livScore=P.length?Math.round(s.c/P.length*100):0;const livAcc=s.t?Math.round(s.c/s.t*100):0;
const score=best?Math.max(best.score,livScore):livScore;
const correct=best?Math.max(best.correct,s.c):s.c;
const attempted=best?(correct===best.correct?best.attempted:s.t):s.t;
const acc=attempted?Math.round(correct/attempted*100):0;
return{...u,s:{t:attempted,c:correct,w:attempted-correct},score,acc}
}).filter(u=>u.s.t>0).sort((a,b)=>b.score-a.score||b.acc-a.acc);
const medals=['🥇','🥈','🥉'];
let h=`<div class="lb"><h3>🏆 Leaderboard</h3><p class="lb-sub">${ALL_PAPERS[curExam][curPaper].name} · ${board.length} participants</p>
<div style="background:var(--bg);border:1px solid var(--bd);border-radius:var(--rs);padding:12px 16px;margin-bottom:16px;font-size:.82rem;color:var(--tx2);line-height:1.5">
<strong style="color:var(--tx)">How are rankings decided?</strong><br>
Your <strong>Score</strong> = correct answers out of all ${P.length} questions. Questions you haven't attempted count as incorrect, so answering more questions and getting them right will boost your rank. Your best score is saved — resetting a paper won't affect your ranking.</div>`;
if(!board.length){h+=`<p style="text-align:center;color:var(--tx3);padding:20px">No one has answered yet. Be the first!</p></div>`;return h}
board.forEach((u,i)=>{
const rank=i+1;const prog=Math.round(u.s.t/P.length*100);
const me=curUser&&u.id===curUser.uid;
const rc=i<3?['gold','silver','bronze'][i]:'';
const avCol=AVATARS[u.name?u.name.charCodeAt(0)%AVATARS.length:0];
const ini=(u.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
h+=`<div class="lb-row ${me?'me':''}">
<div class="lb-rank ${rc}">${i<3?medals[i]:rank}</div>
<div class="lb-av" style="background:${avCol}">${ini}</div>
<div class="lb-info">
<div class="lb-name">${u.name||'Anonymous'}${me?' (You)':''}</div>
<div class="lb-stats">
<div class="lb-stat"><span class="lb-stat-val">${u.s.t}/${P.length}</span><span class="lb-stat-lbl">Attempted</span></div>
<div class="lb-stat"><span class="lb-stat-val">${u.acc}%</span><span class="lb-stat-lbl">Accuracy</span></div>
<div class="lb-stat"><span class="lb-stat-val" style="color:${u.score>=60?'var(--ok)':u.score>=30?'var(--amb)':'var(--err)'}">${u.score}%</span><span class="lb-stat-lbl">Score</span></div>
<div class="lb-bar-wrap"><div class="lb-bar" style="width:${prog}%;background:${avCol}"></div></div>
</div>
</div>
</div>`});
h+=`</div>`;return h}

// ==================== ADMIN ====================
function renderAdmin(){
if(!allU.length)return'<div class="admin-panel"><div class="spinner"></div></div>';
const k=paperKey();
let h=`<div class="admin-panel"><h3>⚙ Admin Dashboard</h3><p class="as">${allU.length} users · ${ALL_PAPERS[curExam][curPaper].name}</p>
<div style="overflow-x:auto"><table class="at"><tr><th>User</th><th>Email</th><th>Done</th><th>Correct</th><th>Score</th><th>Last Active</th></tr>`;
const P=getPaper();
allU.forEach(u=>{const pa=(u.papers&&u.papers[k])||{};const s=stats(pa);const pct=s.t?Math.round(s.c/s.t*100):0;
const la=u.lastActive?new Date(u.lastActive.seconds*1000).toLocaleDateString():'—';
h+=`<tr><td><strong>${u.name||'—'}</strong></td><td style="color:var(--tx3)">${u.email||'—'}</td><td>${s.t}/${P.length}</td><td>${s.c}</td><td>${s.t?pct+'%':'—'}</td><td style="color:var(--tx3)">${la}</td></tr>`});
h+=`</table></div></div>`;return h}

async function togAdm(){showAdm=!showAdm;if(showAdm)await loadAll();render()}

// ==================== INIT ====================
auth.onAuthStateChanged(async u=>{
if(u){curUser=u;appMode='dashboard';document.getElementById('root').innerHTML='<div class="loading"><div class="spinner"></div>Loading...</div>';
await loadU();loadAll().then(()=>{if(navMode==='leaderboard')render()});render();if(wnUnseen())setTimeout(showChangelog,600)}
else{curUser=null;uData=null;isAdm=false;showAdm=false;appMode='dashboard';renderLanding()}});

// Leaderboard auto-refresh
setInterval(async()=>{if(curUser&&navMode==='leaderboard'){await loadAll();render()}},15000);


try{const t=localStorage.getItem('hiqt');if(t)document.documentElement.setAttribute('data-theme',t)}catch(e){}
</script>
