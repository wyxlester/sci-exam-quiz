<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2563eb">
<title>SCI Exam Prep — Insurance Qualification Exams</title>
<style>
:root{
--bg:#f0f4f8;--bg2:#ffffff;--bg3:#f8fafc;--bd:#e2e8f0;--bdh:#3b82f6;
--tx:#0f172a;--tx2:#475569;--tx3:#94a3b8;
--pri:#3b82f6;--pril:#dbeafe;--prid:#2563eb;
--ok:#10b981;--okbg:#d1fae5;--okbd:#6ee7b7;--okt:#065f46;
--err:#ef4444;--errbg:#fee2e2;--errbd:#fca5a5;--errt:#991b1b;
--amb:#f59e0b;--ambbg:#fef3c7;--ambt:#92400e;
--purple:#8b5cf6;--purplebg:#ede9fe;
--sh:0 1px 3px rgba(0,0,0,.08);--sh2:0 4px 12px rgba(0,0,0,.1);
--r:14px;--rs:10px;
--ch1:#3b82f6;--ch2:#8b5cf6;--ch3:#06b6d4;--ch4:#f59e0b;--ch5:#0891b2;
--ch6:#d946ef;--ch7:#ec4899;--ch8:#7c3aed;--ch9:#6366f1;--ch10:#f97316;
--ch11:#0284c7;--ch12:#0ea5e9;--ch13:#a855f7;--ch14:#db2777;
}
[data-theme="dark"]{
--bg:#0c1222;--bg2:#1a2332;--bg3:#243044;--bd:#2d3f55;--bdh:#60a5fa;
--tx:#e2e8f0;--tx2:#94a3b8;--tx3:#64748b;
--pri:#60a5fa;--pril:#1e3a5f;--prid:#3b82f6;
--ok:#34d399;--okbg:#064e3b;--okbd:#059669;--okt:#a7f3d0;
--err:#f87171;--errbg:#450a0a;--errbd:#dc2626;--errt:#fca5a5;
--amb:#fbbf24;--ambbg:#451a03;--ambt:#fde68a;
--purple:#a78bfa;--purplebg:#2e1065;
--sh:0 1px 3px rgba(0,0,0,.3);--sh2:0 4px 12px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--tx);line-height:1.6;-webkit-tap-highlight-color:transparent;transition:background .3s,color .3s}
button{font-family:inherit;cursor:pointer}
.app{max-width:1200px;margin:0 auto;padding:24px 40px;padding-bottom:100px}

/* Auth */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.auth-card{background:var(--bg2);border:1px solid var(--bd);border-radius:20px;padding:36px 28px;width:100%;max-width:400px;box-shadow:var(--sh2)}
.auth-card .logo{text-align:center;font-size:2.2rem;margin-bottom:8px}
.auth-card h1{font-size:1.35rem;text-align:center;margin-bottom:2px}
.auth-card .sub{text-align:center;color:var(--tx2);font-size:.82rem;margin-bottom:28px}
.auth-card label{display:block;font-size:.78rem;font-weight:600;color:var(--tx2);margin-bottom:4px;margin-top:16px}
.auth-card input{width:100%;padding:11px 14px;border:1.5px solid var(--bd);border-radius:var(--rs);font-size:.9rem;background:var(--bg);color:var(--tx);outline:none;transition:border .2s}
.auth-card input:focus{border-color:var(--pri);box-shadow:0 0 0 3px var(--pril)}
.auth-card .btn{width:100%;padding:12px;border:none;border-radius:var(--rs);background:var(--pri);color:#fff;font-size:.9rem;font-weight:600;cursor:pointer;margin-top:22px;transition:all .15s}
.auth-card .btn:hover{background:var(--prid)}
.auth-card .btn:disabled{opacity:.5;cursor:not-allowed}
.auth-card .switch{text-align:center;margin-top:18px;font-size:.82rem;color:var(--tx2)}
.auth-card .switch a{color:var(--pri);cursor:pointer;text-decoration:none;font-weight:600}
.auth-card .err-msg{background:var(--errbg);color:var(--err);padding:10px 14px;border-radius:var(--rs);font-size:.8rem;margin-top:14px;display:none;border:1px solid var(--errbd)}
.auth-card .err-msg.show{display:block}
.auth-theme{position:absolute;top:20px;right:20px;background:var(--bg2);border:1px solid var(--bd);border-radius:999px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;box-shadow:var(--sh)}

/* Top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 0;margin-bottom:16px}
.topbar .user-info{display:flex;align-items:center;gap:10px}
.topbar .avatar{width:36px;height:36px;border-radius:999px;background:linear-gradient(135deg,var(--pri),var(--purple));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;box-shadow:0 2px 8px rgba(59,130,246,.3)}
.topbar .uname{font-size:.88rem;font-weight:600}
.topbar .uemail{font-size:.7rem;color:var(--tx3)}
.tb-btns{display:flex;gap:6px;align-items:center}
.tb-btn{padding:7px 12px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--bg2);font-size:.75rem;color:var(--tx2);transition:all .15s;box-shadow:var(--sh)}
.tb-btn:hover{border-color:var(--bdh);color:var(--pri)}
.tb-btn.admin{border-color:var(--amb);color:var(--ambt);background:var(--ambbg)}
.tb-btn.logout{color:var(--err)}

/* Paper selector */
.paper-sel{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.paper-btn{padding:10px 18px;border:2px solid var(--bd);border-radius:var(--r);background:var(--bg2);font-size:.85rem;font-weight:600;color:var(--tx2);transition:all .2s;box-shadow:var(--sh);flex:1;text-align:center;min-width:120px}
.paper-btn:hover{border-color:var(--pri)}
.paper-btn.on{border-color:var(--pri);background:var(--pril);color:var(--pri);box-shadow:0 0 0 3px var(--pril)}
.paper-btn .paper-sub{font-size:.7rem;font-weight:400;color:var(--tx3);margin-top:2px}

/* Nav tabs */
.nav-tabs{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:4px;margin-bottom:16px;box-shadow:var(--sh)}
.nav-tab{flex:1;padding:10px;border:none;border-radius:var(--rs);background:transparent;font-size:.82rem;font-weight:600;color:var(--tx3);transition:all .15s;text-align:center}
.nav-tab:hover{color:var(--tx)}
.nav-tab.on{background:var(--pri);color:#fff;box-shadow:0 2px 6px rgba(59,130,246,.3)}

/* Dashboard */
.dashboard{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:14px 8px;text-align:center;box-shadow:var(--sh)}
.stat .sl{font-size:.62rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.7px;font-weight:600}
.stat .sv{font-size:1.3rem;font-weight:800;margin-top:2px}

/* Progress */
.pbar{background:var(--bd);border-radius:999px;height:8px;margin-bottom:16px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.1)}
.pfill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--pri),var(--purple));transition:width .5s}

/* Chapter tabs */
.ch-tabs{display:flex;gap:5px;flex-wrap:wrap;padding-bottom:6px;margin-bottom:16px;max-width:1000px;margin-left:auto;margin-right:auto}
.ch-tab{flex-shrink:0;padding:6px 12px;border:1.5px solid var(--bd);border-radius:999px;background:var(--bg2);font-size:.72rem;font-weight:600;color:var(--tx2);transition:all .15s;white-space:nowrap}
.ch-tab:hover{border-color:var(--bdh);color:var(--pri)}
.ch-tab.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.ch-tab.hi{border-color:var(--amb);color:var(--ambt);background:var(--ambbg)}
.ch-tab.hi.on{background:var(--pri);color:#fff;border-color:var(--pri)}

/* Controls */
.ctrls{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.pill{padding:6px 14px;border:1.5px solid var(--bd);border-radius:999px;background:var(--bg2);font-size:.75rem;font-weight:500;color:var(--tx2);transition:all .15s}
.pill:hover{border-color:var(--bdh)}
.pill.on{background:var(--pril);border-color:var(--pri);color:var(--pri);font-weight:600}
.pill.ml{margin-left:auto}

/* Leaderboard */
.lb{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--sh2)}
.lb h3{font-size:1rem;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.lb .lb-sub{font-size:.78rem;color:var(--tx3);margin-bottom:16px}
.lb-row{display:flex;align-items:center;gap:12px;padding:14px;border-radius:var(--rs);margin-bottom:8px;transition:background .15s;border:1px solid var(--bd)}
.lb-row:hover{background:var(--bg3)}
.lb-row.me{background:var(--pril);border:1.5px solid var(--pri)}
.lb-rank{font-size:1.1rem;font-weight:800;min-width:32px;text-align:center}
.lb-rank.gold{color:#f59e0b}.lb-rank.silver{color:#94a3b8}.lb-rank.bronze{color:#cd7c2f}
.lb-av{width:36px;height:36px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;color:#fff;flex-shrink:0}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:.95rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px}
.lb-stats{display:flex;gap:12px;flex-wrap:wrap}
.lb-stat{display:flex;flex-direction:column;align-items:center;background:var(--bg);border-radius:8px;padding:6px 12px;min-width:64px}
.lb-stat-val{font-size:.95rem;font-weight:700}
.lb-stat-lbl{font-size:.65rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px}
.lb-bar-wrap{flex:1;min-width:40px;max-width:80px;height:6px;background:var(--bd);border-radius:999px;align-self:center}
.lb-bar{height:100%;border-radius:999px;transition:width .4s}

/* Chapter Section */
.ch-section{margin-bottom:24px;border-radius:var(--r);overflow:hidden;border:1px solid var(--bd);box-shadow:var(--sh)}
.ch-banner{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;color:#fff;position:relative}
.ch-banner h2{font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:8px}
.ch-banner .badge{background:rgba(255,255,255,.25);font-size:.6rem;padding:2px 8px;border-radius:999px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.ch-banner .ch-stats{display:flex;align-items:center;gap:12px}
.ch-banner .ch-sc{font-size:.85rem;font-weight:700}
.ch-reset-btn{padding:5px 10px;border:1px solid rgba(255,255,255,.4);border-radius:var(--rs);background:rgba(255,255,255,.15);color:#fff;font-size:.68rem;font-weight:600;transition:all .15s;backdrop-filter:blur(4px)}
.ch-reset-btn:hover{background:rgba(255,255,255,.3)}
.ch-body{background:var(--bg2);padding:20px 24px}

/* Question Card */
.qc{background:var(--bg3);border:1px solid var(--bd);border-radius:12px;padding:24px 28px;margin-bottom:20px;transition:all .2s}
.qc:last-child{margin-bottom:0}
.qc.qok{border-color:var(--okbd);border-left:4px solid var(--ok)}
.qc.qer{border-color:var(--errbd);border-left:4px solid var(--err)}
.qc .qn{font-size:.75rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;font-weight:600}
.qc .qt{font-size:1rem;font-weight:600;margin-bottom:20px;line-height:1.6}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:flex-start;gap:12px;padding:14px 18px;border:1.5px solid var(--bd);border-radius:10px;background:var(--bg2);text-align:left;font-size:.92rem;color:var(--tx);transition:all .15s;line-height:1.5;-webkit-user-select:none;user-select:none;cursor:pointer}
.opt:active:not(.dis){transform:scale(.985)}
.opt:hover:not(.dis){border-color:var(--bdh);background:var(--pril)}
.opt .lt{font-weight:700;min-width:24px;color:var(--tx3);flex-shrink:0}
.opt.sok{border-color:var(--okbd);background:var(--okbg);color:var(--okt)}.opt.sok .lt{color:var(--ok)}
.opt.ser{border-color:var(--errbd);background:var(--errbg);color:var(--errt)}.opt.ser .lt{color:var(--err)}
.opt.rok{border-color:var(--okbd);background:var(--okbg)}.opt.rok .lt{color:var(--ok)}
.opt.dis{cursor:default;opacity:.55}.opt.dis.sok,.opt.dis.ser,.opt.dis.rok{opacity:1}
.fb{margin-top:14px;padding:16px 20px;border-radius:10px;font-size:.88rem;line-height:1.65}
.fb.fok{background:var(--okbg);color:var(--okt);border:1px solid var(--okbd)}
.fb.fer{background:var(--errbg);color:var(--errt);border:1px solid var(--errbd)}
.fb .fe{margin-top:8px;font-size:.84rem;opacity:.88;line-height:1.6}
.fb .fr{margin-top:10px;font-size:.76rem;padding:6px 10px;border-radius:6px;display:inline-block;opacity:.75;background:rgba(0,0,0,.06);font-style:normal;letter-spacing:.2px}

/* Results */
.rp{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--sh2)}
.rp h3{margin-bottom:14px;font-size:1rem}
.rg{display:grid;grid-template-columns:1fr;gap:6px}
.rr{display:flex;align-items:center;padding:10px 12px;background:var(--bg3);border-radius:var(--rs);font-size:.82rem;gap:8px}
.rr .rn{min-width:55px;font-weight:600}.rr .rs{font-weight:700;min-width:45px;text-align:right}.rr .rs.pf{color:var(--ok)}
.rb{height:6px;background:var(--bd);border-radius:999px;flex:1}
.rbf{height:100%;border-radius:999px;transition:width .3s}
.rt{margin-top:16px;padding-top:14px;border-top:1px solid var(--bd);text-align:center;font-weight:700;font-size:.95rem}

/* Admin */
.admin-panel{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:20px;margin-bottom:16px;box-shadow:var(--sh2)}
.admin-panel h3{margin-bottom:4px}.admin-panel .as{color:var(--tx3);font-size:.78rem;margin-bottom:14px}
.at{width:100%;border-collapse:collapse;font-size:.78rem}
.at th{text-align:left;padding:8px;border-bottom:2px solid var(--bd);color:var(--tx3);font-size:.68rem;text-transform:uppercase;letter-spacing:.5px}
.at td{padding:8px;border-bottom:1px solid var(--bd)}
.at tr:last-child td{border-bottom:none}

/* Loading & misc */
.loading{text-align:center;padding:60px 20px;color:var(--tx2)}
.spinner{width:32px;height:32px;border:3px solid var(--bd);border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.scroll-top{position:fixed;bottom:20px;right:20px;width:46px;height:46px;border-radius:999px;background:var(--pri);color:#fff;border:none;font-size:1.2rem;display:none;align-items:center;justify-content:center;box-shadow:var(--sh2);z-index:100}
.scroll-top.show{display:flex}

/* Landing Page */
.land-wrap{min-height:100vh;background:var(--bg);padding:0}
.land-hero{text-align:center;padding:80px 40px 60px;background:linear-gradient(135deg,var(--pri),var(--purple));color:#fff;position:relative;overflow:hidden}
.land-hero::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:40px;background:var(--bg);border-radius:50% 50% 0 0}
.land-hero .hero-icon{font-size:4rem;margin-bottom:16px;display:block}
.land-hero h1{font-size:2.4rem;font-weight:800;margin-bottom:8px;letter-spacing:-.5px}
.land-hero .hero-sub{font-size:1.05rem;opacity:.9;max-width:540px;margin:0 auto;line-height:1.6}
.land-body{max-width:960px;margin:0 auto;padding:0 40px 60px}
.land-section{margin-top:40px}
.land-section h2{font-size:1.25rem;font-weight:700;margin-bottom:12px;color:var(--tx);display:flex;align-items:center;gap:8px}
.land-section p{font-size:.92rem;color:var(--tx2);line-height:1.7;margin-bottom:10px}
.land-features{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:16px}
.land-feat{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:24px 16px;text-align:center;box-shadow:var(--sh);transition:transform .15s,box-shadow .15s}
.land-feat:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.land-feat .feat-icon{font-size:1.8rem;margin-bottom:8px;display:block}
.land-feat .feat-title{font-size:.88rem;font-weight:700;margin-bottom:4px}
.land-feat .feat-desc{font-size:.78rem;color:var(--tx3);line-height:1.5}
.land-refs{list-style:none;padding:0;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.land-refs li{padding:14px 16px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rs);font-size:.85rem;display:flex;align-items:center;gap:10px;box-shadow:var(--sh)}
.land-refs .ref-icon{font-size:1.2rem;flex-shrink:0}
.land-refs .ref-title{font-weight:600}
.land-refs .ref-desc{font-size:.75rem;color:var(--tx3)}
.land-chapters{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.land-ch{padding:6px 14px;border-radius:999px;font-size:.78rem;font-weight:600;color:#fff}
.land-cta{text-align:center;margin-top:44px}
.land-cta .btn{display:inline-block;padding:16px 56px;background:var(--pri);color:#fff;border:none;border-radius:var(--rs);font-size:1.05rem;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(59,130,246,.3);transition:all .2s}
.land-cta .btn:hover{background:var(--prid);transform:translateY(-2px);box-shadow:0 8px 24px rgba(59,130,246,.4)}
.land-cta .login-link{display:block;margin-top:14px;font-size:.88rem;color:var(--tx3)}
.land-cta .login-link a{color:var(--pri);cursor:pointer;font-weight:600;text-decoration:none}
.land-footer{text-align:center;margin-top:40px;padding-top:24px;border-top:1px solid var(--bd);font-size:.78rem;color:var(--tx3);line-height:1.7}
/* ==================== DESKTOP (900px+) ==================== */
@media(min-width:900px){
.app{padding:32px 48px}
.topbar{padding:18px 0;margin-bottom:20px}
.topbar .avatar{width:44px;height:44px;font-size:1rem}
.topbar .uname{font-size:1rem}
.topbar .uemail{font-size:.78rem}
.tb-btn{padding:8px 16px;font-size:.82rem}

.paper-sel{gap:12px;margin-bottom:20px;max-width:1000px;margin-left:auto;margin-right:auto}
.paper-btn{padding:14px 24px;font-size:.92rem;min-width:180px}
.paper-btn .paper-sub{font-size:.78rem}

.nav-tabs{gap:6px;padding:5px;margin-bottom:20px;max-width:1000px;margin-left:auto;margin-right:auto}
.nav-tab{padding:12px 16px;font-size:.88rem}

.dashboard{gap:12px;margin-bottom:20px;max-width:1000px;margin-left:auto;margin-right:auto}
.stat{padding:20px 12px}
.stat .sl{font-size:.72rem}
.stat .sv{font-size:1.6rem}

.pbar{height:10px;margin-bottom:20px;max-width:1000px;margin-left:auto;margin-right:auto}

.ch-tabs{gap:8px;margin-bottom:20px;flex-wrap:wrap}
.ch-tab{padding:8px 16px;font-size:.8rem}

.ctrls{gap:8px;margin-bottom:20px;max-width:1000px;margin-left:auto;margin-right:auto}
.pill{padding:8px 18px;font-size:.82rem}

.ch-body{padding:24px 32px}
.qc{padding:28px 32px;margin-bottom:24px;border-radius:14px}
.qc .qn{font-size:.78rem;margin-bottom:12px}
.qc .qt{font-size:1.1rem;margin-bottom:24px}
.opts{gap:12px}
.opt{padding:16px 20px;font-size:.95rem;border-radius:12px}
.fb{padding:16px 20px;font-size:.9rem;margin-top:16px}

.ch-section{margin-bottom:28px;max-width:1000px;margin-left:auto;margin-right:auto}
.ch-banner{padding:18px 24px}
.ch-banner h2{font-size:1.05rem}
.ch-banner .badge{font-size:.68rem;padding:3px 10px}
.ch-banner .ch-sc{font-size:.92rem}
.ch-reset-btn{padding:6px 14px;font-size:.75rem}

/* Leaderboard desktop */
.lb{padding:28px;max-width:1000px;margin:0 auto 20px}
.lb h3{font-size:1.15rem}
.lb-row{gap:16px;padding:16px 20px}
.lb-rank{font-size:1.3rem;min-width:40px}
.lb-av{width:44px;height:44px;font-size:.9rem}
.lb-name{font-size:1.05rem;margin-bottom:8px}
.lb-stats{gap:16px}
.lb-stat{padding:8px 16px;min-width:76px}
.lb-stat-val{font-size:1.05rem}
.lb-stat-lbl{font-size:.7rem}
.lb-bar-wrap{max-width:100px;height:8px}

/* Results desktop */
.rp{padding:28px;max-width:1000px;margin:0 auto 20px}
.rp h3{font-size:1.15rem}
.rg{grid-template-columns:1fr 1fr;gap:8px}
.rr{padding:12px 16px;font-size:.88rem}
.rr .rn{min-width:60px}
.rb{height:8px}

/* Admin desktop */
.admin-panel{padding:28px;max-width:1000px;margin:0 auto 20px}
.at{font-size:.85rem}
.at th{padding:10px 12px;font-size:.72rem}

paper1:{name:"Paper 1",desc:"130 Questions · All Chapters",questions:[
{id:1,ch:1,cn:"Overview of Healthcare Environment",t:"Which is NOT a Singapore Government healthcare philosophy objective?",o:["Promote personal responsibility","Provide free universal healthcare to all","Rely on competition and market forces","Intervene directly when necessary"],a:1,e:"Singapore's healthcare philosophy is built on 5 MOH objectives: (1) nurture a healthy nation, (2) promote personal responsibility, (3) provide good and affordable basic medical services, (4) rely on competition and market forces, and (5) intervene directly when necessary. The key word is 'affordable' — Singapore explicitly does not offer free universal healthcare.",r:"HI 8th Ed, Ch 1, Section 2 — Singapore's Healthcare Philosophy, p.3"},
{id:2,ch:1,cn:"Overview of Healthcare Environment",t:'The "3 Beyonds" strategy refers to:',o:["Healthcare→Health, Hospital→Community, Quality→Value","Cost→Quality, Hospital→Home, Treatment→Prevention","Insurance→Savings, Public→Private, Local→Global","Subsidy→Self-Pay, Acute→Chronic, Individual→Community"],a:0,e:'In 2016, MOH launched the "3 Beyonds" for Better Health, Better Care and Better Life: (1) Beyond Healthcare to Health — shifting focus from treatment to prevention, (2) Beyond Hospital to Community — moving care closer to home, and (3) Beyond Quality to Value — ensuring cost-effective, sustainable care delivery. This built on the Healthcare 2020 Masterplan\'s achievements.',r:"HI 8th Ed, Ch 1, Section 3B — Beyond Healthcare 2020, p.5"},
{id:3,ch:1,cn:"Overview of Healthcare Environment",t:"Which is NOT an ILTC service category?",o:["Home-based services","Acute hospital services","Residential care facilities","Palliative care services"],a:1,e:"ILTC services cover four categories: (1) Home-based services for frail/home-bound seniors, (2) Centre-based services for daytime care, (3) Residential care facilities including nursing homes and hospices, and (4) Palliative care for end-of-life support. Acute hospital services are a separate category under Hospital Services (Section 4B), not ILTC.",r:"HI 8th Ed, Ch 1, Section 4C — Intermediate and Long-Term Care Services, p.10"},
{id:4,ch:1,cn:"Overview of Healthcare Environment",t:"Healthier SG includes all EXCEPT:",o:["Mobilise family doctors","Develop health plans","Free private hospital coverage for seniors","Establish enablers (IT, manpower)"],a:2,e:"Healthier SG (launched mid-2023) has 5 key features: (1) Mobilise family doctors for preventive care, (2) Develop health plans with lifestyle adjustments and screenings, (3) Activate community partners, (4) National enrolment exercise — one family doctor, one health plan, and (5) Establish enablers (IT, manpower, financing). Free private hospital coverage is not part of Healthier SG.",r:"HI 8th Ed, Ch 1, Section 3C — Healthier SG, p.6"},
{id:5,ch:1,cn:"Overview of Healthcare Environment",t:"3 main types of healthcare services:",o:["Primary, Hospital, ILTC","Emergency, Outpatient, Inpatient","Public, Private, Community","Preventive, Curative, Rehabilitative"],a:0,e:"Singapore's healthcare system comprises three main types: (1) Primary healthcare — polyclinics and GP clinics providing basic treatment, preventive care and health education, (2) Hospital services — public and private hospitals for inpatient, specialist and emergency care, and (3) Intermediate and Long-Term Care (ILTC) — services for elderly needing continued care after hospital discharge.",r:"HI 8th Ed, Ch 1, Section 4 — Healthcare System in Singapore, p.8"},
{id:6,ch:2,cn:"Medical Expense Insurance",t:"A deductible in MEI is:",o:["% of covered expenses insured pays","Flat dollar amount paid first by policyholder","Discount for no claims","Max insurer pays per lifetime"],a:1,e:"A deductible is a flat dollar amount the policyholder must pay out of pocket before the insurer begins payment. It applies on a per-year basis and resets at each policy renewal. It is different from co-insurance, which is a percentage of expenses above the deductible.",r:"HI 8th Ed, Ch 2, Section 3E1 — Deductible, p.24"},
{id:7,ch:2,cn:"Medical Expense Insurance",t:"MEI waiting period does NOT apply to:",o:["Pre-existing conditions","Illnesses after inception","Accidental injuries","Elective surgeries"],a:2,e:"The waiting period is the time that must pass before health insurance coverage begins for illnesses. Accidental injuries are covered immediately from the policy start date — no waiting period applies. Pre-existing conditions typically have even longer waiting periods.",r:"HI 8th Ed, Ch 2, Section 3I — Waiting Period, p.29"},
{id:8,ch:2,cn:"Medical Expense Insurance",t:"Common MEI exclusion:",o:["Emergency surgery","Cosmetic surgery","Specialist consultation","Day surgery"],a:1,e:"All MEI policies have exclusions specifying circumstances where claims won't be paid. Common exclusions include cosmetic/plastic surgery, self-inflicted injuries, drug/alcohol addiction treatment, and pre-existing conditions during the waiting period. Emergency and medically necessary procedures are generally covered.",r:"HI 8th Ed, Ch 2, Section 3M1 — Exclusions, p.30"},
{id:9,ch:2,cn:"Medical Expense Insurance",t:"Co-ordination of Benefits means:",o:["Unlimited multi-insurer claims","Total claims ≤ actual expenses","Each insurer pays independently","Only one insurer notified"],a:1,e:"The Co-ordination of Benefits clause ensures total claims from multiple insurance policies cannot exceed the actual medical expenses incurred. If a policyholder holds MEI with two insurers, both may contribute, but the combined payout cannot be more than the actual bill.",r:"HI 8th Ed, Ch 2, Section 3M2 — Co-ordination of Benefits, p.31"},
{id:10,ch:2,cn:"Medical Expense Insurance",t:"All IP policies are:",o:["Non-renewable after 65","Cancellable at discretion","Guaranteed renewable","Limited to 5-year term"],a:2,e:"All Integrated Plan (IP) policies in Singapore are guaranteed renewable — the insurer cannot terminate the policy due to poor claims experience, as long as premiums are paid. However, premium rates are not guaranteed and may be revised at renewal due to medical inflation or claims experience.",r:"HI 8th Ed, Ch 2, Section 3L — Renewability, p.30"},
{id:71,ch:2,cn:"Medical Expense Insurance",t:"S$1k deductible + 20% co-insurance on S$5k claim. Insurer pays:",o:["S$3,200","S$4,000","S$3,800","S$4,200"],a:0,e:"Step-by-step: (1) Subtract deductible: S$5,000 − S$1,000 = S$4,000. (2) Apply co-insurance (insured's share): 20% × S$4,000 = S$800. (3) Insurer pays the balance: S$4,000 − S$800 = S$3,200. The insured pays S$1,000 (deductible) + S$800 (co-insurance) = S$1,800 total.",r:"HI 8th Ed, Ch 2, Sections 3E1–E2 — Deductible & Co-insurance, pp.24–25"},
{id:72,ch:2,cn:"Medical Expense Insurance",t:"Pro-ration factor applies when:",o:["Multiple policies","Higher ward than entitled","Claim exceeds annual limit","Pre-existing condition"],a:1,e:"The pro-ration factor applies when an insured is admitted to a hospital or ward class higher than what their plan covers. A percentage reduction is applied to the claimable amount. This encourages policyholders to stay within their plan's entitled ward class.",r:"HI 8th Ed, Ch 2, Section 3E3 — Pro-ration Factor, p.26"},
{id:73,ch:2,cn:"Medical Expense Insurance",t:"NOT a reason for MEI termination:",o:["Death","Lifetime limit reached","Change of employer (individual policy)","Full-time military (except NS)"],a:2,e:"MEI coverage terminates upon: death, reaching the lifetime limit, full-time military service (except NS), or exceeding the geographical residency limit. A change of employer does not affect an individual MEI policy — individual policies are independent of employment status.",r:"HI 8th Ed, Ch 2, Section 6 — Termination of Cover, p.32"},
{id:74,ch:2,cn:"Medical Expense Insurance",t:"Citizenship factor is:",o:["Discount for SC","% reduction for non-citizens/SPRs","Loading on all foreign policies","Government tax"],a:1,e:"The citizenship factor is a percentage applied to reduce the claimable medical expenses of non-Singaporean insured persons (including PRs). It reflects the lower government healthcare subsidies available to non-citizens, resulting in reduced claim payouts under the policy.",r:"HI 8th Ed, Ch 2, Section 5 — Healthcare Subsidy Level, p.31"},
{id:75,ch:2,cn:"Medical Expense Insurance",t:"MEI operates on:",o:["Indemnity basis","Reimbursement basis","Cash benefit basis","Savings basis"],a:1,e:"MEI operates on a reimbursement basis — it reimburses the policyholder for actual medical expenses incurred, up to the maximum limits in the benefit schedule. This differs from cash benefit policies (like hospital cash insurance) which pay a fixed daily amount regardless of actual expenses.",r:"HI 8th Ed, Ch 2, Section 3D — Reimbursement of Expenses, p.23"},
{id:76,ch:2,cn:"Medical Expense Insurance",t:"NOT a typical claim document:",o:["Claim form","Discharge summary","Original bills","Police report"],a:3,e:"Standard MEI claim documents include: completed claim form, attending physician's statement, discharge summary, and original bills/receipts. A police report is not a standard claim document — it would only be relevant for specific accident claims involving third parties.",r:"HI 8th Ed, Ch 2, Section 7 — Claims, p.32"},
{id:77,ch:2,cn:"Medical Expense Insurance",t:"Geographical limit means:",o:["SG only","Auto-terminate if outside SG >180 days","Govt hospitals only","Home country only"],a:1,e:"Most individual MEI policies auto-terminate if the insured resides outside Singapore for more than 180 days continuously. Some insurers only apply this to non-citizens/non-PRs. Emergency treatment overseas during short-term travel may still be covered.",r:"HI 8th Ed, Ch 2, Section 3H — Geographical Limit, p.28"},
{id:78,ch:2,cn:"Medical Expense Insurance",t:"MEI premiums are:",o:["Flat for all ages","Age-band based, increasing","Gender-based only","Income-based"],a:1,e:"MEI premiums are age-band based and increase when the insured crosses into a higher age band at renewal. Rates are not guaranteed and may be revised due to medical inflation, claims experience, or regulatory changes. They are not flat, gender-based, or income-based.",r:"HI 8th Ed, Ch 2, Section 3K — Premiums, p.29"},
{id:79,ch:2,cn:"Medical Expense Insurance",t:"Small groups (<10) may require:",o:["Government approval","Individual health declarations","Minimum premium deposit","Reinsurance"],a:1,e:"Group MEI underwriting uses the Group Insurance Fact-Finding (GIFF) Form. For small groups (fewer than 10 members), insurers may also require individual health declarations from each member, as the pool is too small for effective risk pooling through group averaging alone.",r:"HI 8th Ed, Ch 2, Section 4 — Underwriting, p.31"},
{id:80,ch:2,cn:"Medical Expense Insurance",t:"Which caps total lifetime reimbursements?",o:["Annual limit","Event limit","Lifetime limit","Per-claim limit"],a:2,e:"MEI has three main benefit limits: (1) Lifetime limit — caps total reimbursements over the entire policy life (often set very high), (2) Annual limit — caps total per policy year, and (3) Event limit — caps payable per disability/illness event. The lifetime limit is what ultimately caps total reimbursements.",r:"HI 8th Ed, Ch 2, Section 3F — Benefit Limits, p.27"},
{id:11,ch:3,cn:"Group Hospital & Surgical",t:"Compulsory plan premiums paid by:",o:["Jointly","Employee only","Employer only","Government"],a:2,e:"Under a compulsory (non-contributory) Group Insurance plan, all eligible employees must be covered and the premiums are paid solely by the employer. This contrasts with a voluntary (contributory) plan where employees may share in premium costs. One advantage of the compulsory plan is ease of administration since there are no payroll deductions to manage.",r:"HI 8th Ed, Ch 3, Section 3A — Compulsory & Voluntary Plans, p.53"},
{id:12,ch:3,cn:"Group Hospital & Surgical",t:"Migrant worker insurance compulsory since:",o:["2002","2008","2015","2020"],a:1,e:"Since 1 January 2008, MOM requires every employer to buy, pay and maintain minimum Medical Insurance coverage for foreign workers and foreign domestic workers during their employment in Singapore. This became compulsory after subsidies on hospital bills for foreigners were removed. The insurance is required for every S Pass holder and Work Permit holder before MOM issues or renews their work permit.",r:"HI 8th Ed, Ch 3, Section 4 — Medical Insurance Requirements for Migrant Workers, p.55"},
{id:13,ch:3,cn:"Group Hospital & Surgical",t:"Above S$15k, employer co-pays:",o:["10%","15%","25%","50%"],a:2,e:"Employers may purchase medical insurance coverage of between S$15,000 to S$60,000 per year for each migrant worker. For coverages above S$15,000, employers co-pay 25% of the claim amount while the insurer pays 75%. This co-payment structure was enhanced from 1 July 2023 as part of staged improvements to migrant worker medical insurance requirements.",r:"HI 8th Ed, Ch 3, Section 4 — Medical Insurance Requirements for Migrant Workers, p.56"},
{id:14,ch:3,cn:"Group Hospital & Surgical",t:"Key individual vs group difference:",o:["Group has higher premiums","Individual uses master contract","Group premiums generally lower","Individual needs no health declarations"],a:2,e:"Group Insurance premiums are generally lower than individual insurance because of group underwriting (the group as a whole is evaluated rather than each individual) and lower administrative costs (only one master contract is issued). Individual insurance involves individual health evaluation and higher admin costs, resulting in higher premiums.",r:"HI 8th Ed, Ch 3, Section 3B — Individual Versus Group Insurance, pp.54–55"},
{id:15,ch:3,cn:"Group Hospital & Surgical",t:"Migrant worker max co-payment:",o:["5% salary, 12mo","10% salary, 6mo per 2yr","15% salary, 3mo/yr","20% salary, 6mo/yr"],a:1,e:"Employers can have a co-payment arrangement with Work Permit holders (excluding migrant domestic workers) subject to three conditions: (1) co-pay must not exceed 10% of the employee's monthly salary, (2) co-payment duration must not exceed 6 months for every 2 years of employment, and (3) the arrangement must be explicitly in the employment contract with the worker's full consent.",r:"HI 8th Ed, Ch 3, Section 4 — Medical Insurance Requirements for Migrant Workers, p.56"},
{id:16,ch:4,cn:"Disability Income Insurance",t:"DII covers up to what % of income?",o:["50%","60%","75%","100%"],a:2,e:"Insurers allow the DII benefit amount to cover only up to 75% of the insured's average income over the past 12 months immediately prior to disability. The purpose of this cap is to ensure the insured will not be better off financially from the benefit, so that he retains the incentive to return to work. Self-employed persons may be granted a lower percentage (e.g. 60%).",r:"HI 8th Ed, Ch 4, Section 4 — Computation of DII Benefit, pp.68–69"},
{id:17,ch:4,cn:"Disability Income Insurance",t:"BROADEST disability definition:",o:["Any occupation","Modified own","Own occupation","Severe disability"],a:2,e:"The 'Own Occupation' definition is the broadest (most favourable to the insured) because it only requires inability to perform the duties of one's own specific occupation. 'Modified Own Occupation' adds similar occupations the insured is suited to by education/training. 'Any Occupation' is the most restrictive, requiring inability to perform any occupation at all. From broadest to narrowest: Own > Modified Own > Any Occupation.",r:"HI 8th Ed, Ch 4, Section 5A — Total Disability Definitions, pp.69–71"},
{id:18,ch:4,cn:"Disability Income Insurance",t:"Partial disability: salary lower by:",o:["10%","20%","25%","50%"],a:2,e:"Partial disability occurs when the insured recovers from total disability and can do some duties but at a salary at least 25% lower than the pre-disability salary. The partial disability benefit is calculated using the formula: (Pre-disability Earnings minus Present Earnings) divided by Pre-disability Earnings, multiplied by the Total Disability Benefit. This ensures the combined benefit and new income do not exceed pre-disability earnings.",r:"HI 8th Ed, Ch 4, Section 5B — Partial Disability, p.71"},
{id:19,ch:4,cn:"Disability Income Insurance",t:"Recurrent disability = relapse within:",o:["90 days","120 days","180 days","365 days"],a:2,e:"Recurrent disability (also called linked claims) occurs when an insured who has been receiving disability benefits returns to work but suffers a relapse from the same cause within 180 days. In this case, most insurers will waive the deferred/elimination period and benefits recommence immediately. The claim is treated as a continuation of the earlier claim for determining the benefit payment duration.",r:"HI 8th Ed, Ch 4, Section 5C — Recurrent Disability (Linked Claims), p.71"},
{id:20,ch:4,cn:"Disability Income Insurance",t:"TRUE about DII:",o:["Benefits taxable","Has cash value","Third-party policy","Benefits non-taxable"],a:3,e:"Key features of DII include: benefits received are non-taxable, the policy has no surrender value (no cash value), the policy cannot be written as a third-party policy, and assignment is not allowed. The policy is usually guaranteed renewable and non-cancellable by the insurer, though the insurer may adjust premiums if the insured changes to a higher-risk occupation.",r:"HI 8th Ed, Ch 4, Section 7 — Features of a DII Policy, pp.76–77"},
{id:21,ch:5,cn:"Long-Term Care Insurance",t:"Severe disability = unable to perform:",o:["2+ of 6 ADLs","3+ of 6 ADLs","4+ of 6 ADLs","All 6"],a:1,e:"Severe disability under LTC insurance is defined as the inability to perform 3 or more of the 6 Activities of Daily Living (ADLs). The 6 ADLs are: Washing, Dressing, Feeding, Toileting, Mobility and Transferring. This same 3-of-6 ADL threshold is used consistently across ElderShield, CareShield Life and private LTC Insurance policies as the standard benefit trigger.",r:"HI 8th Ed, Ch 5, Section 3B1 — Inability to Perform ADLs, pp.89–90"},
{id:22,ch:5,cn:"Long-Term Care Insurance",t:"NOT an ADL:",o:["Washing","Cooking","Feeding","Transferring"],a:1,e:"The 6 ADLs are: (1) Washing — ability to bathe, (2) Dressing — ability to put on/remove garments, (3) Feeding — ability to feed oneself after food is prepared, (4) Toileting — ability to use the lavatory or manage bowel/bladder, (5) Mobility — ability to move indoors on level surfaces, and (6) Transferring — ability to move between bed and chair. Cooking is NOT an ADL. Note that Feeding refers only to the act of eating, not preparing food.",r:"HI 8th Ed, Ch 5, Section 3B1 — Activities of Daily Living, p.90"},
{id:23,ch:5,cn:"Long-Term Care Insurance",t:"CareShield Life launched:",o:["2002","2015","2020","2023"],a:2,e:"CareShield Life was launched on 1 October 2020 to provide enhanced benefits compared to ElderShield. It provides lifetime cash payouts (not capped at 72 months like ElderShield), starting at S$600/month in 2020 with annual increases until age 67 or first claim. Those born 1980–1989 were enrolled in 2020, while those born 1990 onwards join at age 30.",r:"HI 8th Ed, Ch 5, Section 8 — CareShield Life, pp.96–97"},
{id:24,ch:5,cn:"Long-Term Care Insurance",t:"CareShield Life compulsory for born:",o:["1970+","1975+","1980+","1990+"],a:2,e:"CareShield Life is compulsory for all Singaporeans born in 1980 or later, including those with pre-existing disabilities. Those born 1970–1979 who were on ElderShield 400 without pre-existing disabilities were auto-enrolled from December 2021 but could opt out by 31 December 2023. Those born before 1970 may remain on ElderShield or voluntarily join CareShield Life.",r:"HI 8th Ed, Ch 5, Section 8 — CareShield Life, pp.96–97"},
{id:25,ch:5,cn:"Long-Term Care Insurance",t:"ElderShield 400 payout:",o:["36mo","60mo","72mo","Lifetime"],a:2,e:"ElderShield 400 (ESH400) pays S$400 per month for up to 72 months (6 years). The earlier ElderShield 300 (ESH300) paid S$300 per month for up to 60 months (5 years). Both schemes require the insured to be unable to perform 3 or more of 6 ADLs. ElderShield is no longer open for new applications and has been superseded by CareShield Life, which provides lifetime payouts.",r:"HI 8th Ed, Ch 5, Section 7 — ElderShield, pp.93–95"},
{id:26,ch:6,cn:"Critical Illness Insurance",t:"LIA CI Framework: how many conditions?",o:["20","30","37","45"],a:2,e:"The LIA Critical Illness Framework standardises definitions for 37 severe-stage critical illnesses. Since 2003, the industry has maintained this standardised list to provide consistency for policyholders. Insurers covering any condition on the LIA list must adopt the LIA's standard definition for the severe stage, though they may use their own definitions for early/intermediate stages. The framework is reviewed every three years.",r:"HI 8th Ed, Ch 6, Section 3 — LIA CI Framework 2024, pp.102–104"},
{id:27,ch:6,cn:"Critical Illness Insurance",t:"100% Acceleration CI claim → basic policy:",o:["Continues","Terminated","Doubles SA","Rider removed"],a:1,e:"With 100% Acceleration CI, the entire basic sum assured (plus bonuses) is paid upon diagnosis of a covered critical illness, and the policy terminates. This is because the CI benefit is a pre-payment of the death benefit. With partial acceleration (e.g. 50%), only that portion is paid and the policy continues with a reduced sum assured. The total payout across all events always equals the original sum assured.",r:"HI 8th Ed, Ch 6, Section 4C1 — Acceleration Benefit CI, pp.108–110"},
{id:28,ch:6,cn:"Critical Illness Insurance",t:"NOT required for CI eligibility:",o:["Policy in force","Meets definition","Hospitalised 7+ days","Survives survival period"],a:2,e:"CI eligibility requires: (1) policy in force, (2) not reached expiry age, (3) illness is covered and meets the precise policy definition, (4) not a pre-existing illness, (5) diagnosed after the waiting period, and (6) surviving the survival period if applicable. Hospitalisation is NOT a requirement for CI claims. The benefit is triggered by diagnosis of a covered condition that meets the policy definition, not by hospitalisation.",r:"HI 8th Ed, Ch 6, Section 4A — Eligibility Criteria, pp.105–107"},
{id:29,ch:6,cn:"Critical Illness Insurance",t:"Severity-based CI advantage:",o:["Lower premiums","Multi-stage payouts, multiple claims","No waiting period","Unlimited coverage"],a:1,e:"Severity-based CI plans (also called Early Pay CI) offer payouts at early, intermediate and severe stages of illness. Key advantages include: (1) greater number of illnesses covered, (2) payouts received at early stages supporting timely intervention, (3) ability to claim more than once across different severity stages, and (4) continuity of coverage after a claim. The premium is higher than traditional CI plans but provides more comprehensive protection.",r:"HI 8th Ed, Ch 6, Section 5A — Severity-Based CI (Early Pay CI), pp.113–114"},
{id:30,ch:6,cn:"Critical Illness Insurance",t:"Additional Benefit CI claim → basic policy:",o:["Terminated","Continues, pays death/TPD","SA reduced","All riders terminated"],a:1,e:"Under Additional Benefit CI (as a rider), payment of the CI claim does NOT affect the basic policy, which continues in force. The CI rider pays an amount in addition to (not instead of) the basic sum assured. For example, with a S$100,000 Whole Life policy and S$200,000 Additional Benefit CI rider, a CI claim pays S$200,000 and the S$100,000 death/TPD benefit remains payable later. This contrasts with Acceleration CI where the CI benefit is a pre-payment.",r:"HI 8th Ed, Ch 6, Section 4C2 — Additional Benefit CI, pp.110–112"},
{id:81,ch:6,cn:"Critical Illness Insurance",t:"CI also known as:",o:["Income Protection","Dread Disease Insurance","Catastrophic Coverage","Severe Illness Insurance"],a:1,e:"Critical Illness Insurance is also known as Dread Disease Insurance. It provides a lump sum benefit when the insured is diagnosed with a covered critical illness or undergoes a covered surgical procedure. Each illness/surgery is precisely defined in the policy. Benefits can be used for any purpose including treatment costs, recuperation, medical aids, income replacement or lifestyle changes.",r:"HI 8th Ed, Ch 6, Section 1 — Introduction, p.100"},
{id:82,ch:6,cn:"Critical Illness Insurance",t:"NOT a traditional primary CI condition:",o:["Cancer","Stroke","Kidney failure","Heart attack"],a:2,e:"The 4 primary traditional CI conditions are: (1) Major Cancer, (2) Stroke with Permanent Neurological Deficit, (3) Heart Attack of Specified Severity, and (4) Coronary Artery Bypass Surgery (CABG). Kidney failure (End Stage Kidney Failure) is on the LIA's 37-condition list but is not one of the 4 primary traditional conditions. These 4 account for the majority of CI claims in the industry.",r:"HI 8th Ed, Ch 6, Section 2 — What is CI Insurance?, p.101"},
{id:83,ch:6,cn:"Critical Illness Insurance",t:"LIA requires standardised definitions for:",o:["Early stage","Intermediate","Severe stage only","All stages"],a:2,e:"The LIA standardises definitions for the severe stage only of the 37 listed critical illnesses. For early and intermediate stages, insurers may use their own definitions. For medical conditions not on the LIA list, insurers may define all stages independently. This approach balances consumer protection (consistent severe-stage definitions) with product innovation (flexibility for early/intermediate stages).",r:"HI 8th Ed, Ch 6, Section 3 — LIA CI Framework 2024, pp.103–104"},
{id:84,ch:6,cn:"Critical Illness Insurance",t:"Acceleration CI sum assured:",o:["Can exceed basic","Cannot exceed basic","Always double","Unrelated to basic"],a:1,e:"Under an Acceleration Benefit CI rider, the CI sum assured cannot exceed the basic policy sum assured because it is a pre-payment (acceleration) of the death benefit, not an additional amount. For example, a 50% acceleration on a S$200,000 policy pays S$100,000 for CI and leaves S$100,000 for death/TPD. In contrast, an Additional Benefit CI rider's sum assured can be up to several times the basic sum assured.",r:"HI 8th Ed, Ch 6, Section 4C — Types of CI Covers, pp.108–112"},
{id:85,ch:6,cn:"Critical Illness Insurance",t:"CI can be all EXCEPT:",o:["Rider to Whole Life","Rider to ILP","Stand-alone","Rider to Travel Insurance"],a:3,e:"CI Insurance can be a stand-alone policy or attached as a rider to an ILP, Term, Endowment or Whole Life Insurance policy. It cannot be attached as a rider to Travel Insurance or Personal Accident Insurance. The CI Framework 2024 scope covers CI benefits issued as standalone or rider, individual or group basis, and even as a rider to Hospital & Surgical or PA policies, but standard Travel Insurance does not carry CI riders.",r:"HI 8th Ed, Ch 6, Section 4B — Features of CI Insurance, p.108"},
{id:86,ch:6,cn:"Critical Illness Insurance",t:"CI claim notice usually within:",o:["180 days","60 days","No limit","30 days"],a:1,e:"Written notice of a CI claim must typically be submitted within 60 days of the diagnosis of a critical illness or the performance of a covered surgery. All proofs of the critical illness and the completed claim form must also be submitted within a specified period (usually 60 days). Required documents include the claimant's statement, attending physician's report and proof of illness (e.g. biopsy, histology, imaging reports).",r:"HI 8th Ed, Ch 6, Section 10 — Claims, p.119"},
{id:87,ch:6,cn:"Critical Illness Insurance",t:"Multiple Pay CI allows:",o:["One claim only","Multiple claims, different conditions","Same illness only","Unlimited"],a:1,e:"A Multiple Pay CI plan pays the insured multiple times for different critical illness diagnoses, and may also cover relapse or recurrence of certain conditions. Traditional CI plans allow only one claim. Multiple Pay plans typically have caps per severity level and the progressive lump sum payments amount to a total that can be multiples of the original coverage. This is distinct from severity-based CI which pays at different stages of the same illness.",r:"HI 8th Ed, Ch 6, Section 5B — Multiple Pay CI Insurance Plan, p.114"},
{id:88,ch:6,cn:"Critical Illness Insurance",t:"Survival period means:",o:["Max policy age","Time to survive post-diagnosis before benefit","Waiting before policy starts","Premium grace period"],a:1,e:"The survival period is the period of time starting from the date of diagnosis of a critical illness during which the insured must survive before the CI benefit becomes payable. Do not confuse this with the waiting period, which is the time after policy inception before CI cover begins. The survival period is applicable only to the Additional Benefit type of CI cover. Both serve different purposes in the CI policy structure.",r:"HI 8th Ed, Ch 6, Section 4A(g) — Survival Period Requirement, p.107"},
{id:89,ch:6,cn:"Critical Illness Insurance",t:"LIA recommended min CI coverage:",o:["2yr income","4+ yr income after debts","10× monthly salary","Total lifetime expenses"],a:1,e:"When determining CI coverage adequacy, the key factors are: (1) minimum 4 years of income after taking into account debts, (2) recovery expenses such as nursing care and domestic help, and (3) providing for dependents, especially young children. The coverage should support the insured's standard of living during recovery when they cannot work. CI complements hospital and surgical insurance by covering costs excluded from H&S policies.",r:"HI 8th Ed, Ch 6, Section 7 — Factors for CI Coverage Adequacy, pp.116–117"},
{id:90,ch:6,cn:"Critical Illness Insurance",t:"Common CI exclusion:",o:["Cancer after waiting","Stroke meeting definition","AIDS/HIV","Heart attack meeting definition"],a:2,e:"Common CI exclusions include: (1) pre-existing illnesses, (2) self-inflicted injury, (3) drug/alcohol misuse, (4) congenital anomalies, (5) AIDS/HIV infection, (6) injuries from non-commercial aircraft travel, and (7) war/nuclear/riot risks. AIDS/HIV is a standard exclusion across CI policies. Conditions that meet the policy definition after the waiting period (like cancer, stroke or heart attack) would be covered, not excluded.",r:"HI 8th Ed, Ch 6, Section 8 — Exclusions, p.118"},
{id:31,ch:7,cn:"Other Types of Health Insurance",t:"Hospital Cash pays:",o:["Actual expenses","Fixed daily cash amount","% of bill","Only uncovered expenses"],a:1,e:"Hospital Cash (also known as Hospital Income) Insurance pays a fixed daily cash benefit (e.g. S$200/day) if the insured is hospitalised due to injury or illness. This benefit is independent of actual hospitalisation costs — it is not a reimbursement. Payment is limited to a specified number of days per hospitalisation (e.g. 180 days) and a lifetime limit (e.g. 1,000 days). The benefit is paid in addition to all other health insurance.",r:"HI 8th Ed, Ch 7, Section 2 — Hospital Cash (Income) Insurance, p.134"},
{id:32,ch:7,cn:"Other Types of Health Insurance",t:"Hospital Cash payouts:",o:["Reduced by other insurance","NOT affected by other insurance","Paid after others","Capped at actual"],a:1,e:"A key feature of Hospital Cash Insurance is that benefits are NOT affected by payments from other health insurance policies, plans or schemes (including MediShield Life, Integrated Shield Plans and Group H&S Insurance). It is paid on top of all other medical insurance benefits. This contrasts with Medical Expense Insurance which has a coordination of benefits clause to prevent total claims exceeding actual expenses.",r:"HI 8th Ed, Ch 7, Section 2B — Features of Hospital Cash Insurance, p.136"},
{id:33,ch:7,cn:"Other Types of Health Insurance",t:"Maternity Insurance valid for:",o:["1yr","2yr","3yr","5yr"],a:2,e:"Maternity Insurance is typically a short-term policy valid for approximately 3 years. It must be purchased before pregnancy or during the early stages. Benefits cover both the mother (pregnancy complications, delivery) and the newborn (congenital illnesses, death benefit, hospitalisation income). It may also offer the option to purchase a life plan for the newborn within 90 days of birth without medical underwriting.",r:"HI 8th Ed, Ch 7, Section 3 — Maternity Insurance, pp.138–140"},
{id:34,ch:7,cn:"Other Types of Health Insurance",t:"Maternity coverage starts from:",o:["Conception","8th week","13th week","20th week"],a:2,e:"Maternity Insurance coverage typically commences from the 13th week of pregnancy, which marks the beginning of the second trimester when the risk of miscarriage drops significantly. The policy must be purchased before this point. Benefits for the mother cover pregnancy complications and delivery, while newborn benefits include medical expenses for congenital illnesses, death benefit and hospitalisation income.",r:"HI 8th Ed, Ch 7, Section 3B — Features of Maternity Insurance, p.139"},
{id:35,ch:7,cn:"Other Types of Health Insurance",t:"Group Dental benefits based on:",o:["Actual expenses","Schedule of Allowances","% of bill","Annual lump sum"],a:1,e:"Group Dental Care Insurance benefits are paid based on a Schedule of Allowances, which lists the maximum benefit for each type of dental treatment. This means the insurer pays up to the scheduled amount, not the actual cost. The employer has flexibility in designing the benefit levels and types of treatment covered. Common exclusions include cosmetic dentistry and orthodontics. A limitation clause prevents claims from exceeding a yearly maximum.",r:"HI 8th Ed, Ch 7, Section 5 — Group Dental Care Insurance, pp.143–145"},
{id:36,ch:8,cn:"Managed Healthcare",t:"Capitation: provider receives:",o:["Fee per service","Fixed per member per month","Salary + bonus","Discounted fees"],a:1,e:"Under capitation, the MHCO pre-pays its providers a fixed amount for each member's medical care, usually on a monthly basis. The provider receives the same amount each month regardless of how often the member seeks treatment or the cost of that treatment. The fixed fee may not be the same for all MHCO members.",r:"HI 8th Ed, Ch 8, Section 3B — Cost (Capitation), p.153"},
{id:37,ch:8,cn:"Managed Healthcare",t:"Highest cost control, lowest choice:",o:["PPO","POS","HMO","Traditional MEI"],a:2,e:"The HMO has the greatest cost control but its members have the lowest degree of choice of providers. The ranking from highest choice/lowest control to lowest choice/highest control is: Traditional MEI > PPO > POS > HMO. The cost saved under HMO is passed on to purchasers as lower premiums.",r:"HI 8th Ed, Ch 8, Section 5 — Choice of Providers vs Cost Control, p.156"},
{id:38,ch:8,cn:"Managed Healthcare",t:"Pays % of normal fees:",o:["Capitation","Discounted-fee-for-service","Salary","Fee schedule"],a:1,e:"Under discounted-fee-for-service, the MHCO pays its physicians a certain percentage of their normal fees (e.g. 90%), thereby achieving a discount. This differs from capitation (fixed per member), salary (fixed pay), and fee schedule (caps on dollar amounts per procedure).",r:"HI 8th Ed, Ch 8, Section 3B — Cost (Discounted-Fee-For-Service), p.153"},
{id:39,ch:8,cn:"Managed Healthcare",t:"MHC in Singapore:",o:["Dominant","Not common","Required","CPF-regulated"],a:1,e:"MHC arrangements are not common in Singapore. Employers here either engage an MHCO or an insurance company to offer cashless medical services (e.g. GP and specialist consultations) to employees. If the arrangement is under an insured scheme, the insurer may also provide hospitalisation cover with a letter of guarantee.",r:"HI 8th Ed, Ch 8, Section 7 — MHC Model in Singapore, p.158"},
{id:40,ch:8,cn:"Managed Healthcare",t:"Traditional MEI offers:",o:["Highest control","Lowest everything","Highest choice, lowest control","Moderate both"],a:2,e:"Traditional Medical Expense Insurance offers the highest choice of providers but the lowest cost control. There is no restriction on which doctors or hospitals the insured can visit, but premiums are higher because there is no managed network negotiating fees. No MHC plan can offer high benefits, unlimited access, and low cost all at once.",r:"HI 8th Ed, Ch 8, Section 5 — Choice of Providers vs Cost Control, p.156"},
{id:41,ch:9,cn:"Healthcare Financing",t:"Singapore financing layers:",o:["2","3","4","5"],a:2,e:"Singapore's healthcare financing system has four main layers: (1) Government subsidies for public healthcare, (2) Insurance schemes like MediShield Life and IPs, (3) MediSave — compulsory healthcare savings under CPF, and (4) MediFund — a safety net endowment fund for needy Singaporeans. This mixed financing approach keeps national health expenditure at about 4.4% of GDP.",r:"HI 8th Ed, Ch 9 Part I, Section 1 — Introduction, p.161"},
{id:42,ch:9,cn:"Healthcare Financing",t:"MediFund is:",o:["Compulsory savings","National insurance","Endowment fund for needy","LTC scheme"],a:2,e:"MediFund is an endowment fund set up by the Government as a safety net for needy Singaporeans who face difficulties paying remaining healthcare bills after Government subsidies, insurance, and MediSave. Interest income generated from the capital sum is allocated to MediFund-approved institutions. MediFund Silver and MediFund Junior provide targeted assistance for the elderly and children respectively.",r:"HI 8th Ed, Ch 9 Part II, Section 9E — MediFund, p.211"},
{id:43,ch:9,cn:"Healthcare Financing",t:"MediShield Life covers:",o:["Only SC","Only employed","All SC and SPR auto","Only aged 40+"],a:2,e:"MediShield Life automatically covers all Singapore Citizens and Permanent Residents for life, regardless of age or health conditions. There is no need to apply. New SCs are covered from birth or the day they attain citizenship, while PRs are covered from the day they attain permanent residency. This universal coverage has been in effect since 1 November 2015.",r:"HI 8th Ed, Ch 9 Part I, Section 3 — MediShield Life, p.164"},
{id:44,ch:9,cn:"Healthcare Financing",t:"Serious pre-existing under MediShield Life:",o:["10% for 5yr","20% for 5yr","30% for 10yr","50% for 10yr"],a:2,e:"Those with serious pre-existing medical conditions (listed on the MOH website) are required to pay an Additional Premium of 30% for the first 10 years of coverage, on top of the standard MediShield Life premiums. After 10 years, the additional premium ceases. The Government provides subsidies and support to help those who need to pay these Additional Premiums.",r:"HI 8th Ed, Ch 9 Part I, Section 3A — MediShield Life Premiums, p.164"},
{id:45,ch:9,cn:"Healthcare Financing",t:"AWL for ANB 41–70:",o:["S$300","S$600","S$900","S$1,200"],a:1,e:"The Additional Withdrawal Limit (AWL) for IP premiums is set per insured person per policy year in three tiers: (1) ANB 40 and below: S$300, (2) ANB 41–70: S$600, (3) ANB 71 and above: S$900. The AWL applies only to the additional private insurance component of IP premiums — the MediShield Life component is fully payable by MediSave.",r:"HI 8th Ed, Ch 9 Part I, Section 4C — MediSave Use for IP Premiums, p.173"},
{id:91,ch:9,cn:"Healthcare Financing",t:"MediSave is part of:",o:["POSB","GIC","CPF","MAS"],a:2,e:"MediSave is a mandatory national health savings scheme under the Central Provident Fund (CPF) umbrella. Between 8% and 10.5% of each CPF member's monthly salary (depending on age) is set aside in a personal MediSave Account. Self-employed persons must also make compulsory MediSave contributions based on their Net Trade Income.",r:"HI 8th Ed, Ch 9 Part I, Section 5 — MediSave, p.176"},
{id:92,ch:9,cn:"Healthcare Financing",t:"BHS designed for:",o:["Basic subsidised care in old age","All private hospital expenses","Total lifetime costs","Fixed unchanging amount"],a:0,e:"The Basic Healthcare Sum (BHS) is the maximum amount in a CPF member's MediSave Account, designed to be enough for basic, subsidised healthcare needs in old age. Amounts up to the BHS cannot be withdrawn as cash. The BHS is adjusted yearly in January and is fixed at the prevailing BHS when the member reaches age 65.",r:"HI 8th Ed, Ch 9 Part I, Section 5A — Basic Healthcare Sum, pp.177–178"},
{id:93,ch:9,cn:"Healthcare Financing",t:"MediSave covers all EXCEPT:",o:["Spouse","Children","Parents","Colleagues"],a:3,e:"MediSave can be used for the CPF member's own healthcare expenses and those of approved dependants: spouse, children, parents, siblings, and grandparents. Colleagues are not approved dependants. If paying for a sibling or grandparent, the patient must be a Singapore Citizen or SPR.",r:"HI 8th Ed, Ch 9 Part I, Section 5B — Uses of MediSave, p.178"},
{id:94,ch:9,cn:"Healthcare Financing",t:"Hospitalised before death + authorised MediSave:",o:["Standard limit","Full balance, no limits","First S$10k","To beneficiaries"],a:1,e:"If a patient was hospitalised just before death and had authorised MediSave use, the full MediSave balance is used without being subject to existing withdrawal limits to pay for the last inpatient bill. This is because the need to save for future healthcare needs is no longer relevant following death. If the patient had not authorised, immediate family members can do so on their behalf.",r:"HI 8th Ed, Ch 9 Part I, Section 5C3 — Distribution of MediSave Upon Demise, p.183"},
{id:95,ch:9,cn:"Healthcare Financing",t:"Remaining MediSave on demise:",o:["To government","To CPF nominees / intestacy","Equal to family","To employer"],a:1,e:"After the last medical bill is paid, the remaining MediSave balance is distributed to the nominated beneficiaries of the patient's CPF account (if a nomination was made). If no nomination was made, the balance is distributed by the Public Trustee under intestacy laws for non-Muslims, or Muslim inheritance law for Muslims.",r:"HI 8th Ed, Ch 9 Part I, Section 5C3 — Distribution of MediSave Upon Demise, p.183"},
{id:96,ch:9,cn:"Healthcare Financing",t:"CHAS available to:",o:["Low-income SC only","PG/MG only","All SC regardless of income","SPRs only"],a:2,e:"CHAS (Community Health Assist Scheme) enables eligible Singapore Citizens to receive subsidies for medical and/or dental care at participating GP and dental clinics. Since November 2019, CHAS has been expanded to include all Singapore Citizens regardless of income. The CHAS card colour (Blue, Orange, or Green) indicates the subsidy tier.",r:"HI 8th Ed, Ch 9 Part I, Section 2B1 — CHAS, p.163"},
{id:97,ch:9,cn:"Healthcare Financing",t:"MediShield Life designed for:",o:["Class A/private","B1 only","B2 and C","All equally"],a:2,e:"MediShield Life claim limits are designed to cover 9 in 10 subsidised bills incurred for hospitalisation in Class B2/C wards, day surgeries, and selected costly outpatient treatments in public hospitals. This is to keep premiums affordable. Those wanting additional coverage for Class A/B1 wards or private hospitals should consider purchasing an Integrated Shield Plan.",r:"HI 8th Ed, Ch 9 Part I, Section 3 — MediShield Life, p.164"},
{id:98,ch:9,cn:"Healthcare Financing",t:"IP consists of:",o:["Private only","MediShield Life only","MediShield Life + private","MediSave + MSL + private"],a:2,e:"Integrated Shield Plans (IPs) are made up of two parts: (1) the MediShield Life component administered by the CPF Board, and (2) an additional private insurance coverage component administered by approved private insurers. Since MediShield Life replaced the MediShield component of IPs on 1 November 2015, IP holders are already covered by MediShield Life with no duplication.",r:"HI 8th Ed, Ch 9 Part I, Section 4 — Integrated Shield Plans, p.169"},
{id:99,ch:9,cn:"Healthcare Financing",t:"Standard IP:",o:["Full coverage","No-frills, B1 ward","Most expensive","Emergency only"],a:1,e:"The Standard IP is a 'no frills' product targeted at covering large Class B1 ward hospital bills and selected outpatient treatments. All IP insurers are required to sell it since 1 May 2016. Benefits are regulated by MOH and identical across all insurers, though premiums vary. It is an affordable option for those who want coverage beyond MediShield Life.",r:"HI 8th Ed, Ch 9 Part I, Section 4B — Standard IP, p.173"},
{id:100,ch:9,cn:"Healthcare Financing",t:"Switching IP to different insurer:",o:["Both run","Auto-terminated; 30 days to return","12-month wait","MSL also terminates"],a:1,e:"When switching IP to a new insurer, the original IP is automatically terminated. The policyholder undergoes underwriting again with the new insurer, so may lose coverage for existing conditions. However, there is an option to return to the previous insurer within 30 days from the termination notification, with no re-underwriting required.",r:"HI 8th Ed, Ch 9 Part I, Section 4E — Terminating or Switching IP, pp.175–176"},
{id:101,ch:9,cn:"Healthcare Financing",t:"Downgrade within same IP insurer:",o:["Additional UW required","Anytime, no additional UW","Wait for renewal","Loses MSL"],a:1,e:"An IP policyholder can switch to a lower coverage plan within the same insurer at any point in time, without additional underwriting. He can also terminate his IP entirely and still be covered by MediShield Life regardless of pre-existing conditions. Upgrading, however, requires satisfactory evidence of insurability.",r:"HI 8th Ed, Ch 9 Part I, Section 4E — Terminating or Switching IP, p.175"},
{id:102,ch:9,cn:"Healthcare Financing",t:"Pre-authorisation allows:",o:["Auto-approve future claims","Assess necessity/cost before treatment","Bypass co-payment","Charge any amount"],a:1,e:"Pre-authorisation is a service where the IP insurer gives prior approval to hospitalisation and/or medical treatment and costs before the actual surgery or admission. Benefits include: (1) insurers can assess medical necessity and cost, (2) patients get peace of mind that their procedure is covered, and (3) healthcare providers have better clarity on covered procedures.",r:"HI 8th Ed, Ch 9 Part I, Section 4G — Pre-Authorisation for IP, pp.176–177"},
{id:103,ch:9,cn:"Healthcare Financing",t:"Letter of Guarantee (LOG):",o:["Guarantees full payment","Waives upfront cash, NOT guaranteed payment","Replaces MSL","Emergency only"],a:1,e:"A Letter of Guarantee (LOG) is a service provided by IP insurers that waives the upfront cash deposit required by the medical institution, up to the eligible LOG amount. Critically, a LOG does NOT mean the insurer will pay the specified amount — it only waives the upfront cash requirement. For assured coverage, policyholders should apply for pre-authorisation instead.",r:"HI 8th Ed, Ch 9 Part I, Section 6A — Letter of Guarantee, p.184"},
{id:104,ch:9,cn:"Healthcare Financing",t:"ElderShield launched:",o:["Sep 1997","Sep 2002","Oct 2015","Oct 2020"],a:1,e:"ElderShield was launched in September 2002 as a long-term care insurance scheme providing basic financial protection for those needing long-term care, especially during old age. ElderShield300 was first launched on 30 September 2002, and ElderShield400 was introduced in 2007 with improved coverage. ElderShield became a closed scheme from 1 August 2021.",r:"HI 8th Ed, Ch 9 Part II, Section 7 — ElderShield, p.197"},
{id:105,ch:9,cn:"Healthcare Financing",t:"ElderShield admin → Government:",o:["Nov 2015","Nov 2019","Nov 2021","Nov 2023"],a:2,e:"The Government took over ElderShield administration from private insurers (Singlife, Great Eastern, Income Insurance) on 1 November 2021. This allows policyholders to upgrade to CareShield Life more smoothly and benefit from improvements to the claims assessment process. The Government administers the scheme on a not-for-profit basis.",r:"HI 8th Ed, Ch 9 Part II, Section 7H — Government Administration of ElderShield, p.201"},
{id:106,ch:9,cn:"Healthcare Financing",t:"Pioneer Generation born ≤:",o:["31 Dec 1939","31 Dec 1949","31 Dec 1959","31 Dec 1969"],a:1,e:"Pioneer Generation refers to living Singaporeans who were (1) aged 16 and above in 1965, meaning born on or before 31 December 1949, and (2) obtained citizenship on or before 31 December 1986. They receive lifetime benefits including outpatient care subsidies, MediShield Life subsidies, and annual MediSave top-ups of S$250–S$900.",r:"HI 8th Ed, Ch 9 Part II, Section 9A — Pioneer Generation Package, p.207"},
{id:107,ch:9,cn:"Healthcare Financing",t:"Merdeka Generation born:",o:["1940–1949","1950–1959","1960–1969","1970–1979"],a:1,e:"Merdeka Generation refers to living Singaporeans born from 1 January 1950 to 31 December 1959 who obtained citizenship on or before 31 December 1996. The MGP is also extended to those born on or before 31 Dec 1949 with citizenship by 31 Dec 1996 who did not receive the Pioneer Generation Package. Benefits include MediSave top-ups and MediShield Life subsidies.",r:"HI 8th Ed, Ch 9 Part II, Section 9B — Merdeka Generation Package, p.208"},
{id:108,ch:9,cn:"Healthcare Financing",t:"IDAPE S$250/mo when income:",o:["≤S$1k","≤S$2k","≤S$2.8k","≤S$5k"],a:1,e:"IDAPE payouts are based on per capita household income: (1) S$0–S$2,000: S$250/month for up to 72 months, (2) S$2,001–S$2,800: S$150/month for up to 72 months. An applicant with no household income qualifies for S$250 if the annual value of residence is S$13,000 or below. IDAPE beneficiaries pay no premiums.",r:"HI 8th Ed, Ch 9 Part II, Section 9D — IDAPE, p.210"},
{id:109,ch:9,cn:"Healthcare Financing",t:"MediSave Care max withdrawal/mo:",o:["S$100","S$200","S$300","S$500"],a:1,e:"Under MediSave Care, Singapore Residents aged 30 and above with severe disability can withdraw up to S$200 per month in cash from their own or spouse's MediSave for long-term care needs. The withdrawal quantum depends on the MediSave balance: S$20,000+ = S$200/month, S$15,000+ = S$150, S$10,000+ = S$100, S$5,000+ = S$50, below S$5,000 = nil.",r:"HI 8th Ed, Ch 9 Part I, Section 5B3(c) — MediSave Care, p.181"},
{id:110,ch:9,cn:"Healthcare Financing",t:"AWL for ANB ≤40:",o:["S$300","S$600","S$900","S$1,200"],a:0,e:"The Additional Withdrawal Limit (AWL) for ANB 40 and below is S$300 per insured person per policy year. The three AWL tiers are: ANB ≤40 = S$300, ANB 41–70 = S$600, ANB 71+ = S$900. AWL applies to the additional private insurance component of IP premiums only; the MediShield Life component is fully payable by MediSave without limit.",r:"HI 8th Ed, Ch 9 Part I, Section 4C — MediSave Use for IP Premiums, p.173"},
{id:46,ch:10,cn:"Common Policy Provisions",t:"Entire contract clause:",o:["Amend verbally","Contract + attachments = entire","Proposal excluded","External docs override"],a:1,e:"The entire contract clause states that the insurance contract consists of the proposal form, declarations, questionnaires, the policy contract, policy certificate, schedule of benefits, riders, and any endorsements or subsequent endorsements. No verbal amendments or external documents can override this written contract. Benefits start on the policy start date upon receiving the first premium.",r:"HI 8th Ed, Ch 10, Section 5A — Entire Contract Clause, p.221"},
{id:47,ch:10,cn:"Common Policy Provisions",t:"Pre-existing condition:",o:["Diagnosed after policy","Treatment/symptoms BEFORE policy","Hospitalised 30d before","Referred after"],a:1,e:"A pre-existing condition is one that existed before the policy issue date or reinstatement date, for which the insured: (1) received treatment or medical advice, (2) showed symptoms, (3) was aware of, or (4) would have led a reasonable person to seek medical advice. It is not limited to formal diagnoses — even symptoms count.",r:"HI 8th Ed, Ch 10, Section 4B — Definitions (Pre-existing Condition), p.218"},
{id:48,ch:10,cn:"Common Policy Provisions",t:"Guaranteed renewable:",o:["Cancel anytime","Cannot cancel while premiums paid","Must reduce premiums","Cannot increase ever"],a:1,e:"A guaranteed renewable policy means the insurer cannot cancel or refuse renewal as long as the policy owner pays premiums. However, the insurer MAY increase premiums on a class basis (e.g. by occupational group or sub-plan). Renewal is guaranteed until a specified age (e.g. 60, 65, 70, or 75). Non-payment of premium is the only ground for cancellation.",r:"HI 8th Ed, Ch 10, Section 5H3 — Guaranteed Renewable Policy, p.224"},
{id:49,ch:10,cn:"Common Policy Provisions",t:"Trust/Irrevocable Nomination:",o:["Freely change","Loses ownership, ALL consent to revoke","Expires 5yr","One nominee only"],a:1,e:"Under a Trust or Irrevocable Nomination (Section 132 of the Insurance Act), the insured loses all rights to ownership of the policy. To revoke this trust nomination, the insured needs the written consent of ALL nominees. In contrast, a Revocable Nomination (Section 133) lets the insured retain ownership and freely change nominees without their consent.",r:"HI 8th Ed, Ch 10, Section 5S — Nomination of Beneficiaries, p.227"},
{id:50,ch:10,cn:"Common Policy Provisions",t:"DII waiting period also called:",o:["Free-look","Grace period","Elimination period","Cooling-off"],a:2,e:"In Disability Income Insurance, the waiting period is sometimes called the 'elimination period' or 'probationary period.' It is a specified period beginning with the onset of disability during which benefits are not payable. For LTC Insurance, this may also be known as the 'deferred period.' For MEI, it is the period from policy issue during which illness-related expenses are not covered (accidents are covered from day one).",r:"HI 8th Ed, Ch 10, Section 4B — Definitions (Waiting Period), p.219"},
{id:51,ch:11,cn:"Health Insurance Pricing",t:"Key pricing factor:",o:["Marital status","Morbidity rate","Education","Nationality"],a:1,e:"Morbidity rate is the primary consideration in health insurance pricing. It measures the rate at which disease or illness occurs within a group of people over time. On average, women have a higher morbidity rate than men, which is why women pay higher premiums for most Health Insurance policies. Marital status, education, and nationality are not key pricing factors.",r:"HI 8th Ed, Ch 11, Section 2A — Morbidity Rate, p.237"},
{id:52,ch:11,cn:"Health Insurance Pricing",t:"Medical inflation:",o:["Premium decrease","Upward trend in claim costs","Hospital construction rate","Insured increase"],a:1,e:"Medical inflation refers to the consistent upward trend in medical care claim costs experienced by both individual and group plans. Rising claims are driven by increases in medical care charges, medical advancement, and higher utilisation of services, especially with Singapore's growing ageing population. Insurers factor this in to ensure premiums are adequate to cover rising costs.",r:"HI 8th Ed, Ch 11, Section 2D — Medical Inflation, p.238"},
{id:53,ch:11,cn:"Health Insurance Pricing",t:"Wider benefits →:",o:["Lower premiums","No change","Higher premiums","Less coverage"],a:2,e:"Premiums are higher for plans with richer and higher benefit limits, smaller deductibles, and smaller co-insurance. Adding each benefit type actually increases the final premium. For example, IPs covering private hospital treatments are more expensive than those covering only public hospital treatments. Scope of benefits is one of the nine key factors in premium computation.",r:"HI 8th Ed, Ch 11, Section 2F — Scope of Benefits Covered, p.238"},
{id:54,ch:11,cn:"Health Insurance Pricing",t:"NOT a premium parameter:",o:["Age","Gender","Marital status","Health status"],a:2,e:"The parameters for premium rating are: Age, Gender, Health Status, Lifestyle, Occupation, Persistency, Portfolio Claims Experience, Claims-based pricing, and Group Participation Level. Marital status is NOT a recognised parameter. Age is a key parameter across all plans, while gender differences apply to some products (e.g. LTC, CI) but not all (e.g. MediShield Life, IPs).",r:"HI 8th Ed, Ch 11, Section 3 — Parameters for Premium Rating, pp.239–241"},
{id:55,ch:11,cn:"Health Insurance Pricing",t:"Morbidity rate:",o:["Death rate","Disease rate in a group","Claims rejected %","Lapse rate"],a:1,e:"Morbidity is the rate at which disease or illness occurs within a group of people over a period of time. It is distinct from mortality (death rate). Morbidity rate is the primary consideration in health insurance pricing. Women generally have higher morbidity rates than men, resulting in higher premiums for most Health Insurance products.",r:"HI 8th Ed, Ch 11, Section 2A — Morbidity Rate, p.237"},
{id:56,ch:12,cn:"Health Insurance Underwriting",t:"Moratorium Underwriting:",o:["Covered day one","Excluded initially; no questions","Premium loading","Covered after exam"],a:1,e:"Under moratorium underwriting (also called point-of-claim underwriting), the life insured does not need to fill in a health declaration or undergo a medical examination. Instead, any pre-existing conditions are excluded during a waiting period (typically 2–5 years). If the insured has no symptoms, treatment, medication or advice for those conditions during the waiting period, coverage begins automatically once it ends.",r:"HI 8th Ed, Ch 12, Section 3D2 — Moratorium Underwriting, pp.249–250"},
{id:57,ch:12,cn:"Health Insurance Underwriting",t:"CI-specific UW factor:",o:["Earnings stability","Cognitive impairment","Smoking & family history","Utilisation rate"],a:2,e:"For Critical Illness Insurance underwriting, smoking habit and family history are the specifically important factors, in addition to medical history and current physical conditions. Smoking increases the incidence of cardiovascular, cerebrovascular diseases and cancer. Certain diseases like diabetes mellitus, breast cancer and colon cancer have high prevalence among family members.",r:"HI 8th Ed, Ch 12, Section 3C4 — Critical Illness Insurance, pp.248–249"},
{id:58,ch:12,cn:"Health Insurance Underwriting",t:"Risk commences when:",o:["Proposal submitted","Exam completed","Agrees terms + pays premium","Policy delivered"],a:2,e:"For sub-standard risks, the insurer communicates the terms of acceptance to the proposer before issuing the policy. The cover is effected when the proposer agrees to the terms as stated in the letter of acceptance and pays the premium. For standard risks, the policy is issued upon premium payment. The risk does not commence merely upon proposal submission or medical examination.",r:"HI 8th Ed, Ch 12, Section 7 — Commencement of Risk, p.260"},
{id:59,ch:12,cn:"Health Insurance Underwriting",t:"Sub-standard risk: all EXCEPT:",o:["Exclusions","Premium loading","Automatic upgrade","Postponement"],a:2,e:"Sub-standard risks are people with medical or non-medical impairments that make them higher risks. The insurer deals with sub-standard risks through: (1) modifications of cover — including specific exclusions, extra premiums, or modification of benefits offered; (2) postponement — deferring the decision to a later date; or (3) decline. An automatic upgrade is not a recognised underwriting action for sub-standard risks.",r:"HI 8th Ed, Ch 12, Section 6B — Sub-standard Risks, pp.258–259"},
{id:60,ch:12,cn:"Health Insurance Underwriting",t:"GIO means:",o:["Full medical UW","Guaranteed, no questions","Healthy only","Simplified questionnaire"],a:1,e:"Guaranteed Issuance Offer (GIO) requires no medical questions and no medical examination. The insurer guarantees to issue the policy so long as the applicant is eligible (usually an age requirement, e.g. below age 60). To minimise anti-selection risk, GIO policies have smaller coverage with pre-existing conditions permanently excluded. GIO is commonly used for Hospital Income Plans or Single Critical Illness Plans sold via direct or online channels.",r:"HI 8th Ed, Ch 12, Section 3D4 — Guaranteed Issuance Offer (GIO), p.251"},
{id:111,ch:12,cn:"Health Insurance Underwriting",t:"Primary UW purpose:",o:["Max sales","Assess risk & terms","Lowest premiums","Eliminate claims"],a:1,e:"Underwriting is the process whereby an insurer assesses the risk and determines whether or not to accept an application and, if so, on what terms. It ensures that premiums charged correspond closely with the risk each proposer represents. While life insurance underwriting focuses on mortality (death), health insurance underwriting focuses on morbidity (rate of disease or illness within a group).",r:"HI 8th Ed, Ch 12, Section 2 — What Is Underwriting?, p.245"},
{id:112,ch:12,cn:"Health Insurance Underwriting",t:"DII-specific UW factor:",o:["Smoking/family","Earnings size/stability","Cognitive impairment","Utilisation"],a:1,e:"For Disability Income Insurance, the size and stability of the life insured's earnings and his overall financial situation are the specifically important underwriting factors. The underwriter must ensure the benefit amount is reasonable and not higher than 75% of current income. A high net worth is also significant, as assets can be shifted to income-generating investments during disability, reducing incentive to return to work.",r:"HI 8th Ed, Ch 12, Section 3C2 — Disability Income Insurance, p.248"},
