{id:113,ch:12,cn:"Health Insurance Underwriting",t:"LTC-specific UW factor:",o:["Earnings","Smoking","Cognitive impairment & morbidity","Claims pricing"],a:2,e:"The two key factors for underwriting Long-Term Care Insurance are: (1) detection of any early cognitive impairment, which can prolong LTC claims (some insurers require cognitive assessment during underwriting); and (2) morbidity risk — the chance of a person suffering physical disability affecting their ability to perform activities of daily living. Conditions like musculoskeletal problems, while not significant for mortality risk, are critical for LTC risk.",r:"HI 8th Ed, Ch 12, Section 3C3 — Long-Term Care Insurance, p.248"},
{id:114,ch:12,cn:"Health Insurance Underwriting",t:"SIO involves:",o:["No questions","Simplified questionnaire","Full exam","Auto-decline"],a:1,e:"In a Simplified Issuance Offer (SIO), the life insured is asked only a few questions, and the answers determine whether the application is approved. No medical examination is required. SIO is more common for policies marketed via direct or online channels. The trade-off is that premiums are higher than full medical underwriting due to the greater risk the insurer assumes.",r:"HI 8th Ed, Ch 12, Section 3D3 — Simplified Issuance Offer (SIO), p.251"},
{id:115,ch:12,cn:"Health Insurance Underwriting",t:"NON-medical UW factor:",o:["Physical condition","Medical history","Occupation & lifestyle","APS"],a:2,e:"Non-medical underwriting factors include: (1) financial factor — income, assets and debts to gauge over-insurance risk and ability to pay premiums; (2) occupational factor — certain jobs carry higher accident or health hazards; (3) age factor — medical problems increase with age; (4) residency factor — travel to war zones or politically unstable regions; and (5) avocation and lifestyle risks such as hazardous sports and habits like smoking or drug use.",r:"HI 8th Ed, Ch 12, Section 3B — Non-medical Factors, pp.246–248"},
{id:116,ch:12,cn:"Health Insurance Underwriting",t:"NOT a UW info source:",o:["Proposal form","Agent statement","Social media","APS"],a:2,e:"The five recognised sources of underwriting information are: (1) Proposal Form — the primary source containing basic information; (2) Agent's Statement — confidential remarks by agents on information not in the proposal; (3) Medical Examinations/Tests — including ECG, blood profile, HIV test, cognitive assessment; (4) Attending Physician's Statement (APS); and (5) Supplementary Questionnaires. Social media is not a listed source.",r:"HI 8th Ed, Ch 12, Section 4 — Sources of Underwriting Information, pp.254–257"},
{id:117,ch:12,cn:"Health Insurance Underwriting",t:"Key group UW factor:",o:["Individual histories","Business nature & stability","Family histories","Individual financials"],a:1,e:"Group insurance is underwritten as a whole before considering individual members. Key group underwriting factors include: reason for existence, group stability, group size, the company's nature of business and financial strength, employee classes, level of participation, age and gender composition, expected persistency, past claims experience, medical inflation, and medical utilisation rate and trend.",r:"HI 8th Ed, Ch 12, Section 3E — Group Underwriting, pp.251–254"},
{id:118,ch:12,cn:"Health Insurance Underwriting",t:"Standard risk accepted at:",o:["Higher premiums","Standard terms, no modifications","Reduced coverage","Postponed"],a:1,e:"When a proposal is accepted as a standard risk, the policy is issued based on the premium rate stated in the rate book or brochure, with no modifications to the coverage. Usually, 80% to 90% of all proposals received by the insurer are accepted at standard rates. The policy is then issued once the premium has been fully paid.",r:"HI 8th Ed, Ch 12, Section 6A — Standard Risks, p.258"},
{id:119,ch:12,cn:"Health Insurance Underwriting",t:"MHC UW additionally considers:",o:["Individual history","Group age/gender","Investment portfolio","Occupation only"],a:1,e:"The key underwriting considerations for Managed Healthcare (MHC) are similar to those for Medical Expense Insurance (medical history and current physical condition). However, when MHC covers are issued to groups, the age and gender composition of the group are strong additional factors. Older groups are associated with higher morbidity, while groups with a large proportion of females of child-bearing age tend to have higher costs due to pregnancy and delivery expenses.",r:"HI 8th Ed, Ch 12, Section 3C5 — Managed Healthcare, p.249"},
{id:120,ch:12,cn:"Health Insurance Underwriting",t:"Postponement means:",o:["Permanently declined","Defers decision pending info","Issued with exclusions","Premium +50%"],a:1,e:"Postponement means the underwriter is not able to offer any terms at that point in time but is prepared to reconsider the case at a later date. This typically occurs when the proposed insured has just undergone or is about to undergo a surgical operation — the underwriter will normally postpone for a specified period (e.g. six months after surgery). It is distinct from decline (permanent rejection) and exclusions (issuing with conditions).",r:"HI 8th Ed, Ch 12, Section 6B2 — Postponement, p.259"},
{id:61,ch:13,cn:"MAS Notice 120",t:'"Shield" allowed only if:',o:["Covers hospitalisation","MediSave-approved","Sold by life insurer","Lifetime guarantee"],a:1,e:"Under Division 1 of MAS Notice 120, no direct insurer shall use the word 'Shield' in the name, description or title of any A&H policy unless that policy is a MediSave-approved policy. MediSave-approved policies include Integrated Shield Plans, non-integrated shield plans, ElderShield policies, ElderShield Supplement policies, CareShield Life Supplement policies, and supplementary disability insurance policies.",r:"HI 8th Ed, Ch 13, Section 3 — Division 1: General Requirements, p.270"},
{id:62,ch:13,cn:"MAS Notice 120",t:"Personal accident policy:",o:["Any illness/injury","Hospitalisation >24h","Accident injury/disability/death only","CI diagnosis"],a:2,e:"Under MAS Notice 120 definitions, a personal accident policy is an A&H policy where benefits are paid out only: (a) in the event of an injury to, or disability of, the insured as a result of accident; (b) on the death by accident of the insured; or (c) a combination of both. This is important because a 'health policy' is defined as an A&H policy that is NOT a personal accident policy — the distinction determines which regulatory requirements apply.",r:"HI 8th Ed, Ch 13, Section 3 — Definitions, p.276"},
{id:63,ch:13,cn:"MAS Notice 120",t:"Client won't provide info:",o:["Refuse sale","Proceed, document, inform client","Escalate to MAS","No documentation"],a:1,e:"Under MAS Notice 120, Division 4 (Needs Analysis), where a policy owner does not want to provide information requested under KYC or does not accept the intermediary's advice, the intermediary may proceed with the request but must: (1) document the policy owner's decision; and (2) inform the policy owner that it is their responsibility to ensure the suitability of the policy selected. The sale is not refused — rather, it proceeds with proper documentation.",r:"HI 8th Ed, Ch 13, Appendix 13A — Paragraph 41, p.287"},
{id:64,ch:13,cn:"MAS Notice 120",t:"Cannot advise switch if:",o:["Higher benefits","Detrimental to insured","Different insurer","Requested by insured"],a:1,e:"An A&H insurance intermediary shall not advise a policy owner to switch from one A&H policy to another in a manner that would be detrimental to the insured. The Authority considers factors including: (a) whether the policy owner suffers any penalty for terminating; (b) whether any transaction cost is incurred without real benefit; (c) whether the replacement confers lower benefits at higher or same cost; and (d) whether the replacement is less suitable.",r:"HI 8th Ed, Ch 13, Appendix 13A — Paragraph 44, p.288"},
{id:65,ch:13,cn:"MAS Notice 120",t:"Required font for disclosures:",o:["Arial 8pt+","Times New Roman 10pt+","Calibri 12pt+","Any 9pt+"],a:1,e:"Under Division 3 of MAS Notice 120 (Additional Disclosure Requirements for Direct Insurers), the required font size for product summaries, statements, conditional offer letters or termination letters with standardised disclosures is Times New Roman 10-point or larger. This applies to any individual Medical Expense Insurance policy as well as any A&H policy that is not a MediSave-approved policy.",r:"HI 8th Ed, Ch 13, Section 3 — Division 3: Additional Disclosure Requirements, p.271"},
{id:121,ch:13,cn:"MAS Notice 120",t:"Health policy defined as:",o:["Life + health","A&H NOT personal accident","Hospitalisation only","MediSave only"],a:1,e:"Under MAS Notice 120, a 'health policy' is specifically defined as an accident and health (A&H) policy that is NOT a personal accident policy. This distinction is important because Division 4 (Requirements on Provision of Advice) applies specifically to health policies, not personal accident policies. The advisory process requirements for KYC, needs analysis, documentation, and switching only apply when recommending health policies.",r:"HI 8th Ed, Ch 13, Appendix 13A — Definitions, p.275"},
{id:122,ch:13,cn:"MAS Notice 120",t:"MediSave-approved includes all EXCEPT:",o:["CareShield Supplement","ElderShield","IP","Stand-alone CI"],a:3,e:"Under MAS Notice 120, 'MediSave-approved policy' means any: Integrated Shield Plan, non-integrated shield plan, ElderShield policy, ElderShield Supplement policy, CareShield Life Supplement policy, or supplementary disability insurance policy. A stand-alone Critical Illness (CI) policy is NOT a MediSave-approved policy. This means CI policies cannot use the word 'Shield' in their name and are subject to different disclosure requirements.",r:"HI 8th Ed, Ch 13, Appendix 13A — Definitions, pp.275–276"},
{id:123,ch:13,cn:"MAS Notice 120",t:"Must disclose all EXCEPT:",o:["Policy nature","Intermediary personal finances","Rights/obligations","Benefits & risks"],a:1,e:"Under Division 1A of MAS Notice 120, when dealing with an individual policy owner, the intermediary must disclose: (a) nature and objective of the policy; (b) details of the insurer; (c) contractual rights and obligations; (d) benefits of the policy; (e) risks of the policy; (f) free-look period provisions; (g) claim/termination procedures; and (h) warnings, exclusions and disclaimers. The intermediary's personal finances are not part of the required disclosures.",r:"HI 8th Ed, Ch 13, Appendix 13A — Paragraph 17, pp.279–280"},
{id:124,ch:13,cn:"MAS Notice 120",t:"Individual KYC assesses all EXCEPT:",o:["Financial situation","Existing policies","Political affiliation","Employment/income"],a:2,e:"For individual KYC under MAS Notice 120, the intermediary must collect: (a) objectives of the policy owner (events for protection, nature of benefits, hospital ward class); (b) employment status; (c) financial situation including assets, liabilities, cash flow and income; (d) source and amount of regular income; (e) financial commitments; (f) existing health policies; (g) medical conditions; and (h) dependant information where relevant. Political affiliation is not a KYC requirement.",r:"HI 8th Ed, Ch 13, Appendix 13A — Paragraph 35, pp.285–286"},
{id:125,ch:13,cn:"MAS Notice 120",t:"Group KYC considers:",o:["Individual histories","Size, composition, claims","Employer financials only","Headcount only"],a:1,e:"For group KYC under MAS Notice 120, the intermediary must collect: (a) objectives of the policy owner, including the financial impact of events, mode of payment, and hospital ward class; (b) size and composition of the group, including breakdown by gender, age, income and occupation; (c) claims history of the group; and (d) any medical conditions that members may have. It goes beyond just headcount or employer financials alone.",r:"HI 8th Ed, Ch 13, Appendix 13A — Paragraph 36, pp.286–287"},
{id:126,ch:13,cn:"MAS Notice 120",t:"No suitable policy found:",o:["Recommend cheapest","Inform client","Sell popular","Ignore & close"],a:1,e:"Under the Needs Analysis requirements of MAS Notice 120 (Paragraph 39), where the A&H insurance intermediary is unable to identify a suitable policy, it shall inform the policy owner accordingly. The intermediary must not recommend the cheapest or most popular product, nor ignore the situation. The obligation is to be transparent about the lack of a suitable product and let the client make an informed decision.",r:"HI 8th Ed, Ch 13, Appendix 13A — Paragraph 39, p.287"},
{id:127,ch:13,cn:"MAS Notice 120",t:"Switch detrimental if — all EXCEPT:",o:["Penalty for terminating","Cost without benefit","Higher benefits, lower premium","Lower benefit, same/higher cost"],a:2,e:"A switch is considered detrimental if: (a) the policy owner suffers a penalty for terminating the original policy; (b) the policy owner incurs transaction costs without gaining any real benefit; (c) the replacement confers a lower level of benefit at a higher or same cost, or the same benefit at a higher cost; or (d) the replacement is less suitable. A switch to higher benefits at a lower premium would NOT be detrimental — it represents a genuine improvement for the insured.",r:"HI 8th Ed, Ch 13, Appendix 13A — Paragraph 44, p.288"},
{id:128,ch:13,cn:"MAS Notice 120",t:"Switching disclosure in writing:",o:["New benefits only","Fees/charges & benefit changes","Reason only","No disclosure needed"],a:1,e:"Under Paragraph 46 of MAS Notice 120, when a policy owner switches from one A&H policy to another, the intermediary must disclose in writing: (a) any fee or charge the policy owner would have to bear; and (b) the changes in level of benefits. This ensures the policy owner can make an informed decision on whether to proceed with the switch. Simply disclosing new benefits or reasons alone is insufficient.",r:"HI 8th Ed, Ch 13, Appendix 13A — Paragraph 46, pp.288–289"},
{id:129,ch:13,cn:"MAS Notice 120",t:"Amendments disclosed at least:",o:["7 days","14 days","30 days","60 days"],a:2,e:"Under Division 3 of MAS Notice 120 (Paragraph 29), where an A&H policy allows the insurer to vary, amend, or add to the terms of the contract, the direct insurer must: (a) disclose the existing terms; (b) disclose and explain the new terms; (c) explain how the policy owner may accept or be deemed to have accepted the new terms; and (d) furnish all this information in writing at least 30 days before the changes take effect.",r:"HI 8th Ed, Ch 13, Appendix 13A — Paragraph 29, p.284"},
{id:130,ch:13,cn:"MAS Notice 120",t:"Best practices include all EXCEPT:",o:["Plain language","Objective info","Ambiguous language","Risk warnings"],a:2,e:"Part II of MAS Notice 120 sets out non-mandatory best practice standards. These include: (a) presenting information in plain language that is easy to understand; (b) clearly explaining jargon and technical terms; (c) providing sufficient information for informed decisions; (d) prominently presenting warnings and risk information; (e) disclosing information in an objective and unbiased manner; and (f) keeping documents up-to-date. Information must NOT be ambiguous in language or presentation.",r:"HI 8th Ed, Ch 13, Appendix 13A — Paragraph 52, pp.289–290"},
{id:66,ch:14,cn:"Financial Needs Analysis",t:"Needs selling is:",o:["Expensive products","Service-oriented, relationship-based","One product only","Commission-focused"],a:1,e:"Needs selling differs from product selling in three key ways: (1) it is service-oriented — the adviser focuses on discovering the client's needs and recommending suitable products through a proper needs-based advisory process, rather than pushing a product; (2) it is not pressure selling — the client's concerns are addressed through solutions rather than creating buying pressure; and (3) it is relationship-based — building long-term trust through periodic reviews and ongoing service.",r:"HI 8th Ed, Ch 14, Section 2 — Needs Selling Versus Product Selling, pp.304–305"},
{id:67,ch:14,cn:"Financial Needs Analysis",t:"Method 1 for DI needs:",o:["Monthly expenses","75% of monthly salary","Lump sum","Annual income"],a:1,e:"There are three methods to quantify Disability Income Protection Needs. Method 1 uses the monthly salary — 75% of it represents the income protection need during disability. Method 2 uses monthly expenses (both personal and family) to determine the minimum coverage needed. Method 3 provides a lump sum TPD benefit for clients who cannot afford or are ineligible for DII. The 75% cap aligns with the DII benefit limit to prevent over-insurance.",r:"HI 8th Ed, Ch 14, Section 4B1 — Disability Income Protection Needs, pp.314–316"},
{id:68,ch:14,cn:"Financial Needs Analysis",t:"Older people need more:",o:["Travel only","CI, MEI, LTC","Maternity only","PA only"],a:1,e:"The need for protection against ill health applies to everyone at any life stage. However, for older people, there is a greater need for Critical Illness Insurance, Medical Expense Insurance and Long-Term Care Insurance, as they face a higher chance of falling sick or getting injured. During active employment years, protecting earnings against disability is crucial. The adviser must consider the client's life stage when identifying insurance needs.",r:"HI 8th Ed, Ch 14, Section 4A3 — Life Stages, pp.310–311"},
{id:69,ch:14,cn:"Financial Needs Analysis",t:"Before recommending:",o:["Highest premium","Only if needed & suitable","Many products","One insurer"],a:1,e:"There are three basic principles before making any product recommendation: (1) recommend products only if the client needs them; (2) recommend products that are the most suitable for the client given their existing circumstances; and (3) if the client needs a product that your company does not carry, let the client know so they can find alternatives. The focus must always be on the client's needs and suitability, not on maximising premiums or sales.",r:"HI 8th Ed, Ch 14, Section 5 — Product Recommendations, p.318"},
{id:70,ch:14,cn:"Financial Needs Analysis",t:"No suitable product → adviser should:",o:["Sell unsuitable","Inform client, find alternatives","Refuse","Closest regardless"],a:1,e:"One of the three basic principles of product recommendation is: if the client needs a product that your company does not carry, you should let the client know so they can find alternatives. The adviser should never sell an unsuitable product, refuse to help, or recommend the closest product regardless of suitability. This principle reflects the needs-based advisory approach and the obligation to act in the client's best interest.",r:"HI 8th Ed, Ch 14, Section 5 — Principles"}
]},
paper2:{name:"Paper 2",desc:"130 Questions · All Chapters",questions:[
// Ch 1 — Overview (5 questions)
{id:201,ch:1,cn:"Overview of Healthcare Environment",t:"Healthcare 2020 Masterplan's 3 key strategies include all EXCEPT:",o:["Improved Accessibility","Improved Quality","Enhanced Affordability","Universal Free Coverage"],a:3,e:"The Healthcare 2020 Masterplan (launched 2012) focused on three strategies: (1) Improved Accessibility — 4 new hospitals, new polyclinics, more nursing home beds, (2) Improved Quality — multi-disciplinary care, enhanced standards, IT systems, and (3) Enhanced Affordability — MediShield Life, expanded MediSave, Pioneer/Merdeka Generation packages. 'Universal Free Coverage' was never a strategy — Singapore promotes affordable, not free, healthcare.",r:"HI 8th Ed, Ch 1, Section 3A — Healthcare 2020, pp.3–5"},
{id:202,ch:1,cn:"Overview of Healthcare Environment",t:"Healthier SG's national enrolment exercise involves:",o:["One family doctor and one health plan per person","Mandatory hospital check-ups annually","Free specialist consultations","Compulsory gym memberships"],a:0,e:"Under Healthier SG's national enrolment exercise, residents choose and enrol with one GP clinic. The family doctor serves as the first point of contact for holistic health management. Incentives include fully subsidised screenings and vaccinations for citizens, waived co-pay for MediSave chronic care, and new CHAS drug subsidy tiers at enrolled GPs.",r:"HI 8th Ed, Ch 1, Section 3C — Healthier SG, pp.6–7"},
{id:203,ch:1,cn:"Overview of Healthcare Environment",t:"Which is an ILTC home-based service?",o:["Day rehabilitation centres","Nursing homes","Home medical services","Acute hospital care"],a:2,e:"ILTC home-based services are provided within the homes of frail and home-bound seniors, addressing health and social needs while supporting families. Home medical services fall under this category. Day rehabilitation centres are centre-based services, nursing homes are residential care facilities, and acute hospital care is an entirely separate category under Hospital Services.",r:"HI 8th Ed, Ch 1, Section 4C — Intermediate and Long-Term Care Services, p.10"},
{id:204,ch:1,cn:"Overview of Healthcare Environment",t:"Primary healthcare services include:",o:["Emergency surgery","Polyclinics and GP clinics","Nursing home care","Hospice services"],a:1,e:"Primary healthcare in Singapore is delivered through polyclinics and private GP clinics — the first point of contact for patients. They provide basic medical treatment, chronic illness management (e.g. diabetes), preventive healthcare like screenings, and health education. Under CHAS, eligible citizens also receive subsidised treatment at participating GPs and dental clinics.",r:"HI 8th Ed, Ch 1, Section 4A — Primary Healthcare Services and Facilities, pp.8–9"},
{id:205,ch:1,cn:"Overview of Healthcare Environment",t:"The Singapore Government promotes personal responsibility to:",o:["Maximise insurance coverage for all","Avoid over-reliance on state welfare or medical insurance","Eliminate private healthcare providers","Reduce the number of hospitals"],a:1,e:"The second of MOH's five healthcare objectives is to promote personal responsibility for one's health and avoid over-reliance on state welfare or medical insurance. Citizens are encouraged to adopt healthy lifestyles and take ownership of their health. At the same time, safety nets ensure no Singaporean is denied appropriate healthcare due to inability to pay.",r:"HI 8th Ed, Ch 1, Section 2 — Singapore's Healthcare Philosophy, p.3"},
// Ch 2 — MEI (15 questions)
{id:206,ch:2,cn:"Medical Expense Insurance",t:"Co-insurance in MEI refers to:",o:["Flat amount paid first by insured","% of expenses above deductible paid by insured","Maximum lifetime payout","Premium discount for families"],a:1,e:"Co-insurance is the percentage of covered medical expenses above the deductible that the insured must pay. For example, with 10% co-insurance and S$10,000 above the deductible, the insured pays S$1,000. It is different from the deductible, which is a flat dollar amount paid first.",r:"HI 8th Ed, Ch 2, Section 3E2 — Co-insurance, p.25"},
{id:207,ch:2,cn:"Medical Expense Insurance",t:"Which is TRUE about MEI renewability?",o:["All individual policies are non-renewable","Only group policies are guaranteed renewable","All Integrated Plan policies are guaranteed renewable","Renewability depends on claims history"],a:2,e:"All Integrated Plan (IP) policies in Singapore are guaranteed renewable — insurers cannot terminate them due to poor claims. This applies specifically to IPs. Other individual policies may or may not be guaranteed renewable depending on policy terms. Premium rates, however, are not guaranteed.",r:"HI 8th Ed, Ch 2, Section 3L — Renewability, p.30"},
{id:208,ch:2,cn:"Medical Expense Insurance",t:"MEI annual limit refers to:",o:["Maximum premium payable per year","Maximum reimbursement per policy year","Maximum number of claims per year","Minimum claim amount per year"],a:1,e:"The annual limit is the maximum reimbursement payable per policy year as specified in the Schedule of Benefits. Once reached within a policy year, no further claims can be made until the next renewal. It is distinct from the lifetime limit (total over all years) and event limit (per illness).",r:"HI 8th Ed, Ch 2, Section 3F — Benefit Limits, p.27"},
{id:209,ch:2,cn:"Medical Expense Insurance",t:"MEI waiting period applies to:",o:["All claims equally","Illness only, NOT accidental injury","Accidental injury only","Pre-existing conditions only"],a:1,e:"The MEI waiting period applies to illnesses only — a set period must pass before illness coverage begins. Accidental injuries have immediate coverage from the policy start date with no waiting period. Pre-existing conditions typically have even longer waiting periods than standard illnesses.",r:"HI 8th Ed, Ch 2, Section 3I — Waiting Period, p.29"},
{id:210,ch:2,cn:"Medical Expense Insurance",t:"S$2k deductible + 10% co-insurance on S$12k claim. Insured pays:",o:["S$3,000","S$2,000","S$3,200","S$1,200"],a:0,e:"Step-by-step: (1) Subtract deductible: S$12,000 − S$2,000 = S$10,000. (2) Apply co-insurance (insured's share): 10% × S$10,000 = S$1,000. (3) Insured pays: S$2,000 (deductible) + S$1,000 (co-insurance) = S$3,000 total. The insurer pays the remaining S$9,000.",r:"HI 8th Ed, Ch 2, Sections 3E1–E2 — Deductible & Co-insurance, pp.24–25"},
{id:211,ch:2,cn:"Medical Expense Insurance",t:"Family coverage under MEI may offer:",o:["100% premium waiver","~5% family discount","Free coverage for grandparents","Guaranteed acceptance for all ages"],a:1,e:"Some MEI insurers offer family coverage with a discount of approximately 5% when multiple family members are insured under the same plan. Each member still has their own coverage terms. This incentivises families to take up comprehensive health insurance together.",r:"HI 8th Ed, Ch 2, Section 3C — Family Coverage, p.22"},
{id:212,ch:2,cn:"Medical Expense Insurance",t:"NOT a common MEI exclusion:",o:["Cosmetic surgery","Emergency appendectomy","Drug addiction treatment","Self-inflicted injuries"],a:1,e:"Common MEI exclusions include cosmetic surgery, drug/alcohol addiction treatment, self-inflicted injuries, and pre-existing conditions during the waiting period. An emergency appendectomy is a medically necessary surgical procedure and is covered — it is not an exclusion.",r:"HI 8th Ed, Ch 2, Section 3M1 — Exclusions, p.30"},
{id:213,ch:2,cn:"Medical Expense Insurance",t:"MEI geographical limit typically means:",o:["Coverage only in Singapore hospitals","Auto-terminate if outside SG >180 days","No overseas emergency cover","Must notify insurer before travel"],a:1,e:"Most individual MEI policies auto-terminate if the insured resides outside Singapore for more than 180 days continuously. Some insurers only apply this to non-citizens/non-PRs. It does not mean coverage is restricted to Singapore hospitals — overseas emergency cover during short-term travel may still apply.",r:"HI 8th Ed, Ch 2, Section 3H — Geographical Limit, p.28"},
{id:214,ch:2,cn:"Medical Expense Insurance",t:"Event limit in MEI caps:",o:["Total lifetime payouts","Annual reimbursement","Payable amount per disability or illness","Number of hospital visits"],a:2,e:"The event limit caps the maximum payable amount per disability or illness event. Unlike the annual limit (per policy year) or lifetime limit (total across all years), the event limit is specific to each medical event. If a single illness costs more than the event limit, the excess is not reimbursable.",r:"HI 8th Ed, Ch 2, Section 3F — Benefit Limits, p.27"},
{id:215,ch:2,cn:"Medical Expense Insurance",t:"Group MEI underwriting uses:",o:["Individual proposal forms only","Group Insurance Fact-Finding (GIFF) Form","No underwriting at all","Government health records"],a:1,e:"Group MEI underwriting uses the Group Insurance Fact-Finding (GIFF) Form, which provides the insurer with group demographics and claims history. For small groups (fewer than 10 members), individual health declarations may also be required since the group is too small for effective risk pooling.",r:"HI 8th Ed, Ch 2, Section 4 — Underwriting, p.31"},
{id:216,ch:2,cn:"Medical Expense Insurance",t:"MEI coverage can terminate due to all EXCEPT:",o:["Death of insured","Change of home address","Lifetime limit reached","Full-time military service (except NS)"],a:1,e:"MEI coverage terminates upon: death, lifetime limit reached, full-time military service (except NS), or exceeding the geographical residency limit. A change of home address within Singapore does not affect coverage — termination reasons are specific and listed in the policy contract.",r:"HI 8th Ed, Ch 2, Section 6 — Termination of Cover, p.32"},
{id:217,ch:2,cn:"Medical Expense Insurance",t:"Co-ordination of Benefits ensures:",o:["Each insurer pays the full claim independently","Total claims from all sources ≤ actual medical expenses","Only primary insurer pays","Claims are split equally between insurers"],a:1,e:"The Co-ordination of Benefits clause ensures total claims across all policies cannot exceed actual medical expenses incurred. If a policyholder has MEI with two insurers, both may pay, but the combined payout must not exceed the real bill. This prevents profiting from multiple policies.",r:"HI 8th Ed, Ch 2, Section 3M2 — Co-ordination of Benefits, p.31"},
{id:218,ch:2,cn:"Medical Expense Insurance",t:"MEI premiums are determined by:",o:["Flat rate for all ages","Age-band, increasing with age","Income level only","Number of dependants only"],a:1,e:"MEI premiums are age-band based — they increase when the insured crosses into a higher age band at renewal. Rates are not guaranteed and may be revised due to medical inflation, claims experience, or regulatory changes. They are not flat, gender-based, or income-based.",r:"HI 8th Ed, Ch 2, Section 3K — Premiums, p.29"},
{id:219,ch:2,cn:"Medical Expense Insurance",t:"Which is a standard claim document for MEI?",o:["Police report","Employer reference letter","Discharge summary","Tax return"],a:2,e:"Standard MEI claim documents include: completed claim form, attending physician's statement, discharge summary, and original bills/receipts. A police report, employer letter, and tax return are not standard — though a police report might be requested for specific accident claims.",r:"HI 8th Ed, Ch 2, Section 7 — Claims, p.32"},
{id:220,ch:2,cn:"Medical Expense Insurance",t:"MEI is purchased as:",o:["A rider to life insurance only","Part of MediShield Life only","A stand-alone policy in Singapore","A government-issued scheme"],a:2,e:"In Singapore, MEI can be purchased as a stand-alone policy — it does not need to be attached to a life insurance policy. Examples include Integrated Shield Plans (IPs) and standalone H&S plans. While MEI can also be a rider, the stand-alone option is the primary form in Singapore.",r:"HI 8th Ed, Ch 2, Section 3A — Stand-alone, p.22"},
// Ch 3 — Group H&S (5 questions)
{id:221,ch:3,cn:"Group Hospital & Surgical",t:"Group insurance eligibility requires members to be part of a group formed for purposes:",o:["Specifically for insurance","Other than obtaining insurance","Approved by MAS","Registered with CPF Board"],a:1,e:"A fundamental requirement for Group Insurance is that several people must first be members of a group formed for purposes other than to obtain insurance. Examples include companies, trade unions, professional associations and clubs. This prevents anti-selection where people form a group solely to exploit group insurance benefits.",r:"HI 8th Ed, Ch 3, Section 2 — Group Insurance, p.52"},
{id:222,ch:3,cn:"Group Hospital & Surgical",t:"Voluntary (contributory) plan means:",o:["All employees must participate","Employees may pay part of premiums","Government contributes premiums","No premium is required"],a:1,e:"A voluntary (contributory) plan does not require full participation from employees, who may be expected to pay part of the premiums. The insurer will normally require a minimum percentage (e.g. 75%) of participation. Advantages include employees sharing costs and having some control over the plan, while obtaining coverage at lower rates than individual insurance.",r:"HI 8th Ed, Ch 3, Section 3A — Compulsory & Voluntary Plans, pp.53–54"},
{id:223,ch:3,cn:"Group Hospital & Surgical",t:"Migrant worker medical coverage ranges from:",o:["S$5,000 to S$20,000/year","S$15,000 to S$60,000/year","S$10,000 to S$50,000/year","S$20,000 to S$100,000/year"],a:1,e:"Employers may purchase medical insurance coverage of between S$15,000 to S$60,000 per year for each migrant worker. This covers medical bills incurred for inpatient and day surgery, including hospital bills for conditions that may not be work-related. From 1 July 2023, the annual claim limit was enhanced to at least S$60,000 under Stage 1 requirements.",r:"HI 8th Ed, Ch 3, Section 4 — Medical Insurance Requirements for Migrant Workers, p.56"},
{id:224,ch:3,cn:"Group Hospital & Surgical",t:"Key advantage of group over individual insurance:",o:["Higher premiums","More extensive underwriting","Generally lower premiums","No coverage limits"],a:2,e:"Group Insurance premiums are generally lower for two reasons: (1) group underwriting evaluates the group as a whole based on age distribution, occupation mix and claims experience rather than individual health histories, and (2) administrative costs are lower since only one master contract is issued. Individual insurance requires individual health evaluation and separate policy contracts, making it more expensive.",r:"HI 8th Ed, Ch 3, Section 3B — Individual Versus Group Insurance, pp.54–55"},
{id:225,ch:3,cn:"Group Hospital & Surgical",t:"Actively-at-work clause means:",o:["Employees can claim while on leave","Employee not eligible if absent due to illness on effective date","Coverage continues after retirement","Claims paid even during probation"],a:1,e:"The actively-at-work clause requires an employee to be actively at work on the day insurance coverage takes effect. If an employee is on sick leave or annual leave on that day, he will not be covered by the Group Insurance policy. This is one of the standard characteristics of Group Insurance, alongside the master contract, minimal underwriting, experience-rating and eligibility requirements.",r:"HI 8th Ed, Ch 3, Section 2 — Group Insurance Characteristics, p.53"},
// Ch 4 — DII (5 questions)
{id:226,ch:4,cn:"Disability Income Insurance",t:"DII benefits are capped at 75% of income to:",o:["Maximise insurer profits","Ensure insured has incentive to return to work","Meet government regulations","Reduce premium costs"],a:1,e:"The purpose of replacing only 75% (not 100%) of the insured's income is to ensure the insured will not be better off financially from the disability benefit, so that he retains the incentive to return to work. Additionally, a limitation clause prevents over-insuring by ensuring total benefits (including from other DII policies and Work Injury Compensation) do not exceed pre-disability earnings.",r:"HI 8th Ed, Ch 4, Section 4 — Computation of DII Benefit, pp.68–69"},
{id:227,ch:4,cn:"Disability Income Insurance",t:"Self-employed individuals may receive DII coverage of:",o:["75% of income","Up to 100% of income","~60% of income","50% of income"],a:2,e:"While employed individuals can get up to 75% of income, some insurers grant a lower percentage for self-employed persons, typically around 60% of the past 12 months' income. This is because self-employed income can be more variable and harder to verify. Underwriting for self-employed persons requires Notice of Assessment for three years or audited company accounts for three years.",r:"HI 8th Ed, Ch 4, Section 4 — Computation of DII Benefit, p.68; Section 8A2 — Underwriting, p.78"},
{id:228,ch:4,cn:"Disability Income Insurance",t:"Escalation benefit at 3% p.a. on S$5,000 after 12 months pays:",o:["S$5,000","S$5,150","S$5,300","S$5,500"],a:1,e:"The escalation benefit hedges against inflation by increasing the disability payout annually. With a 3% escalation on S$5,000, after 12 months the benefit becomes S$5,000 + (S$5,000 x 3%) = S$5,150. Insurers typically offer 3% or 5% per annum options at an additional premium. This benefit is particularly useful for long-term disabilities where inflation erodes the value of fixed payouts.",r:"HI 8th Ed, Ch 4, Section 6B4 — Escalation Benefit, p.75"},
{id:229,ch:4,cn:"Disability Income Insurance",t:"DII benefits cease when:",o:["Insured turns 55","Premium is increased","Insured is fit to return to work, dies, or benefit period expires","Insured changes occupation"],a:2,e:"DII benefits cease upon any one of three events: (1) the insured is fit to return to work, (2) death occurs, or (3) the benefit period has expired. If the DII is issued as a rider, benefits also cease upon expiry of the basic plan. Changing occupation does not stop benefits but may affect future coverage terms, and the insurer must be notified of any occupation change.",r:"HI 8th Ed, Ch 4, Section 9 — Cessation of Benefits, p.80"},
{id:230,ch:4,cn:"Disability Income Insurance",t:"The elimination/deferred period in DII:",o:["Is the same as free-look period","Is the waiting period before benefits start after disability","Means policy cannot be cancelled","Refers to premium grace period"],a:1,e:"The deferred (or elimination) period is the specified waiting period after disability begins before DII benefits start paying. Options typically include 45, 90 or 180 days. The longer the deferred period, the cheaper the premium because short-term claims are eliminated. Employed persons can match the deferred period to their employer's salary continuation period to avoid paying for unnecessary overlap.",r:"HI 8th Ed, Ch 4, Section 5E — Deferred/Elimination Period, p.72"},
// Ch 5 — LTC (5 questions)
{id:231,ch:5,cn:"Long-Term Care Insurance",t:"CareShield Life payout criteria requires inability to perform:",o:["1+ of 6 ADLs","2+ of 6 ADLs","3+ of 6 ADLs","All 6 ADLs"],a:2,e:"Both CareShield Life and ElderShield use the same payout criteria: the insured must be determined by an MOH-accredited assessor to be unable to perform 3 or more of the 6 ADLs (Washing, Dressing, Feeding, Toileting, Mobility, Transferring). The key difference is that CareShield Life provides lifetime payouts starting at S$600/month with annual increases, whereas ElderShield is capped at 60 or 72 months.",r:"HI 8th Ed, Ch 5, Section 8A — CareShield Life vs ElderShield Comparison, p.98"},
{id:232,ch:5,cn:"Long-Term Care Insurance",t:"Disability-based LTC benefit trigger pays:",o:["Only when care service costs are incurred","When insured meets ADL trigger regardless of service use","Only for nursing home stays","Only for hospitalisation"],a:1,e:"There are two types of LTC policies: (1) Disability-based policies pay when the insured meets the ADL/cognitive trigger, regardless of whether care services are actually used, and (2) Service-based policies pay when an insured incurs costs for a service covered under the policy. The insured does not need to be hospitalised to be eligible for LTC benefits and can use the funds for domestic helpers, nursing homes or home-care programmes.",r:"HI 8th Ed, Ch 5, Section 3A — Types of LTC Policies, p.89"},
{id:233,ch:5,cn:"Long-Term Care Insurance",t:"ElderShield auto-enrolment was at age:",o:["30","35","40","50"],a:2,e:"Until 2019, all Singapore Citizens and Permanent Residents with MediSave Accounts were automatically enrolled into ElderShield at age 40, unless they opted out. Since 2020, auto-enrolments into ElderShield were discontinued. Instead, those born 1980 onwards are enrolled into CareShield Life at age 30. ElderShield is no longer open for new applications.",r:"HI 8th Ed, Ch 5, Section 7B1 — Persons Enrolled in ElderShield, pp.93–94"},
{id:234,ch:5,cn:"Long-Term Care Insurance",t:"CareShield Life payouts are:",o:["Fixed for lifetime","Increasing until age 67 or claim, then fixed for life","Decreasing over time","Paid for max 72 months"],a:1,e:"CareShield Life payouts start at S$600/month (in 2020) and increase annually until age 67 or when a successful claim is made, whichever is earlier. After that, the payout amount is fixed for life for the entire duration of disability. This is a major improvement over ElderShield, which capped payouts at 60 or 72 months. Premiums can be fully paid by MediSave.",r:"HI 8th Ed, Ch 5, Section 8 — CareShield Life, pp.96–97"},
{id:235,ch:5,cn:"Long-Term Care Insurance",t:"Which is NOT one of the 6 ADLs?",o:["Transferring","Mobility","Cooking","Toileting"],a:2,e:"The 6 Activities of Daily Living are: (1) Washing, (2) Dressing, (3) Feeding, (4) Toileting, (5) Mobility, (6) Transferring. Cooking is NOT an ADL. A common exam trap is confusing Feeding (the ability to feed oneself after food is prepared) with cooking/food preparation. Failure to perform any ADL means the insured cannot do the task even with assistive devices and always requires another person's help.",r:"HI 8th Ed, Ch 5, Section 3B1 — Activities of Daily Living, p.90"},
// Ch 6 — CI (15 questions)
{id:236,ch:6,cn:"Critical Illness Insurance",t:"CI insurance provides benefit as:",o:["Monthly income replacement","Reimbursement of actual expenses","Lump sum upon diagnosis","Daily cash allowance"],a:2,e:"CI Insurance pays a lump sum benefit upon diagnosis of a covered critical illness or surgical procedure, unlike DII (monthly income) or Medical Expense Insurance (reimbursement of expenses). There is no restriction on how the lump sum is used — it can fund treatment, recuperation, medical aids, income replacement, or lifestyle changes. This makes CI distinct from other health insurance products that pay periodically or reimburse specific expenses.",r:"HI 8th Ed, Ch 6, Section 1 — Introduction, p.100"},
{id:237,ch:6,cn:"Critical Illness Insurance",t:"The 4 primary traditional CI conditions are:",o:["Cancer, Stroke, Heart Attack, CABG","Cancer, Diabetes, Stroke, Kidney Failure","Heart Attack, Stroke, Liver Failure, Cancer","Cancer, Stroke, Kidney Failure, Blindness"],a:0,e:"The 4 primary traditional CI conditions are: (1) Major Cancer, (2) Stroke with Permanent Neurological Deficit, (3) Heart Attack of Specified Severity, and (4) Coronary Artery Bypass Surgery (CABG). These are the first 4 conditions on the LIA's standardised list of 37 critical illnesses. Diabetes, kidney failure, liver failure and blindness are on the broader 37-condition list but are not among the primary 4.",r:"HI 8th Ed, Ch 6, Section 2 — What is CI Insurance?, p.101; Appendix 6A, p.120"},
{id:238,ch:6,cn:"Critical Illness Insurance",t:"LIA CI Framework 2024 standardises definitions for:",o:["Early stage only","Intermediate stage only","Severe stage only","All stages equally"],a:2,e:"The LIA CI Framework 2024 standardises definitions only for the severe stage of 37 critical illnesses. Insurers must adopt these common definitions when covering any listed condition at the severe stage, ensuring consistent claims outcomes across the industry. For early and intermediate stages, insurers may use their own definitions. Starting 1 October 2025, all new products must adopt the 2024 framework definitions.",r:"HI 8th Ed, Ch 6, Section 3 — LIA CI Framework 2024, pp.103–104"},
{id:239,ch:6,cn:"Critical Illness Insurance",t:"CI Additional Benefit on claim — basic policy:",o:["Terminates immediately","Continues and pays death/TPD later","Sum assured is halved","Premiums are doubled"],a:1,e:"When an Additional Benefit CI rider pays out upon diagnosis, the basic policy continues in force and will pay death/TPD benefits later. For example, with a S$100,000 Whole Life and S$200,000 Additional CI rider, a CI claim pays S$200,000 and the S$100,000 Whole Life continues for death/TPD. This is the key difference from Acceleration CI, where the CI payout reduces or terminates the basic policy.",r:"HI 8th Ed, Ch 6, Section 4C2 — Additional Benefit CI, pp.110–112"},
{id:240,ch:6,cn:"Critical Illness Insurance",t:"CI waiting period is the period:",o:["Before policy can be renewed","After diagnosis before payout","After policy inception before CI cover begins","Between premium payments"],a:2,e:"The CI waiting period starts from the date of issue or reinstatement of the policy. During this period, CI diagnoses are not covered. Its purpose is to prevent anti-selection where people buy CI only when they suspect something is wrong. If a CI is diagnosed before or during the waiting period, the insurer voids the policy and refunds premiums. Since November 2022, the previous fixed 90-day waiting period was removed and insurers can set their own.",r:"HI 8th Ed, Ch 6, Section 4A(f) — Waiting Period Requirement, p.107"},
{id:241,ch:6,cn:"Critical Illness Insurance",t:"Survival period in CI means:",o:["Maximum policy duration","Period insured must survive after diagnosis before benefit is paid","Time before policy lapses","Grace period for premium payment"],a:1,e:"The survival period is the time the insured must survive after the date of diagnosis before the CI benefit becomes payable. It is applicable only to the Additional Benefit type of CI cover. Do not confuse this with: (1) the waiting period (time after policy inception before cover begins), or (2) the premium grace period (time allowed for late premium payment). The survival period protects insurers from paying claims where the insured dies very shortly after diagnosis.",r:"HI 8th Ed, Ch 6, Section 4A(g) — Survival Period Requirement, p.107"},
{id:242,ch:6,cn:"Critical Illness Insurance",t:"Severity-based CI allows claims at:",o:["Severe stage only","Early, intermediate, and severe stages","Only after hospitalisation","Terminal diagnosis only"],a:1,e:"Severity-based CI plans (Early Pay CI) allow claims at early, intermediate and severe stages of a critical illness. Traditional CI policies only cover severe (end) stage illnesses. For example, under a traditional plan, only stage 4 colon cancer would qualify, but a severity-based plan may also pay for stage 1 detection. The payout is a percentage of the sum assured based on severity level, with progressive payments up to multiples of the original coverage.",r:"HI 8th Ed, Ch 6, Section 5A — Severity-Based CI (Early Pay CI), pp.113–114"},
{id:243,ch:6,cn:"Critical Illness Insurance",t:"CI can be purchased as all EXCEPT:",o:["Stand-alone policy","Rider to Whole Life","Rider to Term Insurance","Rider to Personal Accident"],a:3,e:"CI Insurance can be purchased as: (1) a stand-alone policy, or (2) a rider attached to Whole Life, Term, Endowment or ILP policies. It cannot be a rider to a Personal Accident (PA) policy. Although the CI Framework 2024 scope mentions CI benefits issued as a rider to H&S or PA policies, traditional CI riders are attached to life insurance policies, not PA. The CI Framework governs the definitions regardless of how the CI benefit is packaged.",r:"HI 8th Ed, Ch 6, Section 4B — Features of CI Insurance, p.108"},
{id:244,ch:6,cn:"Critical Illness Insurance",t:"100% Acceleration CI: sum assured cannot:",o:["Be less than S$50,000","Exceed the basic policy sum assured","Include early-stage cover","Be paid in instalments"],a:1,e:"The Acceleration Benefit CI rider sum assured must not exceed the basic policy sum assured because it is a pre-payment (advance) of the death benefit. With 100% acceleration, the full sum assured plus bonuses is paid on CI diagnosis and the policy terminates. The total payout from the policy is always equal to the basic sum assured plus bonuses, regardless of whether the insured claims for CI first or dies without a CI claim.",r:"HI 8th Ed, Ch 6, Section 4C1 — Acceleration Benefit CI, pp.108–110"},
{id:245,ch:6,cn:"Critical Illness Insurance",t:"Multiple Pay CI allows:",o:["Unlimited claims for same condition","Multiple claims for different conditions","One claim only, higher payout","Claims without diagnosis proof"],a:1,e:"Multiple Pay CI plans allow the insured to claim multiple times for different critical illness diagnoses, and may also cover relapse or recurrence of certain conditions. This is different from traditional CI which allows only one claim. The progressive payouts across claims can amount to multiples of the original sum assured. Each claim still requires proper medical diagnosis and proof as per standard CI claim requirements.",r:"HI 8th Ed, Ch 6, Section 5B — Multiple Pay CI Insurance Plan, p.114"},
{id:246,ch:6,cn:"Critical Illness Insurance",t:"CI coverage adequacy: LIA recommends minimum:",o:["1 year of income","2 years of income","4+ years of income after debts","10 years of income"],a:2,e:"The recommended minimum CI coverage is at least 4 years of income after taking into account debts. Additional factors include recovery expenses (nursing care, domestic help) and providing for dependents, especially young children. The net coverage should sustain the insured's standard of living during recovery. CI complements hospital and surgical insurance as it covers non-medical costs that H&S policies do not.",r:"HI 8th Ed, Ch 6, Section 7 — Factors for CI Coverage Adequacy, pp.116–117"},
{id:247,ch:6,cn:"Critical Illness Insurance",t:"Written CI claim notice must be given within:",o:["30 days","60 days","90 days","180 days"],a:1,e:"Written notice of a CI claim must usually be submitted within 60 days of the diagnosis or surgery. The claim form must also typically be returned within a specified period (e.g. 15 days) from the date the insurer sends it out. Required supporting documents include the claimant's statement, attending physician's report and medical evidence such as biopsy, histology, imaging/scan or laboratory reports, furnished at the claimant's expense.",r:"HI 8th Ed, Ch 6, Section 10 — Claims, p.119"},
{id:248,ch:6,cn:"Critical Illness Insurance",t:"Which is commonly excluded from CI cover?",o:["Cancer meeting the policy definition","Stroke meeting the policy definition","HIV/AIDS","Heart attack meeting the policy definition"],a:2,e:"HIV/AIDS is a standard CI exclusion. Other common exclusions include pre-existing illnesses, self-inflicted injury, drug/alcohol misuse, congenital anomalies, non-commercial aircraft injuries and war risks. If a CI results from any excluded cause, the insurer is not required to pay. Conditions like cancer, stroke and heart attack are covered (not excluded) provided they meet the precise policy definitions and are diagnosed after the waiting period.",r:"HI 8th Ed, Ch 6, Section 8 — Exclusions, p.118"},
{id:249,ch:6,cn:"Critical Illness Insurance",t:"CI Acceleration Benefit — on claim, policy:",o:["Continues with reduced SA","Terminates (if 100% acceleration)","Converts to term insurance","Premium is waived for life"],a:1,e:"With 100% Acceleration CI, a CI claim causes the policy to terminate because the full sum assured (plus bonuses) has been pre-paid. With partial acceleration (e.g. 50%), the policy continues with a reduced sum assured and future premiums may be reduced proportionally. The key principle is that the total amount paid under an acceleration policy always equals the basic sum assured plus bonuses, whether paid for CI, death or TPD.",r:"HI 8th Ed, Ch 6, Section 4C1 — Acceleration Benefit CI, pp.108–110"},
{id:250,ch:6,cn:"Critical Illness Insurance",t:"Each CI illness must meet:",o:["General illness description","Precise definition in the policy","Any doctor's opinion","WHO classification only"],a:1,e:"Each critical illness or surgery covered by the policy is precisely defined, and benefits are paid only if the condition meets that exact definition. For example, Major Cancer requires histological confirmation of malignant tumour with uncontrolled growth and invasion of normal tissue — many early-stage or low-grade tumours are specifically excluded from the definition. The diagnosis must be made by a registered medical practitioner (not the insured, spouse or lineal relatives).",r:"HI 8th Ed, Ch 6, Section 4A(d) — Meets the Definition of CI, pp.105–106"},
// Ch 7 — Other Health Insurance (5 questions)
{id:251,ch:7,cn:"Other Types of Health Insurance",t:"Hospital Cash benefit is:",o:["Reduced by other insurance payments","Paid on top of all other insurance","Capped at actual hospital expenses","Only for public hospital stays"],a:1,e:"Hospital Cash benefits are paid on top of all other health insurance — they are not reduced by payments from MediShield Life, Integrated Shield Plans, Group H&S Insurance or any other medical schemes. This is because Hospital Cash pays a fixed daily amount (not reimbursement of expenses), so there is no coordination of benefits. It provides 24-hour worldwide coverage and can be issued as a stand-alone policy or rider.",r:"HI 8th Ed, Ch 7, Section 2B — Features of Hospital Cash Insurance, p.136"},
{id:252,ch:7,cn:"Other Types of Health Insurance",t:"Maternity Insurance covers the newborn for:",o:["Accidents only","Congenital illnesses and related benefits","Dental care","Vision care"],a:1,e:"Maternity Insurance provides newborn benefits including medical expenses for congenital illnesses, a death benefit and hospitalisation income. It does not cover dental or vision care for newborns. An important additional feature is the option to purchase a life insurance plan (Whole Life, Endowment or ILP) for the newborn within 90 days of birth without medical underwriting, regardless of the baby's health condition at birth.",r:"HI 8th Ed, Ch 7, Section 3A — Benefits of Maternity Insurance, p.139"},
{id:253,ch:7,cn:"Other Types of Health Insurance",t:"Hospital Cash No Claim Discount (e.g. 25%) is available for:",o:["First-time policyholders","Claim-free consecutive periods","Senior citizens","Group policies only"],a:1,e:"Hospital Cash Insurance may offer a No Claim Discount (NCD) at renewal for policies that are free of any claim during consecutive claim-free periods. This incentivises policyholders to not make frivolous claims. Hospital Cash renews on a yearly basis, with premiums that may remain level or increase once the insured enters a higher age band. The NCD is a premium reduction, not available exclusively to first-time policyholders or senior citizens.",r:"HI 8th Ed, Ch 7, Section 2B — Features of Hospital Cash Insurance, p.136"},
{id:254,ch:7,cn:"Other Types of Health Insurance",t:"Maternity Insurance may offer option to buy life plan within:",o:["30 days of birth","60 days of birth","90 days of birth","180 days of birth"],a:2,e:"A valuable feature of Maternity Insurance is the option to purchase a life insurance plan (Whole Life, Endowment or ILP) for the newborn within 90 days of birth without requiring medical underwriting. This is particularly beneficial if the baby is born with health conditions that would normally make obtaining insurance difficult. The option has a defined window of 90 days and must not be missed.",r:"HI 8th Ed, Ch 7, Section 3B — Features of Maternity Insurance, p.139"},
{id:255,ch:7,cn:"Other Types of Health Insurance",t:"Group Dental claims are typically paid based on:",o:["Actual expenses incurred","Schedule of Allowances","Percentage of salary","Fixed monthly amount"],a:1,e:"Group Dental Care Insurance benefits are paid based on a Schedule of Allowances — a list that specifies the maximum benefit payable for each type of dental treatment. If actual expenses exceed the scheduled allowance, the employee pays the difference. The employer has flexibility to design the plan's benefit levels and covered treatment types. A limitation clause also caps the total yearly benefit per employee to control costs.",r:"HI 8th Ed, Ch 7, Section 5A — Group Dental Benefits Offered, p.143"},
// Ch 8 — Managed Healthcare (5 questions)
{id:256,ch:8,cn:"Managed Healthcare",t:"PPO stands for:",o:["Primary Provider Organisation","Preferred Provider Organisation","Public Payment Organisation","Private Provider Option"],a:1,e:"PPO stands for Preferred Provider Organisation. A PPO has negotiated contracts with a network of preferred providers. Members do not need a PCP or referrals, but receive richer benefits (lower deductibles, lower co-payments) for using in-network providers. PPOs are less restrictive than HMOs but more restrictive than Traditional MEI.",r:"HI 8th Ed, Ch 8, Section 4B — Preferred Provider Organisations, p.155"},
{id:257,ch:8,cn:"Managed Healthcare",t:"In a Staff Model HMO, providers are paid by:",o:["Capitation","Fee-for-service","Salary with performance bonuses","Patient co-payments only"],a:2,e:"The salary payment method is used in the Staff Model HMO. Physicians receive a fixed salary based on the average earnings of local physicians in the same field or specialty, plus performance-based bonuses or incentive payments. This is one of four MHCO payment methods alongside capitation, discounted-fee-for-service, and fee schedule.",r:"HI 8th Ed, Ch 8, Section 3B — Cost (Salary), p.153"},
{id:258,ch:8,cn:"Managed Healthcare",t:"Fee schedule payment method:",o:["Pays fixed amount per member per month","Caps dollar amounts for covered procedures","Pays percentage of normal fees","Provides salary to physicians"],a:1,e:"Under the fee schedule method, the MHCO places caps or limits on the dollar amounts that will be reimbursed for covered medical procedures and services. The MHCO pays no more than the specified maximum fee for each procedure. A drawback is that it may encourage unnecessary medical services from physicians who charge higher-than-average fees.",r:"HI 8th Ed, Ch 8, Section 3B — Cost (Fee Schedule), pp.153–154"},
{id:259,ch:8,cn:"Managed Healthcare",t:"Which plan offers the MOST choice of providers?",o:["HMO","POS","PPO","Traditional MEI"],a:3,e:"Traditional Medical Expense Insurance offers the most choice of providers because there is no managed network restricting access. The ranking from most to least choice is: Traditional MEI > PPO > POS > HMO. However, Traditional MEI has the least cost control, so premiums tend to be higher.",r:"HI 8th Ed, Ch 8, Section 5 — Choice of Providers vs Cost Control, p.156"},
{id:260,ch:8,cn:"Managed Healthcare",t:"Discounted-fee-for-service pays providers:",o:["Fixed monthly salary","Percentage of normal fees (e.g. 90%)","Per patient enrolled","Based on patient outcomes"],a:1,e:"Discounted-fee-for-service pays physicians a percentage of their normal fees (e.g. 90%), achieving a discount (e.g. 10% off). This differs from capitation (fixed per member per month), salary (Staff Model HMO), and fee schedule (caps on dollar amounts per procedure). Providers accept the discount in exchange for increased patient volume from the network.",r:"HI 8th Ed, Ch 8, Section 3B — Cost (Discounted-Fee-For-Service), p.153"},
// Ch 9 — Healthcare Financing (25 questions)
{id:261,ch:9,cn:"Healthcare Financing",t:"MediSave is a:",o:["National insurance scheme","Government endowment fund","Compulsory healthcare savings under CPF","Voluntary savings plan"],a:2,e:"MediSave is a mandatory national health savings scheme under CPF. It is not insurance (that is MediShield Life) nor an endowment fund (that is MediFund). Between 8%–10.5% of each CPF member's monthly salary is set aside in a personal MediSave Account. Amounts in the MA earn attractive annual interest income with additional interest for older members.",r:"HI 8th Ed, Ch 9 Part I, Section 5 — MediSave, pp.176–177"},
{id:262,ch:9,cn:"Healthcare Financing",t:"BHS amounts up to the limit:",o:["Can be withdrawn as cash anytime","Cannot be withdrawn as cash","Are transferred to OA at age 55","Are donated to MediFund"],a:1,e:"Amounts in the MediSave Account up to the Basic Healthcare Sum (BHS) cannot be withdrawn as cash — they are reserved for healthcare needs in old age. Only amounts above the BHS flow to the Special or Retirement Account, or to the Ordinary Account (withdrawable as cash from age 55) if the Full Retirement Sum has been met.",r:"HI 8th Ed, Ch 9 Part I, Section 5A — Basic Healthcare Sum, pp.177–178"},
{id:263,ch:9,cn:"Healthcare Financing",t:"MediSave can pay for dependants including all EXCEPT:",o:["Spouse","Children","Parents","Friends"],a:3,e:"MediSave covers the CPF member's own expenses and those of approved dependants: spouse, children, parents, siblings, and grandparents. Friends are not approved dependants. If paying for a sibling or grandparent, the patient must be a Singapore Citizen or SPR. Multiple family members can contribute MediSave to the same bill.",r:"HI 8th Ed, Ch 9 Part I, Section 5B — Uses of MediSave, p.178"},
{id:264,ch:9,cn:"Healthcare Financing",t:"MediShield Life is designed for which ward class?",o:["Class A private","Class B1","Class B2 and C","All ward classes equally"],a:2,e:"MediShield Life benefits are designed based on Class B2/C ward bills to keep premiums affordable. It covers 9 in 10 subsidised bills for B2/C wards, day surgeries, and selected costly outpatient treatments. While it does provide some coverage for higher ward classes, the payout is pro-rated. Those wanting fuller coverage for Class A/B1 or private hospitals should consider an IP.",r:"HI 8th Ed, Ch 9 Part I, Section 3 — MediShield Life, p.164"},
{id:265,ch:9,cn:"Healthcare Financing",t:"New Singapore Citizens are covered by MediShield Life from:",o:["Age 21","Date of application","Birth","Age 40"],a:2,e:"New Singapore Citizens are covered by MediShield Life from birth or from the day they attain citizenship. Permanent Residents are covered from the day they attain permanent residency. There is no need to apply — coverage is automatic. All SCs and PRs have been automatically enrolled since 1 November 2015.",r:"HI 8th Ed, Ch 9 Part I, Section 3 — MediShield Life, p.164"},
{id:266,ch:9,cn:"Healthcare Financing",t:"MediShield Life pre-existing conditions with serious illnesses:",o:["Not covered at all","30% additional premium for first 10 years","50% additional premium for 5 years","Covered with no surcharge"],a:1,e:"MediShield Life covers all pre-existing conditions, but those with serious pre-existing medical conditions (listed on MOH website) pay an Additional Premium of 30% for the first 10 years on top of standard premiums. Government subsidies and support measures are available to help with these additional costs. After 10 years, the surcharge ceases.",r:"HI 8th Ed, Ch 9 Part I, Section 3A — MediShield Life Premiums, p.164"},
{id:267,ch:9,cn:"Healthcare Financing",t:"IP consists of two parts:",o:["MediSave + MediFund","MediShield Life + private insurance component","Government grant + employer contribution","Basic plan + rider"],a:1,e:"An IP consists of two parts: (1) the MediShield Life component administered by CPF Board, and (2) an additional private insurance component administered by approved private insurers. The insured pays one premium and makes one claim with the private insurer, who then settles the MediShield Life portion with CPF Board. Plans can be 'as charged' or 'non-as-charged' (with sub-limits).",r:"HI 8th Ed, Ch 9 Part I, Section 4A — Integrated Structure of IPs, pp.169–171"},
{id:268,ch:9,cn:"Healthcare Financing",t:"Standard IP covers up to which ward?",o:["Class C only","Class B2","Class B1","Class A"],a:2,e:"The Standard IP is a 'no frills' product covering large Class B1 ward hospital bills and selected outpatient treatments. All IP insurers have been required to sell it since 1 May 2016. Benefits are regulated by MOH and identical across insurers, though premiums vary. It is an affordable option for those finding higher-coverage IPs too expensive.",r:"HI 8th Ed, Ch 9 Part I, Section 4B — Standard IP, p.173"},
{id:269,ch:9,cn:"Healthcare Financing",t:"Downgrading IP within same insurer requires:",o:["Full medical underwriting","Additional health declarations","No additional underwriting — anytime","MAS approval"],a:2,e:"A policyholder can downgrade to a lower coverage IP within the same insurer at any time without additional underwriting. This is important because upgrading requires evidence of insurability, and switching to a different insurer triggers re-underwriting. If IP is terminated entirely, the insured is still covered by MediShield Life for basic coverage.",r:"HI 8th Ed, Ch 9 Part I, Section 4E — Terminating or Switching IP, p.175"},
{id:270,ch:9,cn:"Healthcare Financing",t:"AWL for ANB 71+ is:",o:["S$300","S$600","S$900","S$1,200"],a:2,e:"The AWL for ANB 71 and above is S$900 per insured per policy year. The three AWL tiers are: ANB ≤40 = S$300, ANB 41–70 = S$600, ANB 71+ = S$900. IP premiums exceeding the AWL must be paid in cash. At older ages, the cash portion can be substantial since IP premiums may be up to 5 times MediShield Life premiums.",r:"HI 8th Ed, Ch 9 Part I, Section 4C — MediSave Use for IP Premiums, p.173"},
{id:271,ch:9,cn:"Healthcare Financing",t:"Letter of Guarantee (LOG):",o:["Guarantees full claim payment by insurer","Waives upfront cash but does NOT guarantee payment","Replaces the need for MediShield Life","Is issued by CPF Board"],a:1,e:"A LOG waives the upfront cash deposit at the medical institution, up to the eligible LOG amount. However, a LOG does NOT guarantee the insurer will pay the claim. If the hospitalisation falls within an excluded condition, the policyholder may not get the LOG. For assurance of coverage, the policyholder should seek pre-authorisation instead.",r:"HI 8th Ed, Ch 9 Part I, Section 6A — Letter of Guarantee, p.184"},
{id:272,ch:9,cn:"Healthcare Financing",t:"ElderShield administration transferred to Government on:",o:["1 Nov 2015","1 Nov 2019","1 Nov 2021","1 Nov 2023"],a:2,e:"ElderShield administration was transferred from private insurers (Singlife, Great Eastern, Income Insurance) to the Government on 1 November 2021. The Government now administers the scheme on a not-for-profit basis. ElderShield Supplement holders were not affected — they continue to be served by their existing Supplement insurers.",r:"HI 8th Ed, Ch 9 Part II, Section 7H — Government Administration of ElderShield, p.201"},
{id:273,ch:9,cn:"Healthcare Financing",t:"CareShield Life was introduced as enhancement of:",o:["MediShield Life","MediSave","ElderShield","MediFund"],a:2,e:"CareShield Life was introduced in 2020 as an enhancement of ElderShield, administered by the Government on a not-for-profit basis. It offers better protection with higher payouts that increase over time and lifetime coverage (no cap on payout duration). Payouts start at S$600/month and increase until age 67 or when a claim is made.",r:"HI 8th Ed, Ch 9 Part II, Section 8 — CareShield Life, pp.201–203"},
{id:274,ch:9,cn:"Healthcare Financing",t:"CHAS is available to:",o:["Low-income SC only","All SC regardless of income since Nov 2019","SPRs only","Foreigners working in Singapore"],a:1,e:"Since November 2019, CHAS has been expanded to include all Singapore Citizens regardless of income. The CHAS card colour (Blue, Orange, or Green) indicates the subsidy tier. All Pioneer Generation and Merdeka Generation seniors also receive special subsidies at CHAS clinics. The amount paid is based on clinic fees less CHAS subsidies.",r:"HI 8th Ed, Ch 9 Part I, Section 2B1 — CHAS, p.163"},
{id:275,ch:9,cn:"Healthcare Financing",t:"MediFund is for:",o:["All Singapore residents","Needy patients who cannot afford remaining bills","Foreign workers only","Private hospital patients only"],a:1,e:"MediFund is a Government endowment fund providing a safety net for needy Singaporeans who face difficulties paying remaining healthcare bills after Government subsidies, insurance, and MediSave. To apply, one must be a Singapore citizen, a subsidised patient at a MediFund-approved institution. Each institution has an independent MediFund Committee to approve applications.",r:"HI 8th Ed, Ch 9 Part II, Section 9E — MediFund, p.211"},
{id:276,ch:9,cn:"Healthcare Financing",t:"Pioneer Generation must have citizenship by:",o:["31 Dec 1976","31 Dec 1986","31 Dec 1996","31 Dec 2006"],a:1,e:"Pioneer Generation must have obtained citizenship on or before 31 December 1986, and born on or before 31 December 1949 (aged 16+ in 1965). Compare with Merdeka Generation who must have citizenship by 31 December 1996. PG benefits are for life, including MediShield Life subsidies of 40%–60% depending on age.",r:"HI 8th Ed, Ch 9 Part II, Section 9A — Pioneer Generation Package, p.207"},
{id:277,ch:9,cn:"Healthcare Financing",t:"Merdeka Generation must have citizenship by:",o:["31 Dec 1986","31 Dec 1996","31 Dec 2006","31 Dec 2016"],a:1,e:"Merdeka Generation must have obtained citizenship on or before 31 December 1996 and born 1 Jan 1950 to 31 Dec 1959. Compare with Pioneer Generation who needed citizenship by 31 Dec 1986. MG also extends to those born ≤31 Dec 1949 with citizenship by 31 Dec 1996 who did not receive the PG Package.",r:"HI 8th Ed, Ch 9 Part II, Section 9B — Merdeka Generation Package, p.208"},
{id:278,ch:9,cn:"Healthcare Financing",t:"MediSave Care allows withdrawal of up to:",o:["S$100/month","S$200/month","S$300/month","S$500/month"],a:1,e:"MediSave Care allows Singapore Residents aged 30+ with severe disability to withdraw up to S$200/month in cash from own or spouse's MediSave for long-term care. The quantum is tiered by MediSave balance: S$20k+ = S$200, S$15k+ = S$150, S$10k+ = S$100, S$5k+ = S$50, below S$5k = nil.",r:"HI 8th Ed, Ch 9 Part I, Section 5B3(c) — MediSave Care, p.181"},
{id:279,ch:9,cn:"Healthcare Financing",t:"Pre-authorisation by IP insurers assesses:",o:["Premium affordability","Medical necessity and cost before treatment","Patient's income level","Hospital star rating"],a:1,e:"Pre-authorisation assesses the medical necessity and cost of treatment before admission. It benefits all parties: (1) insurers verify the treatment is within policy coverage, (2) patients get peace of mind, and (3) healthcare providers have clarity on covered procedures. IP insurers will directly settle pre-authorised bills with the hospital.",r:"HI 8th Ed, Ch 9 Part I, Section 4G — Pre-Authorisation for IP, pp.176–177"},
{id:280,ch:9,cn:"Healthcare Financing",t:"Switching IP to a different insurer:",o:["Requires MAS approval","Original IP auto-terminated; 30 days to return","Both IPs run concurrently for 6 months","Not permitted under regulations"],a:1,e:"When switching IP to another insurer, the original IP is automatically terminated and the insured undergoes fresh underwriting. This may result in loss of coverage for existing conditions. The policyholder has 30 days from the termination notification to return to the previous insurer with no re-underwriting, as if the first IP had never been terminated.",r:"HI 8th Ed, Ch 9 Part I, Section 4E — Terminating or Switching IP, pp.175–176"},
{id:281,ch:9,cn:"Healthcare Financing",t:"MediSave amounts ABOVE BHS flow to:",o:["MediFund automatically","Special/Retirement Accounts (or OA from age 55 if FRS met)","Government tax fund","Separate savings account"],a:1,e:"Amounts above the BHS flow to the CPF member's Special or Retirement Account to boost monthly payouts. If the Full Retirement Sum has already been met, the amounts flow to the Ordinary Account and can be withdrawn as cash from age 55. The BHS is adjusted yearly in January and is fixed for life once the member reaches age 65.",r:"HI 8th Ed, Ch 9 Part I, Section 5A — Basic Healthcare Sum, pp.177–178"},
{id:282,ch:9,cn:"Healthcare Financing",t:"IDAPE payout of S$150/month applies when income is:",o:["≤S$1,000","≤S$2,000","S$2,001 to S$2,800","≤S$5,000"],a:2,e:"IDAPE payouts depend on per capita household income: S$0–S$2,000 = S$250/month, S$2,001–S$2,800 = S$150/month, both for up to 72 months. IDAPE was launched for Singaporeans ineligible for ElderShield when it started in September 2002 — either because they exceeded the maximum entry age or had a pre-existing disability. No premiums are charged.",r:"HI 8th Ed, Ch 9 Part II, Section 9D — IDAPE, p.210"},
{id:283,ch:9,cn:"Healthcare Financing",t:"CareShield Life is compulsory for those born:",o:["1970 or later","1975 or later","1980 or later","1990 or later"],a:2,e:"CareShield Life is universal (compulsory) for SCs and SPRs born in 1980 or later — they are automatically covered on their 30th birthday or when the scheme launched in October 2020, whichever is later, even with pre-existing disabilities. For those born 1979 or earlier, joining is optional (they can apply if no severe disability). Those born 1970–1979 on ElderShield400 were auto-enrolled with an opt-out option.",r:"HI 8th Ed, Ch 9 Part II, Section 8A — CareShield Life Coverage, p.203"},
{id:284,ch:9,cn:"Healthcare Financing",t:"MediShield Life premiums can be paid from:",o:["Cash only","MediSave (own or family members)","Employer CPF contributions only","Government subsidies only"],a:1,e:"MediShield Life premiums can be fully paid by MediSave — either one's own MediSave or family members' MediSave. Parents may also tap on the MediSave Grant for Newborns to pay for their child's premiums. Applicable subsidies are automatically applied before premium payment. No one will lose coverage due to inability to pay.",r:"HI 8th Ed, Ch 9 Part I, Section 3A — MediShield Life Premiums, pp.164–165"},
{id:285,ch:9,cn:"Healthcare Financing",t:"IP 'as charged' plans differ from 'non-as-charged' plans because:",o:["They have no deductible","They reimburse actual charges without sub-limits","They are cheaper","They don't require co-insurance"],a:1,e:"'As charged' IP plans reimburse actual charges incurred without sub-limits on individual items, while 'non-as-charged' plans impose sub-limits on specific benefit items. Both still have deductibles and co-insurance. Sellers must clearly explain differences in premiums, benefits, exclusions, deductibles, and co-insurance between the various IP plans and MediShield Life.",r:"HI 8th Ed, Ch 9 Part I, Section 4 — Integrated Shield Plans, p.170"},
// Ch 10 — Common Policy Provisions (5 questions)
{id:286,ch:10,cn:"Common Policy Provisions",t:"Free-look period allows the policyholder to:",o:["Extend coverage without premium","Review and return policy for premium refund (less medical fees)","Switch to another insurer automatically","Claim without waiting period"],a:1,e:"The free-look period (up to 14 days from receipt of the policy document) allows the policy owner to review and return the policy for a refund of premiums paid, less any medical fees incurred. Full coverage remains in force during this period. The policy is deemed received within 7 days after the insurer despatches it.",r:"HI 8th Ed, Ch 10, Section 5D — Free-Look Period, p.221"},
{id:287,ch:10,cn:"Common Policy Provisions",t:"Incontestability clause means the policy becomes indisputable after:",o:["6 months","Usually 1 year in force","5 years","10 years"],a:1,e:"The Incontestability provision makes policies indisputable after they have been in force for a certain minimum period, usually one year, with the exception of fraud. This stops the insurer from repudiating liability purely on grounds of breach of utmost good faith once the period has passed. This clause applies to Health Insurance riders attached to Life Insurance policies.",r:"HI 8th Ed, Ch 10, Section 5L — Incontestability, p.225"},
{id:288,ch:10,cn:"Common Policy Provisions",t:"Revocable nomination means the insured:",o:["Cannot change nominees","Retains ownership and can freely change nominees","Loses all policy rights","Must get MAS approval to change"],a:1,e:"Under a Revocable Nomination (Section 133 of the Insurance Act), the insured retains ownership of the policy and is free to change, add, or remove nominees without their consent. This contrasts with an Irrevocable/Trust Nomination (Section 132) where the insured loses ownership rights and needs written consent of ALL nominees to revoke.",r:"HI 8th Ed, Ch 10, Section 5S — Nomination of Beneficiaries, p.227"},
{id:289,ch:10,cn:"Common Policy Provisions",t:"Policy Owners' Protection Scheme (PPF) is administered by:",o:["MAS","CPF Board","Singapore Deposit Insurance Corporation (SDIC)","Life Insurance Association"],a:2,e:"The Policy Owners' Protection Scheme (PPF Scheme) is administered by the Singapore Deposit Insurance Corporation (SDIC). It protects policyholders in the event of failure of a life or general insurer that is a PPF Scheme member. Coverage is automatic — no action is required from policy owners. The scheme covers individual and group A&H policies including MEI, DII, LTC, and CI.",r:"HI 8th Ed, Ch 10, Section 5T — Policy Owners' Protection Scheme, pp.227–228"},
{id:290,ch:10,cn:"Common Policy Provisions",t:"Overseas emergency treatment under MEI pays:",o:["Full overseas cost regardless","Actual cost or SG equivalent, whichever lower","Only if pre-approved by insurer","Nothing — only SG treatment is covered"],a:1,e:"For emergency overseas treatment, the insurer pays either the actual hospital expenses or reasonable expenses that would have been paid for equivalent medical treatment in a Singapore hospital, whichever is lower. All charges are subject to the policy's exclusions and limitations, and benefits are payable in the insurer's designated currency using the insurer's exchange rate.",r:"HI 8th Ed, Ch 10, Section 5G — Overseas Treatment, p.222"},
// Ch 11 — Pricing (5 questions)
{id:291,ch:11,cn:"Health Insurance Pricing",t:"Medical inflation refers to:",o:["Premium increases by insurer","Upward trend in medical care claim costs","Government healthcare budget","Increase in hospital beds"],a:1,e:"Medical inflation refers to the consistent upward trend in medical care claim costs. It is driven by rising medical charges, medical advancement, and higher utilisation of services. Insurers take medical inflation into account to ensure premiums are adequate to cover rising costs. This is different from general premium increases, which may also reflect other factors.",r:"HI 8th Ed, Ch 11, Section 2D — Medical Inflation, p.238"},
{id:292,ch:11,cn:"Health Insurance Pricing",t:"Investment income as a pricing factor means:",o:["Policyholder's investment returns","Money earned from investing premiums collected","Government bond rates","Stock market performance"],a:1,e:"Investment income is a key pricing factor because insurers invest the premiums they collect before they need to pay out claims. The returns earned from these investments reduce the net cost of providing insurance, allowing insurers to charge lower premiums than would otherwise be needed. The level of investment income assumed affects how much premium must be collected upfront.",r:"HI 8th Ed, Ch 11, Section 2B — Investment Income, p.237"},
{id:293,ch:11,cn:"Health Insurance Pricing",t:"Which is a parameter for premium rating?",o:["Marital status","Favourite colour","Persistency","Number of siblings"],a:2,e:"Persistency refers to how long policyholders keep their policies in force. It is one of several premium rating parameters, alongside age, gender, health status, lifestyle, occupation, and portfolio claims experience. High persistency (low lapse rates) is favourable because it means a stable risk pool and more predictable claims experience for the insurer.",r:"HI 8th Ed, Ch 11, Section 3F — Persistency, p.240"},
{id:294,ch:11,cn:"Health Insurance Pricing",t:"More scope of benefits in a policy leads to:",o:["Lower premiums","Same premiums","Higher premiums","No correlation with premiums"],a:2,e:"The scope of benefits covered is a direct driver of premium levels. A policy that covers a wider range of medical services, treatments, or conditions will naturally cost more because the insurer's expected claims liability is higher. Conversely, policies with narrower benefit scopes or more exclusions can be offered at lower premiums.",r:"HI 8th Ed, Ch 11, Section 2F — Scope of Benefits Covered, p.238"},
